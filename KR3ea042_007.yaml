body:
  text: 卷七水穀素問五臟別論篇水穀入口則胃實而腸虛王冰曰以未下也馬蒔曰實而不滿者方其水穀入口之時上之為胃者實而下之為腸者尚虛及其時下下脘之後則下之為腸者實而上之為胃者已虛故一有所實則不能有所滿而必至於瀉也故曰實而不滿者以此彼五臟無水穀之出入特其精微之氣焉耳故雖至於滿而不至於有所實自不必有所瀉也故曰滿而不實者以此驥案胃巢也水穀巢聚之所也腸暢也通暢水穀之道也有大腸小腸之別靈樞海論胃者水穀之海師傳篇六府者胃為之海廣頦大頸張胸五穀乃容又平人絶谷篇胃大一尺五寸徑五寸長二尺五寸受水穀三斗五升素問靈蘭祕典篇小腸者受盛之官化物出焉大腸者傳道之官變化出焉脾胃者倉廩之官五味出焉胃主受納水穀故入口則胃實小腸上接於胃凡胃所納之物皆受盛於小腸之中小腸中物至大腸精汁盡化變糟粕而出故胃實腸虛腸實胃虛實而不滿滿而不實也食下則腸實而胃虛王冰曰水穀下也故曰實而不滿滿而不實也五味入口藏於胃以養五藏氣氣口亦太陰也王冰曰氣口在手魚際之後同身寸之一寸氣口之所候脈動者是手太陰脈氣所行故言氣口亦太陰也張志聰曰氣口手太陰之兩脈口五藏之氣皆變見於氣口故為五藏主蓋水穀之清者榮於五藏水穀之濁者出於六府清中之清者榮於經脈清中之濁者復傳化於腸胃膀胱此節論飲食入胃有氣味清濁上下出入之分當知奇恆之府亦受清中之清者也馬蒔曰此即五味入口之語以明五氣入鼻之義氣口者右手之寸口脈即手太陰肺經太淵穴也此篇與經脈別論靈樞五色四時氣篇皆名之曰氣口靈樞終始篇名之曰脈口以脈氣必會於此也六節藏象論靈樞禁服名之曰寸口以此部即太淵穴去魚際僅一寸也其左手寸部則內經諸篇皆謂之人迎耳經脈別論謂氣口成寸以決生死故帝問氣口何以獨為五藏主而可以決脈之動靜氣之盛衰人之死生有如是也伯言脈雖見於氣口而實本之於脾胃也胃足陽明脾足太陰足陽明為六府之先足太陰為五藏之本胃主納受凡水穀以是為市為六府之大源五味入口藏於胃而得脾以為之運化致五藏之氣無不藉以資養則是脾者足太陰也肺者手太陰也其氣本相為流通而氣口亦手太陰耳是以五臟六腑之氣味皆出於胃變見於氣口惟其出於胃變見於氣口故凡胃脾積聚痰物其氣口必大而滑凡胃脾之虛者其氣口脈必虛張介賓曰氣口之義其名有三手太陰肺經脈也肺主諸氣氣之盛衰見於此故曰氣口肺朝百脈脈之大會聚於此故曰脈口脈出太淵其長一寸九分故曰寸口是名雖三而實則一愚按氣口寸口脈口之義乃統兩手而言非獨指右手為氣口也如經脈篇手太陰之脈入寸口上循魚際又經者常不可見也其虛實也則以氣口知之經筋篇手太陰之筋結於魚行寸口外側經脈別論權衡以平氣口成寸以決死生平人氣象論欲知寸口太過與不及小針解氣口虛而當補盛而當瀉本篇氣口何以獨為五藏主難經十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之法何謂也曰寸口者脈之大會五臟六府之所終始故取法於寸口諸如此者豈獨指右手為言耶而王叔和未詳經旨謂左為人迎右為氣口左手寸口大迎以前右手寸口氣口以前等説自晉及今以訛傳訛莫可解救甚至以左候表以右候里無稽之言其謬為甚肝心居左豈不可為里腸胃在右豈不可為表如仲景為傷寒之主但曰大浮數滑動者此名陽也沉澀弱弦微者此名陰也又曰表有病脈當浮而大里有病脈當沉而細又如其上取寸口太陰脈也下取趺陽陽明脈也是皆陰陽表裡之謂初未聞以左為人迎而候表右為氣口而候里脈體自有陰陽諸經皆具表裡凡今之習訛者但見左強便曰外感而攻其表但見右盛便曰內傷而攻其里焉知藏氣有不齊脈候有稟賦或左脈素大於右或右脈素大於左孰者為常孰者為變或於偏弱中略見有力已隱虛中之實或於偏盛中稍覺無神便是實中之虛設不如此而欲以左右分表裡豈左無里右無表乎故每致攻伐無過顛倒陰陽非為大失經旨而遺害於人不小無怪乎脈之日難也此不得不為辨正驥案靈樞五味篇水穀皆入於胃又谷始入於胃其精微者出於胃之兩焦以溉五藏別出兩行榮衛之道其大氣之摶而不行者積於胸中名曰氣海出於肺循喉嚨故呼則出吸則入又胃五竅者閭門也上竅主納水穀下竅入小腸旁竅入三焦膜油之中主行水之餘瀝中通脾一竅主化水穀上輸肺一竅主布精汁故云五竅曰閭門其養五藏以此唐宋以後此事難知西人剖解只言形體吾鄉唐容川先生髮之有功醫學不少是以五臟六腑之氣味皆出於胃變見於氣口王冰曰榮氣之道內谷為實新校正云詳此注出靈樞實作寶谷入於胃氣傳與肺精專者循肺氣行於氣口故云變見於氣口也新校正云按全元起本出作入張志聰曰足太陰轉輸水穀之精而手太陰亦為胃以養五藏氣是以五藏之氣皆見於氣口也馬蒔曰蓋谷入於胃氣傳於肺而肺氣行於氣口故云變見於氣口也玉機真藏論五藏者皆稟氣於胃胃者五藏之本也藏氣者不能自致於手太陰必因於胃氣乃至於手太陰也張介賓曰人有四海而胃居其一是為水穀之海臟腑之屬陽為府陰為藏胃屬陽而為六府之本故云六府之大源然五味入口藏於胃以養五藏氣故又曰胃為五臟六腑之海氣口本屬太陰而曰亦太陰者何也蓋氣口屬肺手太陰也布行胃氣則在於脾足太陰也營衛生會篇谷入於胃以傳於肺五臟六腑皆以受氣厥論脾為胃行其津液者也然則胃氣必歸於脾脾氣必歸於肺而後行其臟腑營衛所以氣口雖為手太陰而實即足太陰之所歸故曰氣口亦太陰也是以五臟六腑之氣味皆出於胃而變見於氣口故胃為臟腑之大源然無不由脾達肺也驥案胃為五臟六腑之海五臟六腑皆稟氣於胃胃五竅者為閭門故臟腑之氣味皆出於胃也胃五竅中有一竅上輸於肺以布精汁故能變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也吳昆曰風暑濕燥寒天之五氣也無形之氣由鼻而入故不藏於胃而藏於肺凡心肺有病則鼻為氣竅因之不利張志聰曰肺居上為陽肺乃心之蓋而主氣開竅於鼻故引藏象論而言味歸陰而氣歸陽也道書鼻為天門口為地戶馬蒔曰六節藏象論天食人以五氣羶焦香腥腐地食人以五味酸苦甘辛鹹五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃胃有所藏以養五氣氣和而生津液相成神乃自生故五味入口入於府五氣入鼻入於藏然五藏惟心肺居於膈上受此五氣故心肺有病而鼻為之不利矣張介賓曰氣味之化在天為氣在地為味上文言五味入口藏於胃者味為陰此言五氣入鼻藏於心肺者氣為陽也鼻為肺之竅故心肺有病而鼻為之不利觀此兩節曰味曰氣皆出於胃而達於肺既達於肺亦必變見於氣口故氣口獨為五藏主驥案經云上部法天天氣通於肺肺開竅於鼻天食人以五氣溫涼寒熱是也故心肺病而鼻不利素問經脈別論食氣入胃散精於肝淫氣於筋王冰曰肝養筋故胃散穀精之氣入於肝則浸淫滋養於筋絡矣吳昆曰精五穀之精張志聰曰肝者土之勝制則生化故散精於肝肝者筋其應故淫氣於筋經曰谷入於胃脈道乃通血氣乃行是榮衛氣血皆水穀之所資生而水穀入胃各有淫散輸轉之道故又必先知經脈生始之原而後知病脈也驥案西醫謂胃有肝膈大筋內經筋為肝之合食氣入胃濁氣歸心淫精於脈王冰曰濁氣穀氣也心居胃上故穀氣歸心淫溢精微入於脈也何者心主脈吳昆曰濁氣上焦氤氳之氣也歸於心則為血淫其精者於脈是為十二經也張志聰曰經曰受谷者濁胃之食氣故曰濁氣胃絡上通於心故入胃之食氣歸於心子令母實也心氣通於脈故淫精於脈伯高曰谷始入於胃其精微者先出於胃之兩焦以溉五藏別出兩行榮衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉嚨而司呼吸又曰谷入於胃乃傳之肺五臟六腑皆以受氣所謂先出於胃之兩焦者入胃之穀氣先下淫於肝上歸於心肺以養五藏氣此章論經脈之道由水穀之精以養府臟腑藏之精淫於經脈氣口成寸以決生死所謂五藏皆稟氣於胃而至於手太陰也其別出兩行之榮衛與宗氣又當別論張介賓曰濁言食氣之厚者也陰陽清濁篇受谷者濁受氣者清是也驥案西醫説胃之肝膈大筋循脊上通心竅心之合脈容川唐氏謂食者有形之陰質故主化汁變血胃與脾為表裡胃得膽之健運肝膽疏利則化汁液濁非渣穢乃稠濃之意陰汁稠濃上歸於心則化為血淫溢精汁而散行於脈管與西醫出血管回血管之説同第西醫言管中醫言脈二而一也脈氣流經經氣歸於肺肺朝百脈輸精於皮毛王冰曰言脈氣流運乃為大經經氣歸宗上朝於肺肺為華蓋位復居高治節由之故受百脈之朝會也平人氣象論藏真高於肺以行榮衛陰陽由此故肺朝百脈然乃布化精氣輸於皮毛吳昆曰言脈氣流於諸經經氣上歸心肺肺居諸臟腑之上為百脈之所朝宗其精輸之於皮毛也張志聰曰脈氣者水穀之精氣而行於經脈中也經大經也言入胃之穀氣先淫氣於脈百脈之經氣總歸於大經經氣歸於肺是以百脈之氣皆朝會於肺也肺合皮毛故復輸精於皮毛張介賓曰精淫於脈脈流於經經脈流通必由於氣氣主於肺故為百脈之朝會皮毛為肺之合故肺精輸焉驥案容川唐氏謂脈淫流經者流行於各經絡而回復有常也西醫言心左房之血由出血管導行於周身心體跳動不休每一跳則周身之脈應之而跳血既行遍周身則轉入回血管其色變紫以受炭氣也紫血由回管遞傳復返頸會管得肺氣呼吸則炭氣出而紫色退復變為赤入心右房轉至左房而又出矣以為脈氣流經之證與谷入於胃脈道乃行水入於經其血乃成之旨略同毛脈合經行氣於府王冰曰府謂氣之所聚處也是謂氣海在兩乳間名曰膻中也吳昆曰毛屬肺氣脈屬心血毛脈合其精則行氣於玄府是為衛氣玄府腠理也張志聰曰經云血獨盛則淡滲皮膚生毫毛夫皮膚主氣經脈主血毛脈合精者血氣相合也六府為陽故先受氣馬蒔曰肺曰毛心曰脈毛脈合經而精氣行於府府者膻中也靈樞五味篇大氣積於胸中邪客篇宗氣積於胸中刺節真邪論宗氣流於海者是也張介賓曰肺主毛心主脈肺藏氣心生血一氣一血稱為父母二藏獨居胸中故曰毛脈合精行氣於府府者氣聚之府也府精神明留於四藏氣歸於權衡王冰曰膻中之布氣者分為三隧氣下者走於氣街上者走於息道宗氣流於海積於胸中命曰氣海如是分化乃四藏安定三焦平均中外上下各得其所吳昆曰玄府之氣精明神氣常留止於四藏四藏形之四藏一頭角二耳目三口齒四胸中也氣歸於權衡言其平等而無低昂也張志聰曰府精神明者六府之津液相成而神乃自生也穀氣入於胃淫精於脈乃傳之肺肺氣散精行氣於府府精留於四藏以養五藏六氣故曰谷入於胃乃傳之肺五臟六腑皆以受氣馬蒔曰膻中為府其精氣宗氣最為神明而司呼吸行經隧始行於手太陰肺經通於心肝脾腎之四藏而四藏之精皆其所留是氣也平如權衡張介賓曰宗氣積於肺神明出於心氣盛則神王故氣府之積為神明神王則藏安以故肺肝脾腎四藏無不賴神明之留以為主宰然後藏氣鹹得其平而歸於權衡權衡平也故曰主明則下安主不明則十二官危權衡以平氣口成寸以決死生王冰曰三世脈法皆以三部為寸關尺之分故中外高下氣緒均平則氣口之脈而成寸也夫氣口者脈之大要會也百脈盡朝故以其分決死生也吳昆曰持權衡之法以取平於氣口分其三部成其尺寸以決病之死生張志聰曰權衡平也言脈之浮沉出入陰陽和平故曰權衡以平氣口手太陰之兩脈口成寸者分尺為寸也言五臟六腑受氣於谷淫精於脈變見於氣口以決其生死馬蒔曰氣口者手太陰經之太淵穴也與魚際相去一寸又成寸口之名真可以診吉凶而決死生也靈樞小針解篇以氣口虛為當補氣口盛則當瀉則凡病皆以氣口為主張介賓曰臟腑之氣既得其平則必變見於氣口而成寸尺也氣口者脈之大會百脈俱朝於此故可以決其生死凡如上文所言者皆食氣之所化而食氣之化又必由於胃氣故上文言食氣入胃下文言飲入於胃也驥案食氣入胃以下各節是言胃氣淫肝歸心流肺行府而留於四藏如權衡之平可於氣口決死生也經曰水穀入口其味有五各注其海津液各走其道胃者水穀之海海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也五穀入胃其糟粕津液宗氣分為三隧宗氣積於胸中出於喉嚨以貫心肺而行呼吸此歸心流肺之説也又榮氣者泌其津液注之於肺化而為血以榮四末衛氣者中焦之所出亦並胃中出上焦之後此所謂受氣者泌糟粕生津液化為精微上注於肺脈乃化而為血以奉生身此淫肝流肺之説也又胃有五竅上通於肺有肝膈大筋胸膈大筋為通心肺肝之路心合脈肝合筋肺合皮毛言其外應也行氣於府府三焦也三焦孤之府也故獨言府周禮醫師九藏心肝脾肺腎五者為正藏合胃膀胱大小腸為九藏疏引八十一難胃為水穀之府小腸為受盛之府大腸為行道之府膀胱為津滴三焦為孤府不入於藏故此曰四藏三焦少陽水中之陽是為相火屬於腎中命門也命門即腎系由腎系下生連網油膜是為下焦中生板油為中焦上生膈膜為上焦其根源實出於腎腎上連肺金水相生腎主水而行水之府實為三焦三焦即人身膜油連腸胃及膀胱食入於胃由腸而下飲入於胃則胃之微管將水吸出散走膜膈即三焦也水由上焦歷肝膜透腎系入下焦油膜以達膀胱故三焦者決瀆之府水道出焉曰孤府者謂五藏各配一府而三焦司腎之決瀆獨成一府故此雲氣行於府留於四藏也氣口即寸口脈口手太陰經脈內經與結喉兩旁人迎對舉張注已詳別見扁倉傳補注中權衡不差纍黍故曰平氣口無長短太過不及故曰成寸飲入於胃遊溢精氣上輸於脾王冰曰水飲流下至於中焦水化精微上為雲霧雲霧散變乃注於脾靈樞經上焦如霧中焦如漚此之謂也吳昆曰遊流行也溢湧溢也靈樞所謂中焦如漚是也精氣飲之精氣也輸轉輸傳運之名也張志聰曰入胃之飲精氣上輸於脾脾氣散精上歸於肺蓋脾主為胃行其津液者也肺應天而主氣故能通調水道而下輸膀胱所謂地氣升而為雲天氣降而為雨也馬蒔曰所食之谷其精微氣遊溢升騰上輸於脾張介賓曰遊浮遊也溢湧溢也水飲入胃則其氣化精微必先輸運於脾是謂中焦如漚也驥案以上言食食本於地陰主化血之物以下言飲飲本於天陽主化氣之物氣乃水之所化凡飲水皆屬化氣之物禮經飲以養陽食以養陰是也飲主湯液醪醴言食統五穀五菜五果五肉言脾氣散精上歸於肺通調水道下輸膀胱王冰曰水土合化上滋肺金金氣通腎故調水道轉注下焦膀胱稟化乃為溲矣靈樞經下焦如瀆此之謂也吳昆曰脾雖具坤靜之德而有乾健之運既得水穀精氣則散而升之上歸於肺靈樞所謂上焦如霧是也肺雖為清虛之藏而有治節之司主行營衛通陰陽故能通調水道下輸膀胱靈樞所謂下焦如瀆是也馬蒔曰脾附於胃之右比胃為上故脾氣散精上歸於肺而肺行百脈通調水道下輸膀胱張介賓曰脾乃散氣上如雲霧而歸於肺是謂上焦如霧也肺氣運行水隨而注故肺能通調水道下輸膀胱是謂水出高原下焦如瀆也驥案五藏相使篇三焦者決瀆之官水道出焉水道注見上行氣於府條水精四布五經並行合於四時五藏陰陽揆度以為常也王冰曰從是水精布經氣行筋骨成血氣順配合四時寒暑證符五藏陰陽揆度盈虛用為常道度量也以用也新校正云按一本云陰陽動靜吳昆曰夫既上升下降由是水穀之精四散而布五經之氣一機流行合於四時寒暑符於五藏陰陽揆度於造化盈虛則為常道也張志聰曰水精四布者氣化則水行故四布於皮毛五經並行者通灌於五藏之經脈也平脈篇谷入於胃脈道乃行水入於經而血乃成故先論食而後論其飲焉五藏五行之氣也揆度度數也總結上文而言經脈之道合於四時五行之次序陰陽出入之度數以為經脈之常馬蒔曰水精分布於四藏五藏並行乎水精真有合於四時五藏及古經陰陽揆度等篇之常義也按飲入於胃以下乃言飲而不言食李東垣脾胃論朱丹溪纂要書不考上文為食乃改為飲食入胃則於下輸膀胱水精四布之義大背矣殊不知上文之食含有飲義而下文之飲必難以兼食也何諸醫書皆宗李朱而不考經旨者皆繆矣張介賓曰水因氣生氣為水母凡肺氣所及則水精布焉然水名雖一而清濁有分清者為精清如雨露濁者為水水如江河故精歸五藏水歸膀胱而五經並行矣五經五藏之經絡也若是則食飲精氣皆得其滋養升降之宜故四時五藏皆合陰陽揆度以為常也素問評熱病論岐伯曰人所以汗出者皆生於穀穀生於精王冰曰言穀氣化為精精氣勝乃為汗吳昆曰言穀氣變化為陰精泄之於表為汗出耳張志聰曰汗生於水穀之精水穀之精由精氣之所化故曰穀生於精夫汗之發源有二一出於水穀之精一出於腎藏之精而曰皆生於穀者言腎藏之精亦水穀之所生也馬蒔曰精氣盛而穀氣消穀氣消而汗能自出張介賓曰穀氣內盛則生精精氣外達則為汗驥案靈樞癰疽篇腸胃受谷上焦出氣以溫分肉而養骨節通腠理通腠理即汗出也然谷有五五味篇穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎谷有五味五味走五藏五藏生五汁經脈別論飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾精五穀之精氣又鑿也對物之粗者言論語食不厭精離騷精瓊靡以為粻均訓鑿張注水谷之精其説為長金匱真言論東方味酸其穀麥生肝南方味苦其谷黍生心中央味甘其谷稷生脾西方味辛其谷稻生肺北方味鹹其谷豆生腎今邪氣交爭於骨肉而得汗者是邪卻而精勝也王冰曰言初汗也吳昆曰若果是精勝邪卻則當能食不復發熱張志聰曰交爭於骨肉者邪氣伏匿於骨肉之間至春時與正氣交爭而發為溫病得汗是精氣勝而邪當共並而出矣倪沖之曰胃主肉腎主骨穀精之汗出於胃血液之汗原於腎邪在肉者得水穀之汗而解邪在骨者得腎精之汗而後解馬蒔曰邪氣交爭而得汗是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也王冰曰無俾言無可使為汗也穀不化則精不生精不化流故無可使吳昆曰俾使也精衰無以役使運化故不能食馬蒔曰是精氣不能使之食也所以其壽可傾也張介賓曰惟精勝邪所以能汗邪從汗散則當能食不復熱矣俾使也精陰氣也五藏所以藏精藏氣虛則不能使人飲食故曰精無俾也病而留者其壽可立而傾也王冰曰如是者若汗出疾速留著而不去則其人壽命立至傾危也新校正云詳病而留者按王注病當作疾又按甲乙經作熱而留者吳昆曰言病邪留而不去必至損命也張志聰曰此言水穀之精由腎藏精氣之所化所謂穀生於精也夫腎為水藏受水穀之精而藏之其精氣上與陽明相合戊癸合而化火火土之氣消水穀之精微而復生此精是先後二天互相資生者也今汗出而邪留不去則熱邪復傷其陰精矣精氣受傷則不能與陽明合化而使之食是精氣之生原並絶其壽命可立而傾也董帷園曰互相生長之道旋轉如環張介賓曰病氣留而不退則元氣日敗必致損命驥案汗出傷精是一死復熱邪勝是二死不能食而精無俾俾説文益也是三死有三死無一生壽命之傾可立而待素問厥論篇岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也王冰曰前陰為太陰陽明之所合故胃不和則精氣竭也內精不足故四肢無氣以營之吳昆曰此言酒之為患絡與經不能兩實故絡脈滿則經脈虛陰五藏之陰陽四肢之陽精氣竭陰氣竭也營充養也張志聰曰此言熱厥之因因傷中焦所生之陰氣也靈樞經飲酒者衛氣先行皮膚先充絡脈夫胃氣者谷之悍氣也酒亦水穀悍熱之液故從衛氣先行於皮膚從皮膚而充於絡脈是不從脾氣而行於絡脈故絡脈滿而經脈虛也夫飲入於胃其津液上輸於脾脾氣散精於肺通調於經脈四布於皮毛是從經脈而行於絡脈從絡脈而散於皮膚自內而外也酒入於胃先行於皮膚先充於絡脈是從皮膚而入於絡脈反從外而內矣不從皮氣通調於經脈則陰氣虛矣悍熱之氣反從外而內則陽氣入矣陽明乃燥熱之府藉太陰中見之陰化陰氣虛而陽熱之氣入內則胃氣不和矣胃不和則所生之精氣竭精氣竭則不能營於四肢而為熱厥矣馬蒔曰腎屬足少陰者以欲而虛胃屬足陽明者以酒而盛陰氣虛則陽氣入陽氣入則胃氣下陷而不和胃不和則脾氣亦衰穀氣不得化為精微之氣而運之以行於四肢矣張介賓曰酒入於胃必歸於脾濕熱在脾則脾陰虛陽獨亢而胃不和矣脾胃俱病則精氣竭故不能營經絡四肢驥案衍義引呂氏春秋儀狄造酒戰國策帝女儀狄造酒進之於禹然本草已著酒名素問以酒為漿則自黃帝始非儀狄也醫家用惟醪醴義詳內經方湯液醪醴篇飲家所用惟取其味不顧入藥如何陶隱居云大寒凝海惟酒不冰明其性熱藥家多有以行其勢人飲之使體弊神昏是其有毒故也陳藏器云通血脈潤皮膚又云諸米酒有毒靈樞營衛生會篇人飲酒亦入胃酒者熟谷之液也其氣悍以清經脈篇諸脈之浮而常見者皆絡脈也脈度篇支而橫者為絡酒入於胃其氣迅疾慓悍外而皮膚絡脈內而五藏陰陽無所不走其流弊如此此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱遍於身內熱而若赤也夫酒氣盛而慓悍腎氣有衰陽氣獨勝故手足為之熱也王冰曰醉飽入房內亡精氣中虛熱入由是腎衰陽盛陰虛故熱主於手足也吳昆曰慓悍強暴也腎氣陰氣也張志聰曰夫飲酒數醉則悍熱之氣反從外而內而酒氣聚於脾中飽以入房則穀食留於胃中脾氣不能轉輸其精液而穀氣聚於脾中矣氣聚於中而不得散酒氣與穀氣交相侵薄則熱盛於中中土之熱灌於四旁故熱遍於身入胃之飲食不能遊溢精氣下輸膀胱故內熱而溺赤夫腎為水藏受水穀之精而藏之酒氣熱盛而慓悍則腎藏之精氣日衰陰氣衰於下而陽氣獨勝於中故手足為之熱張兆璜曰寒厥因失其所藏之陽而致中氣日損熱厥因傷其所生之陰而致腎氣日衰當知中下二焦互相資生者也張應略曰上古之人飲食有節起居有常不妄作勞今時之人以酒為漿以妄為常醉以入房是人所當調養者陰陽精氣耳苟得其養可同歸於生長之門苟失其養則為暴僕卒厥馬蒔曰醉飽以入房下氣上爭聚於脾中脾胃既受穀氣又受酒氣熱盛於中故熱遍於身自內形外也其內熱以溺赤為驗夫酒氣本盛而慓悍惟腎陰既衰胃陽獨勝手足皆為之熱者宜也張介賓曰數醉若飽入房者既傷其脾復傷其腎皆陰虛也故手足為熱驥案酒既內外陰陽無所不走又飽以入房輕則致疾重則戕生史記倉公傳御史成病癰疽得之酒且內死山跗病肺消疸得之內死潘滿如病少腹痛得之酒且內死趙章病迵風得之酒死司空命婦出於病風入中得之接內濟北王阿母病熱厥得之飲酒大醉陽虛候病痹得之內成開方病風得之數大醉公乘項處病牡疝得之內倉公治驗凡二十一案凡得之酒色者多不治此腎氣有衰陽氣獨盛所謂孤陰不生獨陽不長不生不長亡可立待此酒色之所以垂戒萬世也靈樞五癃津液別篇五穀之精液和合而為高者內滲入於骨空補益腦髓而下流於陰股張志聰曰此言精液之為髓也夫腎主藏精而主骨和合而高者五穀之液與腎藏之精相和合而滲入於骨空上行而高從骨空而補益腦髓復從髓空而下流陰股此精液淖注於骨而為髓先上益於腦而復下流故曰五穀之精液和合而為高者姚氏曰本經曰谷入氣滿淖澤注於骨骨屬屈伸補益腦髓是謂液又曰腎者精之處也其華在發其充在骨是谷之液腎之精並注於骨而為髓髓者以腦為主故曰和合而高者馬蒔曰高當作膏此原水脹之所成也五穀精液和而成為膏者滲入於骨空之中及補益腦髓以下流於陰股張介賓曰此津液為精髓也膏脂膏也精液和合為膏以填補於骨空之中則為腦為髓為精為血故上至巔頂得以充實下流陰股得以交通驥案馬注高當作膏素問腹中論熱中消中不可服高梁芳草石藥禁高梁是不合其心通評虛實論消痹甘肥貴人則高梁之疾也膏皆作高高膏通用王充論衡五穀之於人也食之皆飽稻梁之味甘而多腴故能和合精液為膏也骨空骨節交會之空隙處神氣之所遊行出入者也素問第六十篇內論各證之治法當取刺於骨空故以骨空名篇腦之為狀形橢圓正中有溝分為左右兩部色灰白充滿於頭蓋之中下連脊髓為感覺運動之主宰中有汁漿又有腦筋西醫之説知腦髓之作用而不知腦髓之來歷所謂腦筋但言其去路而不知髓之來路所以無治髓之藥不知背脊一路髓筋是髓入於腦之路內經明言腎藏精精生髓以腎氣貫脊而生脊髓脊髓上循入腦為髓腦是腦非生髓之所乃聚髓之所髓之生既由於腎欲補腦者即從腎治又肝脈入腦交巔目系貫髓凡神魂暈迷風狂皆從肝治腦氣通鼻可從肺治腦筋入心可從心治腦筋聚在胃又可從胃治是五穀之精補五藏五藏之系連於髓而胃尤為髓筋所聚故為高以補髓也腦髓之義採自吾鄉唐氏書中又案經云腦髓骨脈膽女子胞此六者存於陰象於地名奇恆之府是腦髓骨三者三而一者也腎主骨骨中有髓腎系貫脊通於脊髓腎精足則入脊化髓上循入腦而為腦髓陰股腎之部故流陰股也靈樞論勇篇黃帝曰怯士之得酒怒不避勇士者何藏使然少俞曰酒者水穀之精熟谷之液也其氣慓悍其入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時固比於勇士氣衰則悔與勇士同類不知避之名曰酒悖也朱氏曰此復申明人之勇怯本於氣之弱壯氣之壯盛由胃府水穀之所生也酒者水穀之精熟谷之液其氣慓悍故能助氣之充滿而使肝膽浮橫然酒散則氣衰氣衰則悔矣故善養乎氣者飲食有節起居有常則形氣充足暴喜傷陽暴怒傷陰和其喜怒則陰陽不相失形氣壯盛雖遇烈風暴雨無由入其腠理而況四時之虛風乎倪氏曰氣之敢勇本於心之端直肝之大堅膽之汁滿是氣生於形也氣滿胸中而使肝浮膽橫是形本乎氣也形不離乎氣氣不離乎形此天之性命所以立形定氣以觀人之壽夭者也高士宗曰怯士之得酒與勇士同類即雖方大怒肝肺舉而氣衰復下相同蓋因酒因怒以壯其氣酒散氣衰則復怯矣故無暴其氣此善養乎大勇者也馬蒔曰酒為水穀之精熟谷之液此語又見營衛生會篇張介賓曰酒為水穀之液血為水穀之精酒入中焦必求同類故先歸血分凡飲酒者身面皆赤即其徵也然血屬陰而性和酒屬陽而氣悍血欲靜而酒動之血欲藏而酒亂之血無氣不行故血亂氣亦亂氣散血亦散擾亂一番而血氣能無損者未之有也又若人之稟賦藏有陰陽而酒氣之質亦有陰陽蓋酒成於釀其性則熱汁化於水其質則寒故陽藏得之則愈熱陰藏得之則愈寒所以縱酒不節者無論陰陽均為害凡熱盛而過飲者陽日勝則陰日消每成風疸腫脹寒盛而過飲者熱性去而寒質留多至傷腎敗脾當其少壯則旋耗旋生固無所覺及乎中衰而力有不勝則酒孽為殃莫御矣然則酒悖之為害也所關於壽元者非細可不知節乎驥案説文酒就也所以就人性之善惡也一言造也言吉凶所起造也書曰民用大亂喪德亦罔非酒為行越小大邦用喪亦罔非酒為辜酒不及亂亂乃悖也怯而為勇勇乃悖也經云肝合膽膽中精之府西醫言膽無能事只是化生膽汁膽汁循油膜入胃則飲食之物乃化是中焦精氣全賴於膽故曰中精之府又曰膽者中正之官決斷出焉西醫言膽汁乃肝血所生中國舊説言膽司相火乃肝木所生之氣究之有是氣乃有是汁膽司中正是以不懼西醫謂懼與不懼不關於膽而又不能另指一所如以汁論則膽汁多者其人不懼以氣論則膽火旺者其人不懼太過者非中則失其正是以有敢於橫暴之人不及亦非中亦失其正每存懼怯勇士出於天賦怯士惟酒使然故為惡為凶名為酒悖説膽本之吾鄉唐容川先生今拉雜言之靈樞五味篇黃帝曰願聞穀氣有五味其入五藏分別奈何伯高曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎穀氣津液已行營衛大通乃化糟粕以次傳下任谷廣𤲅曰此章論五臟六腑津液榮衛皆秉氣於胃府水穀之所生養夫谷入於胃其味有五各歸所喜津液各走其道穀氣津液已行榮衛大通所化之糟粕乃傳於小腸大腸循下焦而滲入膀胱也馬蒔曰此言五味各先走其所喜也肝喜酸心喜苦脾喜甘肺喜辛腎喜咸故穀氣之五味各先走之其曰水穀入於胃五臟六腑皆稟氣於胃即營衛生會篇所謂人受氣於谷谷入於胃以傳於肺五藏六府皆以受氣也其曰穀氣精液以行營衛大通乃化糟粕以次傳下即營衛生會篇所謂水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入於膀胱也張介賓曰玉版篇胃者水穀氣血之海也氣味之正者莫如水穀水穀入胃以養五藏故臟腑者皆稟氣於胃而胃五臟六腑之本五藏嗜欲不同各有所喜故五味之走亦各有所先然既有所先必有所後而生克佐使五藏皆有相涉矣至真要大論五味各有先入義與此同人受氣於谷故穀氣入於營衛其糟粕之質降為便溺以次傳下而出於大腸膀胱之竅驥案水穀入胃各走所喜金匱真言論東方味酸其穀麥生肝南方味苦其谷黍生心中央味甘其谷稷生脾西方味辛其谷稻生肺北方味鹹其谷豆生腎陰陽應象論酸生肝苦生心甘生脾辛生肺咸生腎五運行論肝味酸心味苦脾味甘肺味辛腎味鹹此五方之味五常政大論敷和之紀谷麻升明之紀穀麥備化之紀谷稷審平之紀谷稻靜順之紀谷豆委和之紀稷稻其味酸辛伏明之紀豆稻其味苦辛卑監之紀豆麻其味酸甘從革之紀麻麥其味苦辛涸流之紀黍稷其味甘鹹發生之紀麻稻其味酸甘辛赫曦之紀麥豆其味苦辛鹹敦阜之紀稷麻其味口口堅成之紀稻黍其味辛酸苦流衍之紀豆稷其味酸苦甘此五歲之谷五穀具五味五味入五藏五方五歲各有攸宜也黃帝曰榮衛之行奈何伯高曰谷始入於胃其精微者先出於胃之兩焦以溉五藏別出兩行榮衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入天地之精氣其大數常出三入一故谷不入半日則衰一日則氣少矣摶音團任氏曰此言入胃水穀所生之精氣先出於胃之兩焦以溉五藏兩焦上焦中焦也上焦出胃上口中焦亦並胃中故曰胃之兩焦谷入於胃以傳於肺五臟六腑皆以受氣別出兩行榮衛之道其清者為榮濁者為衛榮行脈中衛行脈外大氣宗氣也胸中膻中也其宗氣之摶而不行者積於胸中命曰氣海上出於肺循喉咽以司呼吸呼則氣出吸則氣入也天食人以五氣地食人以五味谷入於胃化其精微有五氣五味故為天地之精氣五穀入於胃也其糟粕津液宗氣分為三隧故其大數常出三入一蓋所入者谷而所出者乃化糟粕以次傳下其津液溉五藏而生榮衛其宗氣積於胸中以司呼吸其所出有三者之隧道故谷不入半日則氣衰一日則氣少矣余伯榮曰按本篇言大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入此宗氣之行於脈外也蓋肺主皮毛人一呼則氣出而八萬四千毛竅皆闔一吸則氣入而八萬四千毛竅皆開此應呼吸而司開闔者也邪客篇宗氣積於胸中出於喉嚨以貫心脈而行呼吸此宗氣之行脈中也一呼一吸脈行六寸晝夜一萬三千五百息脈行八百十丈為一周此應呼吸而脈行循度環轉者也故曰宗氣流於海其下者注於氣街其上者走於息道蓋行於脈外者直下注於氣街而充遍於皮毛也馬蒔曰此言谷化精微之氣者為營氣衛氣大氣以主三焦而氣乃出多入少故谷不得不續用也胃納穀氣脾乃化之其精微之氣先出於中焦升則行於上焦由肺而行於五臟六腑所以灌溉五藏也其降則中焦行於下焦而營氣生其升則下焦致於上焦而衛氣生別出兩行營衛之道其大氣即宗氣之摶而不行者積於上焦即胸中又名膻中命曰氣海上氣海主出於肺循咽喉而出入之鼻中出氣為呼則氣從是出入氣為吸則氣從是入一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸積至一晝一夜積行百八十丈矣但谷化之精氣呼則出之天地之精氣吸則入之其大數谷化之精氣出之者三分則天地之精氣入之者一分為其出多入少故人生半日不再用谷則谷化之精氣衰至一日則氣少故朝錯曰民生一日不再食則飢者正此意也張介賓曰谷之精氣先出於胃即中焦也而後至上下兩焦以溉五藏之至也溉灌注也兩行言清者入營營行脈中濁者入衛衛行脈外故營主血而濡於內衛主氣而布於外以分營衛之道大氣宗氣也摶聚也循由也氣海即上氣海一名膻中居於膈上蓋人有三氣營氣出於中焦衛氣出於下焦宗氣積於上焦出於肺由喉嚨而為呼吸出入故曰氣海人之呼吸通天地之精氣以為吾身之真氣故真氣所受於天與穀氣並而充身也然天地之氣從吸而入穀食之氣從呼而出總計出入大數則出者三分入止一分惟其出多入少故半日不食則谷化之氣衰一日不食則谷化之氣少矣知氣為吾身之寶而得養氣之玄者可以語道矣驥案此節統言人生之氣化三焦通行上下營衛運行內外宗氣斡旋於中上下內外中樞輪轉不休平人無病經云胃五竅者閭門也上下兩竅主消納水穀旁竅入三焦油膜之中中竅通脾主營衛又一竅上輸於肺司呼吸五竅之義已詳前注茲云先出於胃胃主中焦之至也之兩焦即上下兩焦共為三焦難經三焦者水穀之道路氣之所終始也故能主上下以溉五藏此精微之先出者也靈樞營衛生會篇清者為營濁者為衛營行脈中衛行脈外營周不休陰陽相貫如環無端故能運行內外此別出之道也氣海宗氣之所聚也靈樞海論膻中者為氣之海其輸上在於柱骨之上下氣海有餘則氣滿胸中悗息面赤氣海不足則氣少不足以言又氣海穴在臍下一寸半宛宛中為男子生氣之海蓋氣海有兩説一説丹田為氣海一説膻中為氣海以丹田為氣海者以呼吸歸根之地言也以膻中為氣海者指氣之出納言所謂君主之官是也營衛三焦運行於上下內外之間而得宗氣主持於其中故其晷刻度數不差纍黍差則病甚則危素問平人氣象論胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也盛喘數絶者則病在中結而橫有積矣絶不至者死又曰其動應衣宗氣泄也靈樞邪客篇宗氣積於胸中出於喉嚨以貫心脈而行呼吸之三者即三隧即人生氣化之大原西醫只從生理悟入所以不明氣化不知出三入一之妙理而以死法治生人故於中國醫學尚格格不能入也別詳三焦營衛篇靈樞血絡論新飲而液滲於絡而未合和於血也故血出而汁別焉其不新飲者身中有水久則為腫張志聰曰此言絡脈之血由水穀之津液注於皮膚肌腠滲於絡與血和合而化赤者也癰疽章中焦出氣如霧上注溪谷而滲孫脈津液和調變化赤而為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行蓋水穀入胃其津液隨三焦出氣以溫肌肉充皮膚復滲於孫絡與絡脈之血和合變化而赤刺之血出清而半為汁也其不新飲者身中有水久則為腫蓋言血乃水穀之津液所化若不新飲而出為汁者乃身中之水也按奇邪而不在經者謂皮膚之氣血從別絡而出於孫絡皮膚與經脈繆處此節論津液注於皮膚滲於絡脈與經脈之血和合是皮膚孫絡又與經脈相通而皮膚絡脈之氣血所從來又有一道蓋此篇假針以明陰陽血氣之生始出入學者當於針刺之外細體認其義焉馬蒔曰血絡而血出最清內有半清汁者何也正以新飲之際而液滲血絡未得和合於血故血出而半為汁也有刺血絡而髮針乃腫者何也正以不新飲者身中有水久則為腫陰氣積於陽分其氣聚於血絡之中故刺之時血尚未出而氣乃先行所以髮針而腫也張介賓曰新飲入胃未及變化而滲於絡故血汁相半水在肌表而因於絡陰氣積於陽分也刺之血未出而氣先行陰滯於陽而不易散也所以為腫靈樞玉版篇岐伯曰人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也張志聰曰此言胃府所生之氣血如雲氣之布散於天下者從臟腑之經隧布於四末充於皮膚分肉之間不入於經俞者也大絡者十二臟腑之經別也馬蒔曰試觀海之行雲氣者本於氣上為云而後雲氣行於天之下也胃之有氣血本於穀氣所化而後血氣行十二經之隧也是經隧者誠為五臟六腑之大脈絡耳張介賓曰人受氣於谷穀氣自外而入所以養胃氣也胃氣由中而發所以行穀氣也二者相依所歸則一故水穀入胃化氣化血以行於經隧之中是經隧為五臟六腑之大絡也
