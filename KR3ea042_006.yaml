body:
  text: 卷六五方素問金匱真言論東方青色其味酸其類草木王冰曰性柔脆而曲直吳昆曰洪範云木曰曲直曲直作酸張志聰曰天之五方氣血入通於臟以養五臟之精肝之精氣開竅於目而復通乎天氣是天氣通乎人而人氣通乎天也其陰精藏於本臟本神篇五臟主藏精者也木曰曲直曲直作酸馬蒔曰東方甲乙木其色青吾人之肝屬木故內入通於肝陰陽應象大論木生酸酸生肝故曰味酸肝性柔而能曲直故其類為草木張介賓曰東為木王之方肝為屬木之臟故相通也青者木之色目者肝之竅木之精氣藏於肝曰魂酸者木之味驥案楊上善云五方土地各異人食其土生病亦異療方各別東方萬物始生之方三命通會東方震位木號青龍其色青其味酸其性直其情和其畜雞王冰曰以雞為畜取巽言之易曰巽為雞吳昆曰易曰巽為雞巽東方木也其穀麥王冰曰五穀之長者麥故東方用之本草曰麥為五穀之長新校正云按五常政大論云其畜犬其谷麻馬蒔曰禮月令孟春仲春季春之月天子食麥與羊張介賓曰麥成最早故應東方春氣南方赤色其味苦其類火王冰曰性炎上而燔灼吳昆曰火曰炎上炎上作苦張志聰曰心屬火受南方之赤色入通於心而養精於內也邪氣臟腑篇十二經脈三百六十五絡其氣血皆上於面而走空竅其彆氣走於耳而為聽彆氣者心主之氣也此篇以心氣開竅於耳腎氣開竅於二陰者謂五藏之氣通於九竅九竅五藏皆通天氣也炎上作苦火之味心氣通於南方故與五行之火同類馬蒔曰南方丙丁火其色赤吾人之心屬火故內通於心陰陽象應大論火生苦苦生心故曰其味苦心屬火而上炎故曰其類火張介賓曰南方火王之方心為屬火之臟其氣相通赤者火之色耳者心之竅火之精氣藏於心曰神陰陽應象大論心在竅為舌腎在竅為耳可見舌本屬心耳則兼乎心腎也火之味苦驥案三命通會火屬南方號朱雀名曰炎上其色赤其味苦其性急其情菾淮南子地形訓南方陽氣之所積聚暑濕居之其畜羊王冰曰以羊為畜言其未也以土同王故通而言之新校正云按五常政大論其畜馬馬蒔曰五常政大論其畜馬而此曰羊者意以午未皆屬南方耳其谷黍王冰曰黍色赤馬蒔曰黍色赤故曰其谷黍張介賓曰黍之色赤糯小米也五常政大論其谷黍中央黃色其味甘其類土王冰曰性安靜而化造吳昆曰土爰稼穡稼穡作甘張志聰曰土旺四季居中央脾為土臟其氣相通黃者土之色口者脾之竅土爰稼穡稼穡作甘脾屬土故與五行之土同類馬蒔曰中央戊己土其色黃吾人之脾屬土土爰稼穡稼穡作甘故其味甘脾性安靜而統貫張介賓曰土旺四季位居中央脾為屬土之臟其氣相通黃者土之色口者脾之竅土之精氣藏於脾曰意土之味甘驥案楊上善雲中央為土故其氣平濕中土之所生物色也淮南子地形訓中央四道風氣之所通三命通會土名曰稼穡其色黃其味甘其性厚重其畜牛王冰曰土旺四季故畜取丑牛又以牛色黃也張志聰曰牛色黃而屬土故為脾畜馬蒔曰土旺四季而丑牛色黃故其畜牛張介賓曰牛屬醜而色黃也易曰坤為牛其谷稷王冰曰色黃而味甘也馬蒔曰稷之色黃而其味甘故其谷稷張介賓曰稷小米也粳者為稷糯者為黍為五穀之長色黃屬土西方白色其味辛其類金王冰曰性音聲而堅徑吳昆曰金曰從革從革作辛張志聰曰肺屬金故受西方之白色入通於肺鼻者肺之竅金曰從革從革作辛馬蒔曰西方庚辛金其色白吾人之肺屬金故內入通於肺陰陽應象大論金生辛辛生肺故其味辛肺主聲而堅徑故其類金張介賓曰西為金旺之方肺為屬金之臟其氣相通白者金之色鼻者肺之竅金之精氣藏於肺曰魄金之味辛驥案淮南子地形訓西方高土川穀出焉三命通會名曰從革其色白其味辛其性剛其情烈其畜馬王冰曰畜馬者取乾也易曰乾為馬新校正云按五常政大論其畜雞張志聰曰乾為馬肺屬乾金而主天馬蒔曰易以乾為金乾為馬故其畜馬其谷稻王冰曰稻堅白張志聰曰稻色白而秋成故為肺之谷馬蒔曰稻之性堅而色白故其谷稻張介賓曰稻堅而白故屬金北方黑色其味鹹其類水王冰曰性潤下而滲灌吳昆曰水曰潤下潤下作咸張志聰曰腎屬水故受北方之黑色腎在下故開竅於二陰夫臟真藏於內而五臟之氣發於外見於色是以五方之色入通於臟以養五臟之精而藏氣復外通於九竅其真精藏於內也水曰潤下潤下作咸馬蒔曰北方壬癸水其色黑吾人之腎屬水故內入通於腎陰陽應象大論水生鹹鹹生腎故其味鹹腎主水而性潤故其類水張介賓曰北為水旺之方腎為屬水之臟其氣相通黑者水之色二便者腎之竅水之精氣藏於腎曰志水之味鹹也驥案楊上善云北方為冬為萬物閉藏之方其地漸高如陰中之陰淮南子地形篇北方幽暗不明天地之所閉三命通會水屬北方名潤下其色黑其味鹹其性聰明其情良善其畜彘王冰曰彘豕也張志聰曰彘豕也色黑而屬亥馬蒔曰易曰坎為豕腎之所屬在坎故其畜彘彘者豕也張介賓曰彘豬也易曰坎為豕其谷豆王冰曰豆黑色張志聰曰豆黑色而性沉故為水之谷馬蒔曰豆主黑色故其谷豆本草以豆之黑色者入藥張介賓曰菽也黑者屬水素問陰陽應象論東方生風王冰曰陽氣上騰散為風也風者天之號令風為教始故生自東方張志聰曰風乃東方春生之氣故主生風馬蒔曰東方主春陽氣上升故東方生風張介賓曰風者天地之陽氣東者日升之陽方故陽生於春春旺於東而東方生風驥案天地之間六合之內不離乎五天有六氣風寒暑濕燥火然火暑同為一氣六氣亦五行也地有五行木火土金水然火有相火有君火五行猶六氣也漢書藝文志五行者五常之形氣也其說以支幹歲時日月為本古之陰陽五行家以漢志五行志洪範大傳為其嚆矢後世為其學者天下萬事萬物莫不以五行推之至於醫學上通天文下察地紀人在上下氣交之中其於陰陽五行生剋勝復之理無不息息相通小儒等之星命卜筮占候之流排而去之史家列之方技輕而賤之是亦不知醫之為道大也殊非通論素問玉機真藏論東方木也萬物之所始生風生木王冰曰風鼓木榮則風生木也張志聰曰寅卯應木春氣之所生也馬蒔曰風鼓則木榮故風生木木生酸王冰曰凡物之味酸者皆木氣之所生也尚書洪範曲直作酸吳昆曰諸味入木變而為酸張志聰曰地之五行生陰之五味馬蒔曰木之性曲直作酸故木生酸張介賓曰洪範木曰曲直曲直作酸故凡物之味酸者皆木氣之所化酸生肝王冰曰生謂生長也凡味之酸者皆先生長於肝吳昆曰酸味養肝張志聰曰陰之所生本在五味故酸生肝此言內之五臟外生筋骨皮肉皆收受四時五行之氣味而相生故曰外內之應皆有表裡也馬蒔曰人生之肝屬木木性屬酸故酸生肝張介賓曰酸先入肝在味為酸王冰曰酸可用收斂也吳昆曰木味酸張志聰曰木之味酸傷筋王冰曰過節也吳昆曰酸過其節必傷於筋張志聰曰能養我者亦能傷我馬蒔曰在味為酸酸木過則傷筋張介賓曰酸走筋過則傷筋而拘攣辛勝酸王冰曰辛金味故勝木酸張志聰曰辛勝酸金勝木也馬蒔曰惟西方味辛為能勝酸此皆金能剋木故制其所勝者如此張介賓曰辛金味故勝木酸南方生熱王冰曰陽氣炎燥故生熱吳昆曰南方以火王故生熱張志聰曰南方主夏令故生熱馬蒔曰南方陽氣炎蒸故生熱張介賓曰陽極於夏夏王於南故南方生熱驥案玉機真藏論南方火也萬物之所長熱生火王冰曰鑽燧改火惟熱是生吳昆曰熱極則生火故鑽燧者熱盛則火出張志聰曰火生熱今以在天之熱而生火正陰陽不測之變化張介賓曰熱極則生火火生苦王冰曰凡物之味苦者皆火氣之所生尚書洪範炎上作苦張志聰曰炎上作苦火生苦味也馬蒔曰熱極則生火火性炎上其味作苦故火生苦張介賓曰洪範火曰炎上作苦故物之味苦者由火氣之所化苦生心王冰曰凡味之苦者皆先生長於心吳昆曰苦味養心張志聰曰苦心之味味為陰臟亦為陰故味生臟馬蒔曰人心屬火火性屬苦故苦生心張介賓曰苦先入心在味為苦王冰曰苦可用燥泄也吳昆曰物由火變則味苦張志聰曰火之味也苦傷氣王冰曰以火生也新校正云詳此篇論所傷之旨其例有三東方云酸傷筋中央云濕傷肉甘傷肉是自傷者也南方云熱傷氣苦傷氣北方云寒傷血咸傷血是傷己所勝也西方云熱傷皮毛是被勝傷己辛傷皮毛是自傷者也凡此五方所傷有此三例不同太素則俱云自傷吳昆曰苦從火化故傷肺氣張志聰曰苦乃火味故亦傷氣馬蒔曰在味為苦苦太過則傷氣張介賓曰苦從火化故傷肺氣火剋金也又如陽氣性升苦味性降氣為苦遏則不能舒伸故苦傷氣咸勝苦王冰曰鹹水味故勝火苦馬蒔曰惟北之咸為能勝苦此皆水能剋火故制其所勝者如此張介賓曰氣為苦傷而用鹹勝此自五行相制之理若以辛助金而以甘泄苦亦是捷法蓋氣味以辛甘為陽酸苦鹹為陰陰勝者制之以陽陽勝者制之以陰何非勝復之妙而其中宜否則在乎用之權變耳驥案張說亦精中央生濕王冰曰陽氣盛薄陰氣固升升薄相合故生濕也易義曰陽上薄陰陰能固之然後蒸而為雨明濕生於固陰之氣也新校正云按楊上善曰六月四陽二陰合蒸以生濕氣也吳昆曰中以土王土氣為濕張志聰曰中央主土而溉灌四旁故生濕馬蒔曰中央主長夏長夏者六月建未之月也四陽盡見二陰已生陽氣薄陰陰能固之蒸而為雨其濕遂生正合遁卦驥案玉機真藏論脾者土也孤臟以灌溉四旁者也濕生土王冰曰土濕則固明濕生也新校正云按楊上善云四陽二陰合而為濕蒸腐萬物成土也張志聰曰在天為氣在地成形以氣而生形也馬蒔曰濕氣薰蒸濁氣下凝故濕生土張介賓曰濕潤則土氣王而萬物生土生甘王冰曰凡物之味甘者皆土氣之所生也尚書洪範稼穡作甘吳昆曰諸味入土變而為甘張志聰曰土主稼穡稼穡作甘馬蒔曰土氣衝和故土生甘張介賓曰洪範稼穡作甘凡物之味甘者皆土氣之所化甘生脾王冰曰凡物之甘者皆先生長於脾張志聰曰地食人以五味甘先入脾故主生脾馬蒔曰五臟唯脾屬土甘味主之故甘生脾張介賓曰甘先入脾在味為甘王冰曰甘可用寬緩也吳昆曰土味甘張志聰曰土之味也甘傷肉王冰曰亦過節也新校正云五運行大論甘傷脾吳昆曰過於甘也張志聰曰味傷形也馬蒔曰在味為甘甘太過者則傷肉酸勝甘王冰曰酸木味故勝土甘馬蒔曰唯木味之酸為能勝甘此皆木能剋土故制其所勝如此西方生燥王冰曰天氣急切故生燥吳昆曰西方金主金氣為燥張志聰曰西方主秋金之令故其氣生燥馬蒔曰西方主秋生燥張介賓曰金王西方其氣化燥驥案玉機真藏論西方者金也萬物之所以收成燥生金王冰曰金燥有聲則生金也張志聰曰因氣而生形張介賓曰燥則剛徑金氣所生金生辛王冰曰凡物之味辛者皆金氣之所生也尚書洪範從革作辛吳昆曰諸味入金變而為辛張志聰曰因形而成味馬蒔曰金之性從革作辛凡物之味辛者皆金氣之所生故金生辛辛生肺王冰曰凡味之辛者皆先生長於肺吳昆曰辛味養肺張志聰曰因味而生臟馬蒔曰人之五臟惟肺屬金故辛生肺張介賓曰辛先入肺在味為辛王冰曰辛可用散潤也吳昆曰物由金變則味辛張志聰曰金之味也辛傷皮毛王冰曰過而招損吳昆曰辛主發散故過於辛者傷乎皮毛張志聰曰氣主皮毛辛散氣故傷皮毛馬蒔曰在味為辛辛之過者則傷皮毛苦勝辛王冰曰苦火味故勝金辛張志聰曰火味勝金馬蒔曰惟火味之苦為能勝辛此皆火能剋金故制其所勝者如此北方生寒王冰曰陰氣凝冽故生寒也吳昆曰北方水王水氣為寒張志聰曰北方主水故生寒馬蒔曰北方主鼕鼕時陰氣凝冽張介賓曰水王北方其氣化寒驥案玉機真藏論北方者水也萬物之所以合藏寒生水王冰曰寒氣盛凝變為水張志聰曰形生氣而氣生形也馬蒔曰寒則水氣濡潤故寒生水張介賓曰寒氣陰潤其化為水水生咸王冰曰凡物之味鹹者皆水氣之所生也尚書洪範潤下作咸吳昆曰物從水變則寒張志聰曰水味鹹故寒生於水馬蒔曰水性潤下凡物之味鹹者皆水氣之所生故水生咸咸生腎王冰曰凡味之咸者皆先生長於腎吳昆曰鹹味養腎馬蒔曰腎主水寒性屬水張介賓曰咸先入於腎在味為咸王冰曰咸可用柔軟也吳昆曰水味鹹張志聰曰水之味也咸傷血王冰曰食鹹而渴傷血可知新校正云太素血作骨張志聰曰咸走血過食鹹則傷血馬蒔曰在味為鹹鹹之過則傷血張介賓曰咸從水化故傷心血水勝火也甘勝咸王冰曰甘土味故勝火咸新校正云詳自前岐伯對曰至此與五行論同兩注頗異當並用之張志聰曰甘為土味故能勝咸馬蒔曰惟五味之甘為能勝咸此皆土能剋水故制其所勝者如此素問五運行論東方生風王冰曰東者日之初風者教之始天之使也所以發號施令故生自東方也景霽山昏蒼埃際合崖谷若一岩岫之風也黃白昏埃晚空如堵獨見天垂川澤之風也加以黃黑白埃承下山澤之猛風也吳昆曰此原東方生生之理明此者可以治肝可以治心馬蒔曰東方生風者天六入之風居東方地體中為生生之始也自風而生木酸肝筋心矣驥案尚書大傳東方者動方也物之動也淮南子天文訓東方木也其帝太皞其佐句芒木生於寅壯於卯死於未三辰皆木也漢書震在東方為春為木木曰曲直田獵不宿飲食不享出入不節及有奸謀則木不曲直風生木王冰曰陽生風鼓草木敷榮故曰風生木也此和氣之生化也木生酸王冰曰萬物味酸者皆始自木氣之生化也酸生肝王冰曰酸味入胃生養於肝臟張志聰曰五方生天之五氣五氣生地之五行而生五臟五臟生外之五體蓋人秉天地五方之氣味而生成者也張介賓曰此東方之生化也明此者可以治肝補心其味為酸王冰曰夫物之化之變而有酸味者皆木氣之所成敗也今東方之野生味多酸酸傷筋王冰曰酸瀉肝氣瀉盛則傷其氣靈樞經曰酸走筋筋病無多食酸以此爾走筋謂宣行其氣速疾也血氣肉骨同新校正云詳注云靈樞經云乃是素問宣明五氣篇之文按甲乙經以此為素問王云靈樞經者誤也辛勝酸王冰曰辛金味故勝木之酸酸余則勝之以辛也吳昆曰此東方木氣偏勝為病平以西方金令也南方生熱王冰曰陽盛所生相火君火之政也太虛昏翳其若輕塵山川悉然熱之氣也大明不彰其色如丹鬱熱之氣也若彤雲暴升嵸然葉積乍盈乍縮崖谷之熱也吳昆曰此原南方生生之理明此者可以治心可以生脾馬蒔曰南方生熱者天六入之熱居南方地體中為生長之始也自熱而生火苦心血脾矣驥案禮記南方者夏夏之為言假也長之養之假之仁也淮南子天文訓南方火也其帝炎帝其神祝融火生於寅壯於午死於戌三辰皆火也漢書離在南方為夏為火火曰炎上棄法律逐功臣殺太子以妾為妻則火不炎上熱生火王冰曰熱盛之氣火運盛明故曰熱生火火者陽盛之生化也熱氣施化則炎暑鬱燠其為變極則燔灼銷融火生苦王冰曰物之苦味者皆始自火之生化也甘物遇火體焦則苦苦從火化其可徵也苦生心王冰曰苦物入胃化入於心張介賓曰此南方之生化也明此者可以治心補脾其味為苦王冰曰物之化之變而有苦味者皆火氣之所合散也今南方之野生物多苦苦傷氣王冰曰大凡如此爾苦之傷氣以其燥也苦加以熱則傷尤甚也何以明之飲酒氣促多則喘急此其信也苦寒之物偏服歲久益火滋甚亦傷氣也暫以方治乃同少火反生氣也咸勝苦王冰曰酒得咸而解物理昭然火苦之勝制以水咸吳昆曰此南方火氣偏勝為病平以北方水令也中央生濕王冰曰中央土也高山土濕泉出地中水源山隈云生岩谷則其象也土性內蘊動而為用則雨降云騰中央生濕不遠信矣故歷候記土潤溽暑於六月謂是馬蒔曰天六入之濕居中央地體中為生化始自濕而生土甘脾肉驥案淮南子天文訓中央土其帝黃帝其神后土土生於午壯於戌死於寅三辰皆土濕生土王冰曰濕氣內蘊土體乃全濕則土生干則土死死則庶類凋喪生則萬物滋榮此濕氣之化爾濕氣施化則土宅而云騰雨降其為變極則驟注土崩也土生甘王冰曰物之味甘者皆始自土之生化也甘生脾王冰曰甘物入胃先入於脾吳昆曰此原中央生生之理明此者可以治脾可以補肺張介賓曰此中央之生化其味為甘王冰曰物之化之變而有甘味者皆土化之所終始也今中原之地物味多甘淡甘傷脾王冰曰過節也新校正云按陰陽應象大論甘傷肉酸勝甘王冰曰甘余則制之以酸所以救脾氣吳昆曰此中央土氣偏勝為病平以東方木令也西方生燥王冰曰陽氣已降陰氣復升氣爽風徑故生燥也夫岩谷青埃川源蒼翠煙浮草木遠望氤氳此金氣所生燥之化也夜起白朦輕如微霧遐邇一色星月皎如此萬物陰成亦金氣所生白露之氣也太虛埃昏氣鬱黃黑視不見遠無風自行從陰之陽如雲如霧此殺氣也亦金氣所生霜之氣也山谷川澤濁昏如霧氣鬱蓬勃慘然戚然咫尺不分此殺氣將用亦金氣所生運之氣也天雨大霖和氣西起云卷陽曜太虛廓清燥生西方義可徵也吳昆曰此原西方生生之理明此可以治肺可以保腎馬蒔曰西方生燥者天六入之燥居西方地體中生收之始也自燥而生金辛肺皮毛腎矣驥案淮南子天文訓西方金也其神少昊其佐蓐收又金生於己壯於酉死於丑三辰皆金也漢書兌為西方為秋為金金曰從革好戰攻輕百姓飾城郭侵邊境則金不從革燥生金王冰曰氣徑風切金鳴聲遠燥生之信視聽可知此則燥化能令萬物堅定也燥之施化於物如是其為變極則天地悽慘肅殺氣行人悉畏之草木凋落金生辛王冰曰物之有辛味者皆始自金化之所成也辛生肺王冰曰辛物入胃先入於肺張介賓曰此西方之生化也明此者可以治肺補腎其味為辛王冰曰夫物之化之變而有辛味者皆金氣之所離合也今西方之野草木多辛辛傷皮毛王冰曰過節也辛熱又甚焉苦勝辛王冰曰苦火味故勝金之辛吳昆曰此西方金氣偏勝為病平以南方火令也舊作熱傷皮毛寒勝熱昆僭改燥傷皮毛熱勝燥北方生寒王冰曰陽氣伏陰氣升政布而大行故寒生也太虛澄淨黑氣浮空天色黯然高空之寒氣也若氣似散麻本末皆黑微見川澤之寒氣也太虛清白空猶雪映遐邇一色山谷之寒氣也太虛白昏火明不翳如霧雨氣遐邇肅然北望色玄凝氛夜落此水氣所生寒之化也太虛凝陰白埃昏翳天地一色遠視不分此寒濕凝結雪之將至也地裂水冰河渠乾涸枯澤浮鹹水斂土堅是土勝水水不得自清水所生寒之用也吳昆曰此原北方生生之理明此者可以治腎可以補肝馬蒔曰北方生寒者天六入之寒居北方地體中為生藏之始也自寒而生水咸腎骨肝矣驥案淮南子天文訓北方水也其帝顓頊其佐玄冥水生於申壯於子死於辰三辰皆水也漢書坎在北方為冬為水水曰潤下簡宗廟不禱祠廢祭祀逆天時則水不潤下河圖括地象西方為天門東方為地戶天門無上地戶無下孟康曰上方謂北與東也陽氣所萌生故為上下方謂南與西也陰氣所萌生故為下周禮高者為生下者為死物理論西北高東南下東西長南北短寒生水王冰曰寒資陰化水所由生此寒氣之生化爾寒氣施化則水冰雪氛其為變極則水涸冰堅水生咸王冰曰物之有寒味者皆始自水化之所成結水澤枯涸滷咸乃蕃滄海味鹹鹽從水化則咸因水産其事炳然煎水味鹹近而可見咸生腎王冰曰鹹入於胃先歸於腎張介賓曰此北方之生化也明此者可以治腎補肝其味為咸王冰曰夫物之化之變而有鹹味者皆水化之所凝散也今北方川澤地多鹹鹵咸傷血王冰曰味過於咸則咽乾引飲傷血之義斷可知矣甘勝咸王冰曰渴飲甘泉咽乾自已甘為土味故勝水咸吳昆曰此北方水氣偏勝為病平以中央土令也驥案五行生五味諸家不詳所以惟黃坤載謂木性升髮直則升曲則鬱鬱而不升是以作酸金性收斂從則降革則滯而不降是以作辛金木能升降水火木直則腎水隨木而左升金從則心火隨金而右降木曲而不直故腎水潤下而作咸金革而不從故心火炎上而作苦若交濟水火升降金木其權總在於土土者水火金木之中氣左旋則化木火右轉則化金水實四象之父母不苦不咸不酸不辛是以作甘己土不升則水木下陷而作酸鹹戊土不降則火金上逆而作苦辛緣土主五味四象之酸苦辛鹹皆土氣之中郁也四象各含土氣土鬱則傳四臟而作諸味故調和五臟之原職在中宮也此說實發前人所未發宜參究素問五常政大論天不足西北左寒而右涼地不滿東南右熱而左溫其故何也王冰曰面巽言也吳昆曰陽精降於下陰精奉於上陰陽交泰之理也左熱而右溫左寒而右涼五行奠位之理也張志聰曰天有陰陽地有陰陽故論天之五運而復論地之四方左寒右涼右熱左溫者從後天之卦象也蓋後天之卦離南坎北震東兌西以天地開闢而後有四方也馬蒔曰此論天下之地勢病體治法壽夭有自四方而合言之者有自一方而分言之者天之不滿者西北其在正北則為左而其氣寒正西則為右而其氣涼地之不滿者東南其在正東則為左而其氣溫正南則為右而其氣熱左右皆人坐西北面東南而言張介賓曰天不足西北故西北為天門地不滿東南故東南為地戶五常政大論所謂戊己分者奎璧角軫則天地之門戶也義與此通此節以背乾面巽而言乾居西北則左為北右為西故左寒右涼巽居東南則右為南左為東故右熱左溫而四季之氣應之也驥案素問異法方宜論東方之域天地之所始生也魚鹽之地海濱傍水民食魚而嗜鹹魚者使人熱中鹽勝血南方者天地之所長養陽氣之所盛處也其地下水土弱霧露之所聚也民嗜酸而食胕致理而赤色此東溫而南熱也西方者金王之域沙石之所收引也民陵居而多風華食而脂肥邪不能傷其形體北方者天地所閉藏之域也其地陵居風寒冰凍民樂野處而乳食藏寒生滿病此西涼而北寒也岐伯曰陰陽之氣高下之理太少之異也王冰曰高下謂地形太少謂陰陽之氣盛衰之異今中原地形西北方高東南方下西方涼北方寒東方溫南方熱氣化猶然矣張志聰曰太少四象也東南方陽也陽者其精降於下故右熱而左溫王冰曰陽精下降故地氣溫而和之於下矣陽氣生於東而盛於南故東方溫而南方熱氣之多少明矣馬蒔曰伯言天氣為陽西北方高東南方下而陽精下降故南熱而東溫曆象新書星有極星北極高出於地三十六度常見不隱鄉飲酒禮天地溫厚之氣始於西北而盛於東南張介賓曰陽氣自上而降下東南方下故東方溫而南方熱陽始於東而盛於南也西北方陰也陰者其精奉於上故左寒而右涼王冰曰陰精奉上故地以寒而和之於上矣陰氣生於西而盛於北故西方涼北方寒君面巽而言臣面乾而對也新校正云詳天地不足陰陽之說亦具陰陽應象大論中馬蒔曰地為陰東南方下西北方高而陰精上升故北寒而西涼曆象新書南極下入於地三十六度常隱不見鄉飲酒禮天氣嚴凝之氣始於東南而盛於西北故高寒下熱張介賓曰陰氣自下而奉上西北方高故西方涼而北方寒陰始於西而盛於北也驥案河圖括地象西北為天門東南為地戶天門無上地戶無下孟康云上方謂北與東陽氣之所萌生下方謂南與西陰氣之所萌生周禮高者為生下者為死是以地有高下氣有溫涼高者氣寒下者氣熱新校正云按六元正紀大論至高之地冬氣常在至下之地春氣常在張志聰曰精者即太乙所生精水也天氣包乎下精氣通乎天故陰陽應象論天有精地有形蓋天為陽而精為陰陰陽上下之環轉也故降精於下則陽氣升上是以右熱而左溫陰精奉於上則陽氣藏於下故左寒而右涼西北為高東南地陷故高者氣寒下者氣熱驥案寒熱溫涼未可概論冬有非時之溫夏有非時之寒春有非時之燥秋有非時之暖又春氣西行秋氣東行夏氣北行冬氣南行卑下之地春氣常在高阜之地冬氣常在天不足西北而多風地不滿東南而多濕西北地厚安得人人皆實東南地薄安得人人皆虛久旱亢陽久雨亢陰陽盛人耐秋冬而不耐春夏喜陰寒而惡陽暄陰盛人耐春夏而不耐秋冬喜晴明而惡陰雨此又當別論也故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常太少之異耳王冰曰西北東南言其大也夫以氣候驗之中原地形所居者悉以居高則寒處下則熱嘗試觀之高山多雪平川多雨高山多寒平川多熱則高下寒熱可徵見矣中華之地凡有高下之大者東西南北各三分也其一者自漢蜀江南至海也二者自漢江北至平遙縣三者自平遙北山北至蕃界北海也故南分大熱中分寒熱兼半北分大寒南北分外寒熱尤極大熱之分其寒微大寒之分其熱微然其登陟極高山頂則南面北面寒熱懸殊榮枯倍異也又東西高下之別亦三矣其一者自汧源縣西至沙洲二者自開封縣西至汧源縣三者自開封縣東至滄海也故東分大溫中分溫涼兼半西分大涼大溫之分其寒五分之二大涼之分其熱五分之二溫涼分外溫涼尤極變為大暄大寒也約其大凡如此然九分之地寒極於東北熱極於南西九分之地其中有高下不同地高處則濕下處則燥此寒熱之中小異也若大而言之是則高下之有一也何者中原地形西高北高東下南下今百川滿湊東之滄海則東南西北高下可知一為地形高下故寒熱不同二則陰陽之氣有少有多故表溫涼之異爾今以氣候驗之乃春氣西行秋氣東行冬氣南行夏氣北行以中分校之自開封至汧源氣候正與歷候同以東行校之自開封至滄海每一百里秋氣至晚一日春氣發早一日西行校之自汧源縣西至蕃界磧石其以南向及西北東南者每四十里春氣發晚一日秋氣至早一日北向及東北西南者每一十五里春氣發晚一日秋氣至早一日南行校之川形有北向及東北西南者每五百里新校正云按別本作十五里陽氣行晚一日陰氣行早一日南向及東南西北川每一十五里熱氣至早一日寒氣至晚一日廣平之地則每五十里陽氣發早一日寒氣至晚一日北行校之川形有南向及東南西北者每二十五里陽氣行晚一日陰氣行早一日北向及東北西南川每一十五里寒氣至早一日熱氣至晚一日廣平之地則每二十里熱氣至晚一日寒氣至早一日大率如此然高處峻處冬氣常在平處下處夏氣常在觀其雪零草茂則可知矣然地土固有弓形川蛇形川月形川地勢不同生殺榮枯地同而天異凡此之類有離向丙向巽向乙向震向處則春氣早至秋氣晚至早晚校十五日有丁向坤向庚向兌向辛向乾向坎向艮向處則秋氣早至春氣晚至早晚亦校二十日是所謂帶山之地也審觀向背氣候可知寒涼之地腠理開少而閉多閉多則陽氣不散故適寒涼腹心脹也濕熱之地腠理開多而閉少開多則陽發散故往溫熱皮必瘡也下之則中氣不余故脹已汗之則陽氣外泄故瘡已吳昆曰之亦適也適寒涼之地則腠理閉密陽氣不疏泄故作內脹地之寒涼大者脹甚寒涼小者脹微適溫熱之地則腠理疏擴陽氣浮泄於表故作瘡瘍地之溫熱大者瘡甚溫熱小者瘡微下以治內汗以治外法之經也張志聰曰寒涼之方陰氣上奉則陽氣下藏故多脹所謂藏寒生滿病也溫熱之方陰氣下降則陽氣上升故多瘡所謂痛癢瘡瘍皆屬於火也故下之則陰精降而陽氣自升故脹者已汗乃陰液汗之則陰液升而陽氣降故瘡者愈馬蒔曰六元紀大論至高之地冬氣常在陰氣凝滯腹必成脹下之則脹已至下之地春氣常在邪氣易感體必生瘡汗之則邪散故瘡已張介賓曰雖為腠理開閉之常然寒熱甚者病則甚微者病則微乃有大小之異耳驥案汗下之法內經不一其例素問熱論未滿三日者可汗而已其滿三日者可泄而已陰陽應象大論因其輕而揚之其有邪者漬形以為汗其在皮者汗而發之其下者引而竭之中滿者瀉之於內其實者散而瀉之湯液醪醴論開鬼門潔淨府又身汗得後利實者活發腠理致津液通氣諸凡言汗下者不勝枚舉詳見內經方方宜篇帝曰其於壽夭何如王冰曰言土地居人之壽夭岐伯曰陰精所奉其人壽陽精所降其人夭王冰曰陰精所奉高之地也陽精所降下之地也陰方之地陽不妄泄寒氣外持邪不數中而正氣堅守故壽延陽方之地陽氣耗散發泄無度風濕數中真氣傾竭故夭折即事驗之今中原之境西北方衆人壽東南方衆人夭其中猶各有微甚爾此壽夭之大異也張志聰曰陰精陽精當知地有精而天有精蓋在地為陰在天則為陽也張介賓曰陰精所奉之地謂崇高之處陽精所降之地謂汙下之處驥案此言壽夭特天地之常理耳若以人事言則陰精陽精老子所謂二五之精妙合而凝者也二五者天數五地數五土生數五成數五故土為萬物之母而水實為萬物之原無陽則陰無以生故生人之本火在水之先也無陰則陽無以化故生人之本水濟火之次也經所謂陽生陰長而火更為萬物之父也是以維持一身長養百體者臟腑之精氣主之充足臟腑固注元氣者兩腎主之其為兩腎之用生生不盡上奉下降妙合而無間者此惟陰精陽精而已二精充足其人多壽二精衰弱其人多夭二精平調其人無病二精偏勝其人多病二精絶滅其人則死可見陰陽二精所以為先天之本後天之命二腎之根或壽或夭在乎人之自為天地不得而主之人為天地之心為三才之一其可不明壽夭之理而調理陰陽之二精乎帝曰善其病也治之奈何岐伯曰西北之氣散而寒之東南之氣收而溫之所謂同病異治也王冰曰西方北方人皮膚腠理密人皆食熱故宜散宜寒東方南方人皮膚疏腠理開人皆食冷故宜收宜溫散謂溫浴使中外條達收謂溫中不解表也今土俗皆反之依而療之則反甚矣新校正云詳分方為治亦具異法方宜論中吳昆曰西北氣寒寒固於外熱鬱於內故宜散其外寒清其內熱東南氣熱氣泄於外寒生於內故宜收其外泄溫其內寒若此者同謂之病治法異也故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也假者反之王冰曰寒方以寒熱方以熱溫方以溫涼方以涼是正法也是同氣也行水漬之是湯浸漬也平謂平調也若西方北方有冷病假熱方溫方以除之東方南方有熱疾須涼方寒方以療者則反上正法以取之吳昆曰病有陰陽藥亦有陰陽其升降浮沉之間必同其氣可使平也或假寒治寒假熱治熱此借之以為反治也張志聰曰西北之人病寒邪而假熱者又當治以溫熱東南之人病熱邪而假寒者又當治以寒涼所謂假者反之張玉師曰上節論四方之正氣末句言四方之邪氣張介賓曰天氣地氣有陰陽升降病治亦有陰陽升降用合氣宜是同其氣而病可平然西北未必無假熱東南未必無假寒假者反治則西北有當熱東南有當寒者矣然余備歷南北還是熱方多熱病寒方多寒病又不可不知也驥案經言治病有逆從正反諸法其治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之是固有逆者正治從者反治之法在惟病可正治者真形易見其應反治者假象難明茲先以寒熱言之真寒則其脈沉或微弱而遲病皆寒象逆而治之至陽證似陰火極似水乃熱極而反兼寒化而脈亦沉伏者是真熱假寒即陽盛格陰也真熱則其脈浮或滑大而數病皆熱象逆而治之至陰證似陽水極似火乃寒極而反兼熱化而脈且浮散者則真寒假熱即陰盛格陽也假寒假熱亦宜於反治故曰假者反之虛實真假可以類推帝曰善一州之氣生化壽夭不同其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之陽勝者先天陰勝者後天王冰曰先天謂先天時也後天謂後天時也悉言土地生榮枯落之先後也物既有之人亦如然張志聰曰此復論一方之氣而亦有陰陽寒熱之不同陽勝者四時之氣先天時而至陰勝者四時之氣後天時而至馬蒔曰高則陰氣升之而治陰勝者則陰性遲而凡土地之人物榮枯皆後天而至所以其人多後天而壽也下則陽氣降之而治陽勝者則陽性速而凡土地人物榮枯皆先天而治所以其人多先天而夭也張介賓曰觀孫真人曰嬰兒三歲以上十歲以下觀其性氣高下即可知其壽夭大略兒小時敏悟過人者多夭則項橐顏回之流是也小兒骨法成就威儀回轉遲舒稍費人精神鵰琢者壽其預知人意回旋速者亦夭則楊修孔融之流是也由此言之壽夭大略可知也亦由梅花蚤發不睹歲寒甘菊晚榮終於年事是知晚成者壽徵也此即先天后天之義此地理之常生化之道也帝曰其有壽夭乎岐伯曰高者其氣壽下者其氣夭地之小大異也小者小異大者大異王冰曰大謂東南西北相遠萬里許也小謂居所高下相近二十里三十里或百里許也地形高下懸倍不相計者以近為小則十里二十里高下平慢氣相接者以遠為小則三百里二百里地氣不同乃異也吳昆曰小者受氣少大者受氣多張志聰曰蓋寒暑往來皆從地之出也此地理高下厚薄之分陰陽出入之常也生化之道者謂生長收化藏之氣陽氣治之氣多生長陰氣治之氣多收藏徐振公曰此節論中土而兼於四方高者其氣收藏故多壽下者其氣發越故多夭一州之氣有大小之異也高下之小者小異大者大異異謂壽夭之異故治病者必明天道地理陰陽更勝氣之先後人之壽夭生化之期乃可以知人之形氣矣王冰曰不明天地之氣又陰陽之候則以壽為夭以夭為壽雖盡上聖救生之道畢經脈藥石之妙猶未免市中之誣斥也吳昆曰形以陰言氣以陽言也張志聰曰天道天之化運地理地之四方陰陽更勝者五運六氣之有太過不及有淫勝郁復也氣之先後者太過者先天不及者後天汙下者先天高厚者後天也靈樞曰形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭形充而皮膚緩者則壽形充而皮膚怠者則夭平人血氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣馬蒔曰西北陰勝而氣後東南陽勝而氣先張介賓曰不明天道則不知運氣之變不明地理則不知方土之宜不明陰陽更勝則本末俱失不明氣之先後則緩急倒施不明夭壽之期則中無確見而輕率招尤數者缺一不可因形以察人之外因氣以知人之內而治病之道庶保萬全
