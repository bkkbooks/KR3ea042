body:
  text: 卷八五宜素問五藏生成篇心欲苦王冰曰合火故也驥案周禮疾醫五味注醯酒飴蜜姜鹽之類疏謂醯即酸酒即苦飴蜜即甘姜即辛鹽即咸此即五味酸苦辛鹹甘注云攻其嬴養其不足者夏時病者則五味中食甘五穀中食稷以甘稷是土之合味土所剋水是攻嬴也土生於火土是火之子食甘稷是子養母之道是養不足也嬴與不足皆病非其所欲此言欲者其本也食醫凡和春多酸夏多苦秋多辛冬多咸調以滑甘言其本也疏夏多苦者南方火味苦屬夏夏時調和食苦多於餘味一分故云夏多苦秋多辛者金味屬秋秋時調和食辛亦多於餘味一分故云秋多辛春多酸者東方木味酸屬春調和宜酸多於餘味一分調以滑甘者中央土味甘屬季夏金木水火非土不藏於五行土為尊於五味甘為上故甘總調四味滑者通利往來亦所以調和四味故云調以滑甘秋多辛者西方金味辛屬秋秋時調和食辛多於餘味一分故云秋多辛冬多咸者北方水味鹹屬鼕鼕時調和食鹹亦多於餘味一分故云冬多咸多即此言欲也儒理醫理息息相通不通儒理不足言醫肺欲辛王冰曰合金故也肝欲酸王冰曰合木故也脾欲甘王冰曰合土故也此五味之所合也王冰曰各隨其欲而歸湊之馬蒔曰此言五藏有所欲之味乃其所合者也合者所謂相宜也陰陽應象大論南方生熱熱生火火生苦苦生心西方生燥燥生金金生辛辛生肺東方生風風生木木生酸酸生肝中央生濕濕生土土生甘甘生脾北方生寒寒生水水生鹹鹹生腎故心之所欲惟苦肺之所欲惟辛肝之所欲惟酸脾之所欲惟甘腎之所欲惟咸此乃五藏之氣合於五味故其所欲如此驥案五味所合謂五味合五藏也色味當五藏白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸王冰曰各當其所應而為色味也吳昆曰當合也張志聰曰當承也值也謂色味之應五藏色外而味內也故曰白當肺辛言辛生肺而肺生白也此復結五藏死生之色生於五藏之神氣五藏之神氣生於五味也馬蒔曰此以五色五味配五藏也驥案尚書洪範傳鹹苦酸辛甘五行之味五行有聲色氣味獨言味者以其切於民用也周禮疾醫五色注謂面貌之青赤黃白黑也疏五方東方木色青南方火色赤中央土色黃西方金色白北方水色黑素問藏氣法時論肝苦急急食甘以緩之王冰曰甘性和緩新校正云按全元起云肝苦急是氣有餘吳昆曰肝為將軍之官志怒而急急則自傷而苦之矣張志聰曰肝主春生怒發之氣馬蒔曰肝脈弦最苦在急急則肝病柔能治剛也驥案湯液本草肝苦急急食甘甘草心苦緩急食酸五味子脾苦濕急食苦白朮肺苦氣上逆急食苦訶子皮一作黃芩腎苦燥急食辛知母黃柏急有摧折之意緩之使遂其性心苦緩急食酸以收之王冰曰酸性收斂新校正云按全元起本云心苦緩是心氣虛吳昆曰心以長養為令志喜而緩緩則心氣散逸自傷其神矣馬蒔曰脈洪最苦在緩緩則心虛張介賓曰心藏神其志喜喜則氣緩而心虛神散驥案心主神明喜斂收之使遂其性脾苦濕急食苦以燥之王冰曰苦性乾燥吳昆曰脾以制水為事喜燥惡濕濕勝則傷脾土張志聰曰脾屬陰土喜燥惡濕苦乃火味故宜食苦張二中曰喜燥者喜苦氣以資生苦濕者惡所勝之乘侮馬蒔曰脾為太陰濕土最苦在濕濕則脾病張介賓曰脾以運化水穀制水為事濕勝則反傷脾土驥案脾主健運燥之使復其性肺苦氣上逆急食苦以泄之王冰曰苦性宣泄肺用之新校正云按全元起云肺氣上逆是其氣有餘吳昆曰肺為清虛之藏行降下之令若氣上逆則肺苦之張介賓曰肺主氣行治節之令氣病則上逆於肺驥案肺為氣主常則順變則逆泄之則順而不逆矣腎苦燥急食辛以潤之開腠理致津液通氣也王冰曰辛性津潤也然腠理開津液達則肺氣下流腎與肺通故云通氣也吳昆曰腎者水藏喜潤而惡燥若燥則失潤澤之體而苦之辛者金之味能開腠理而泄其燥能治津液而使之潤又能通氣而令氣化也馬蒔曰宜食辛者以潤之如黃柏之類庶乎腠理自開津液自致五藏之氣自相通也張介賓曰辛從金化水之母也其能開腠理致津液者以辛能通氣也水中有真氣惟辛能達之氣至水亦至故可潤腎之燥驥案腎藏精與志而主五液本潤而惡燥故宜辛潤肝欲散急食辛以散之王冰曰以藏氣當散故以辛發散也陰陽應象大論辛肝發散為陽平人氣象論藏真散於肝言其當發散也吳昆曰肝木喜條達而惡抑鬱散之則條達張志聰曰肝氣受邪則木鬱而欲散馬蒔曰肝既有病則治之者當順其性而治之故肝之所苦在急則其所欲在散味辛主散驥案湯液本草肝欲散急食辛以散之川芎以辛補之細辛以酸瀉之芍藥虛以生薑陳皮之類補之經曰虛則補其母水能生木腎乃肝之母腎水也苦以補腎地黃黃柏是也如無他證錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心又扶蘇條達木之象也升發開展魂之用也辛散以解其鬱即補也用辛補之酸瀉之王冰曰辛味散故補酸味收故瀉新校正云按全元起本云用酸補之辛瀉之自為一義吳昆曰順其性為補反其性為瀉張志聰曰按歲運厥陰之勝以酸瀉之少陰之勝以甘瀉之太陰之勝以苦瀉之又曰木位之主其瀉以酸其補以辛火位之主其瀉以苦其補以鹹土位之主其瀉以苦其補以甘金位之主其瀉以辛其補以酸水位之主其瀉以咸其補以苦五味陰陽之用辛甘發散為陽酸苦湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅以所利而行之調其氣使其平也夫肝病者厥陰之勝也邪盛則正虛故以辛之發散以散其木鬱以辛之潤以補其肝氣以酸之瀉以瀉其餘邪所謂以所利而行之調其氣使其平也余藏准此馬蒔曰性欲散而辛能散此補之者所以用辛性苦急而酸能收此瀉之者所以用酸張介賓曰木不能郁故欲以辛散之肝喜散而惡收故辛為補酸為瀉此下五藏補瀉之味與至真要大論主客正味義同心欲軟急食鹹以軟之王冰曰以藏氣好軟故以咸柔軟也平人氣象論藏真通於心言其常欲柔軟也吳昆曰萬物之生心皆柔軟故心欲軟心病則剛燥宜食鹹蓋咸從水化故能濟其剛燥使軟也張志聰曰軟葉軟心為火藏心病則剛燥故宜食鹹以軟之馬蒔曰心欲軟惟咸為能軟堅驥案湯液本草心欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之人參黃耆甘草虛以炒鹽補之虛則補其母木能生火肝乃心之母肝木也以生薑補肝如無他證錢氏安神丸主之實則甘草瀉之如無他證錢氏方中重則瀉心湯輕則導赤散又心本和平邪熱乘之則躁急軟之而躁急堅徑之氣得復其平以下交於腎得既濟之道故為補用鹹補之甘瀉之王冰曰咸補取其柔軟甘瀉取其舒緩吳昆曰心火喜軟而惡緩張志聰曰鹹味下泄上湧而從水化能泄心氣以下交湧水氣以上濟水火既濟則心氣自益火欲炎散以甘之發散而瀉之馬蒔曰惟其所欲在軟此咸之所以為補惟其所苦在緩此甘之所以為瀉張介賓曰心火太過則為躁越故急宜食鹹蓋咸從水化能相濟也故以咸軟為補以甘緩為瀉脾欲緩急食甘以緩之王冰曰甘性和緩順其緩也吳昆曰脾以溫厚沖和為德故欲緩病則失其緩張志聰曰土德和厚故欲緩馬蒔曰脾欲緩惟甘者能緩驥案湯液本草脾欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連虛則以甘草大棗之類補之如無他證錢氏益黃散主之心脾之母以炒鹽補心實則以枳實瀉之如無他證以瀉黃散瀉之肺乃脾之子以桑白皮消肺又土爰稼穡稼穡作甘故能補用苦瀉之甘補之王冰曰苦瀉取其堅燥甘補取其安緩吳昆曰脾喜甘而惡苦張志聰曰脾病則土鬱故用苦味之湧泄以瀉奪之以甘之緩補之金匱要略五藏病各有所得者愈五藏病各有所惡隨其所不喜者為病是以順其所欲之味為補馬蒔曰惟甘能緩此甘之所以為補惟苦性堅燥此苦之所以為瀉張介賓曰脾貴充和溫厚其性欲緩喜甘惡苦肺欲收急食酸以收之王冰曰以酸性收斂故也吳昆曰肺以收斂為德主秋令故欲收張志聰曰肺主秋收之令馬蒔曰肺欲收惟酸為能收驥案湯液本草肺欲收急食酸以收之白芍藥以辛瀉之桑白皮以酸補之五味子如無他證錢氏阿膠散補之脾乃肺之母以甘草補脾實則桑白皮瀉之如無他證以瀉白散瀉之腎乃肺之子以澤瀉瀉之又肺主上焦斂肅之政酸則能斂肺受熱邪辛則能瀉不斂則氣無所束是肺失其職也斂則其性遂而其職舉矣故酸又能補用酸補之辛瀉之王冰曰酸收斂故補辛發散故瀉張志聰曰用酸收以補正辛散以瀉邪馬蒔曰唯其所欲在收酸之所以為補所苦在散辛之所以為瀉張介賓曰肺應秋氣主收斂肺氣宜聚不宜散腎欲堅急食苦以堅之王冰曰以苦性堅燥也吳昆曰腎以寒水為象堅徑為德張志聰曰腎體沉石德性堅凝病則失其常馬蒔曰腎欲堅惟苦為能堅驥案湯液本草腎欲堅急食苦以堅之知母以苦瀉之黃柏以咸瀉之澤瀉虛則熟地黃柏補之腎本無實不可瀉錢氏只有補腎地黃丸無瀉腎之藥肺乃腎之母以五味子補腎又腎非堅則無以補作強之職遇濕則軟得冷則堅五味子遇咸則軟得苦則堅堅即補也用苦補之咸瀉之王冰曰苦補取其堅也咸瀉取其軟也軟濕土製也故用瀉之吳昆曰苦能堅之故謂補咸能軟堅故謂瀉張志聰曰以上論五藏之病而宜於藥食者五味各有所宜馬蒔曰惟其所欲在苦苦之所以為補所苦在軟咸之所以為瀉張介賓曰腎主閉藏氣貴周密故腎欲堅苦能堅故為補咸能軟堅故為瀉肝色青宜食肝粳米牛肉棗葵皆甘王冰曰肝性喜急故食甘物而取其寬緩也張志聰曰夫精明五色者氣之華也肝色青則其氣苦急故宜甘蓋五味所以養五藏之氣者也馬蒔曰東方甲乙木其色青肝屬木故色亦青肝苦急惟甘為能緩故宜食甘凡粳米牛肉棗葵皆甘皆可食驥案粳米即稻稻粳谷通名泛勝之云粳稻秫稻三月種粳稻四月種秫稻即並稻也孔子云食夫稻周官有稻人之職漢置稻田使者粳秫之別詳見內經方集釋湯液醪醴篇此當指秫稻言孫真人云糯米味甘脾之谷脾病宜食益氣止泄食醫心鏡糯米飲食之主溫中陳藏器云牛肉平消水腫除濕氣補宮令人強筋骨壯健食醫心鏡牛肉一斤熟蒸以姜醋空心食周禮食醫牛宜稌注牛味甘平稻味苦甘苦相成故牛宜稌本經大棗味甘平主安中養脾平胃氣吳氏本草主調中益脾服食令人受氣生津液葵有龍葵蜀葵此當是冬葵本經冬葵味甘寒主五藏六腑寒熱羸瘦利小便久服堅骨長肌肉別録葵為百菜主其心傷人藥性論滑平日華子久服堅筋骨秋葵即是種早者俗呼為葵菜唐本注此即常食者葵根也左傳葵能衛其足者是𥻿風七月烹葵及菽注菜名大莖小葉華紫黃色可茹肝宜食甘者中央土味於五行土為尊於五味甘為上周禮食醫調以滑甘注姜荁枌榆娩槁潃髓以滑之棗栗餳飴以甘之又曰牛宜稌稌稻也脾之谷牛土之肉肝食脾味土木無忤也金匱肝病宜先實脾心色赤宜食酸小豆新校正云甲乙經太素小豆作麻馬蒔曰南方丙丁火其色赤心屬火故色亦赤心苦緩唯酸為能收之故宜食酸凡小豆犬肉李韭皆酸皆可食也驥案別録大小豆共貫猶蔥薤義也大豆為黃卷小豆去煩熱食療去關節煩熱令人心孔開緑赤者並可食此當是赤犬肉李韭皆酸王冰曰心性喜緩故食酸物而取其收斂也張志聰曰心志喜喜則氣緩緩則心神懈馳故宜食小豆大李之酸以收養心氣驥案周禮食醫犬宜粱注犬味酸而溫補絶傷輕身益氣日華子酸補胃氣壯陽補腰膝補虛勞益氣力食醫心鏡脾胃冷弱和米鹽豉煮浮腫小便澀少熟蒸空腹服氣水鼓脹和米煮粥作羹臛吃亦佳陶隱居別本注李類甚多有緑李黃李紫李生李水李並堪食味熱甘美食醫心鏡李味酸主除固熱調中黃帝云李不可和蜜食食之損五藏此當是酸者別録韭味辛微酸溫歸心安五藏說文菜名一種而久者故謂之韭一歲而三四割之其根不傷至冬培壅之先春而復生信乎一種而久者也菜中此物最溫而益人宜常食之惟此菜殊辛臭不如蔥薤熟即無氣是養性所忌也黃帝云五月勿食又周禮七菹一日韭菹亦以韭為酸物心宜食酸者木火相生也肺色白宜食苦麥羊肉杏薤皆苦王冰曰肺苦氣逆故食苦物而取其宣泄也吳昆曰肺苦氣上逆急食苦以泄之張志聰曰肺色白其氣主秋金之降令而苦上逆馬蒔曰西方庚辛金其色白肺亦屬金故色亦白張介賓曰薤音械根白如小蒜爾雅翼云似韭非無實驥案圖經麥有大麥小麥穬麥蕎麥別録小麥味甘微寒大麥味鹹溫微寒穬麥味甘微寒蕎麥味甘平寒羊肉周禮食醫羊宜黍注羊味甘熱黍味苦溫甘苦相成別録味甘大熱無毒唐本注病瘥後食之發熱殺人本經杏核仁味苦溫主咳逆土氣別録實味酸不可多食傷筋骨食醫心鏡主氣喘促勝金方治久患肺氣喘急別録薤味辛苦溫除寒熱風寒食療治風熱食醫心鐿主赤白痢下皆肺主病也唯麥羊肉味不苦闕疑待考脾色黃宜食鹹大豆豕肉栗藿皆咸王冰曰究斯甘食乃調和機關之義也腎為胃關脾與胃合故假咸柔軟以利其關關利而胃氣乃行胃行而脾氣方化故應脾宜味與衆不同也新校正云按上文肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之此肝心肺腎食宜皆與前文合獨脾食鹹宜不用苦故王氏特注其義張志聰曰夫脾土之所以灌溉四藏者主上滲於心肺下泄於肝腎如脾苦濕則不能上滲土氣敦阜則不能下泄經曰酸苦湧泄為陰鹹味滲泄為陰故宜食苦者取其燥土氣以湧滲於上宜食鹹者取其行土氣以滲泄於下馬蒔曰中央戊己土其色黃脾亦屬土故色亦黃張介賓曰咸從水化其氣入腎驥案衍義大豆有緑褐黑三種亦有大小兩等別録味甘平逐水脹除胃中熱蜀本注煮食之主溫毒水腫日華子黑豆調中圖經作豉極冷黃卷及醬皆平食了勿食豬肉必壅氣致死食醫心鏡理胃中熱去身腫豉和炒食極熱煮食之及作豉及醬平本味甘不言鹹鹹者或如圖經政和之說或煮及作豉醬以變其味如鹽豉鹽醬之類方能走腎也別録凡豬肉味苦不可久食食療肉味苦微寒江豬平味酸周禮食醫豕宜稷注豭豬味酸牝豬味苦茲云咸者當別有服法栗別録味鹹溫主益氣厚腸胃補腎氣孟詵生食治腰腳炒食令氣壅圖經患風水氣不宜食以其味鹹也藿說文作𧆑叔之少也詩小雅皎皎白駒食我腸藿儀禮公食大夫禮牛藿注藿豆葉爾雅釋草蔨鹿藿注今鹿豆也唐元稹詩野蔬充膳甘場藿本草未詳腎色黑宜食辛黃黍雞肉桃蔥皆辛王冰曰腎性苦燥故食辛物而取其津潤也吳昆曰腎苦燥急食辛張志聰曰腎色黑則其氣喜潤辛能開腠理致津液蓋從革作辛能通母之化原也馬蒔曰北方壬癸水其色黑腎亦屬水故其色亦黑張介賓曰黃黍即糯小米北方謂之黃米驥案黍有丹黍白黍黃黍多種別録味甘溫無毒主益氣補中孫真人曰黍肺之谷也肺病宜食今腎食者金水同源也雞有多種性味不同丹雄雞味甘微溫主女人崩中漏下赤白沃白雄雞味酸烏雄雞微溫黑雌雞味甘黃雌雞味酸甘平腎食當宜烏黑者桃實別録味酸多食令人有熱桃核味苦甘平不言辛莖白皮味苦辛葉味苦辛平孫真人曰桃味辛肺病宜食蔥實本經味辛溫其莖白平可作湯圖經有冬蔥漢蔥胡蔥茖蔥凡四種辛散酸收甘緩苦堅咸軟王冰曰皆自然之氣也然辛味苦味匪唯堅散而已辛亦能潤能散苦亦能燥能泄脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之則其謂苦之燥泄也又曰腎苦燥急食辛以潤之則其謂辛之濡潤也吳昆曰此釋五味之用張志聰曰此言發散湧泄之外而又有或收或緩或堅或軟之性善用者隨其所利而行之馬蒔曰以辛主散酸主收甘主緩苦主堅咸主軟故耳張介賓曰總言五味之用藥食皆然驥案此即總上五欲肝欲散急食辛肺欲收急食酸脾欲緩急食甘腎欲堅急食苦心欲軟急食鹹所謂五欲也毒藥攻邪王冰曰藥謂金玉土石草木菜果蟲魚鳥獸之類皆可以祛邪養正者也然辟邪安正惟毒乃能以其能然故通謂之毒藥也新校正去按本草下藥為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經故云毒藥攻邪張志聰曰本草上藥為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥為臣主養性以應人無毒有毒斟酌其宜欲遏病補虛羸者本中經下藥為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經馬蒔曰彼補正氣者必有取於良藥治邪氣者必有取於毒藥所以攻邪也五運行大論大毒治病十去其六常毒治病十去其七小毒治病十去其八此皆所謂毒藥也又曰無毒治病十去其九所謂良藥也張介賓曰藥以治病因毒為能所謂毒者以氣味之有偏也蓋氣味之正者穀食之屬是也所以養人之正氣氣味之偏者藥餌之屬是也所以去人之邪氣其為故也正以人之為病病在陰陽偏勝耳欲救其偏則為氣味之偏者能之正者不及也凡可辟邪安正者均可稱為藥毒故曰毒藥攻邪驥案凡藥能治疾攻邪皆有毒周禮醫師聚毒藥以供醫事注毒藥藥之辛苦者細辛苦參雖辛苦而無毒但有毒者多辛苦藥中之有毒者謂巴豆狼牙之類東洞吉益謂凡攻疾之具則藥皆毒而疾醫之司也又謂藥毒也而病毒也藥毒而攻病毒所以瞑眩書曰若藥不瞑眩厥疾不瘳五穀為養王冰曰謂粳米小豆麥大豆黃黍也張志聰曰謂黍稷稻麥菽以供養五藏之氣馬蒔曰粳米小豆麥大豆黃黍之五穀所以養此元氣也張介賓曰養生氣也驥案此即上大粳米小豆麥大豆黃黍之五穀也周禮疾醫以五味五穀五藥養其病注五穀麻黍稷麥豆也此依月令五方之谷此五穀據養疾而食之非必入於藥分素問金匱真言東方青其穀麥南方赤其谷黍西方白其谷稻中央黃其谷稷北方黑其谷豆此五穀又為麥黍稻稷豆五常政大論敷和谷麻升明穀麥備化谷稷審平谷稻靜順谷豆委和谷稷稻伏明谷豆稻卑監谷豆麻從革谷麻麥涸流谷黍稷發生谷麻稻赫曦穀麥豆敦阜谷稷麻堅成谷稻黍流衍谷豆稷靈樞五味篇五穀粳米甘麻酸大豆咸麥苦黃黍辛五果為助王冰曰謂桃李杏栗棗也張介賓曰助其養也驥案此即上文肝棗心李肺杏脾栗腎桃之五果靈樞五味篇五果棗甘李酸栗咸杏苦桃辛按之金匱真言五方果五常政大論五歲果亦互異李時珍曰木實曰果熟則可食干則可脯疾苦可以備藥以五味五色應五藏五畜為益王冰曰謂牛羊豕犬雞也張志聰曰補益五藏馬蒔曰益此元氣張介賓曰益精血也驥案此五畜亦與金匱真言五常政大論不同靈樞五味篇五畜牛甘犬酸豕咸羊苦雞辛五菜為充王冰曰謂葵藿薤蔥韭也新校正云按五常政大論大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也張志聰曰充實於藏腑者也馬蒔曰充此元氣張介賓曰實藏腑也驥案天中記五肉七菜勝掩鶉梟蜀都賦五肉七菜勝掩腥臊此言菜肉令人補也李時珍曰凡草木之可茹者謂之菜五菜所以輔佐穀氣疏通壅滯是以內則有訓時醫有方菜之於人補非小也靈樞五味篇五菜葵甘韭酸藿咸薤苦蔥辛氣味合而服之以補精益氣王冰曰氣為陽化味曰陰施氣味合和則補益精氣矣陰陽應象大論陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味又曰形不足者溫之以氣精不足者補之以味由是則補精益氣其義可知新校正云按孫思邈雲精以食氣氣養精以榮色形以食味味養形以生力精順五氣以為靈也若食味不調則損形也是以聖人先用食禁以存性後製藥物以防命氣味溫補以存精形此之謂和合而服之以補精益氣也張志聰曰此總結上文而言穀肉果菜皆有五氣五味宜和合而食之無使偏勝以補益精氣如偏食焦苦之氣味則增火化如偏食鹹腐之物則增寒化經曰久而增氣物化之常也氣增而久夭之由也故宜氣味和合而食之驥案李杲曰物有升降浮沉化生長收藏成以配四時春生夏浮秋收冬藏土居中化是以味薄者升而生氣薄者降而收氣厚者浮而長味厚者沉而藏氣味平者化而成但言補之以辛甘溫熱及氣味之薄者即助春夏之升浮即是瀉秋冬收藏之藥也在人之身肝心是矣但言補之以酸苦鹹寒及氣味之厚者即補秋冬之降沉便是瀉春夏生長之藥也在人之身肺腎是矣淡味之藥滲即是升泄即為降佐使諸藥者也明乎氣味而合服之而補益之道得矣王好古曰辛散也而行之也橫甘淡也而行之也上苦泄也而行之也下酸收也其性縮咸軟也其性舒能知性味服食無不宜也此五者有辛酸甘苦鹹各有所利或散或收或緩或急或堅或軟四時五藏病隨五味所宜也王冰曰用五味而調五藏配肝以甘心以酸脾以咸肺以苦腎以辛者各隨其宜欲緩欲收欲軟欲泄欲散欲堅而為用非以相生相養而為義也張志聰曰五者謂毒藥谷畜菜果也言此五者皆有辛甘之發散有酸苦鹹寒之湧泄又有辛散酸收苦堅咸軟或隨四時之宜散宜收或隨五藏之所苦所欲各隨其所利而行之此篇論案五藏以知間甚死生之期審貴賤以施針砭藥食之別蓋九候之病由五藏之所生馬蒔曰自毒藥攻邪以下至此其間谷果畜菜五者各有五味各有散收緩急堅軟之宜在因四時五藏之病隨五味所宜以異用耳蓋至是而藏氣法時之義無餘蘊矣張介賓曰此總結上文五藏之氣四時之用各有所利然變出不常則四時五藏因病而藥五味當隨所宜也驥案王注配肝以甘者土木無忤也配心以酸者木生火也配脾以咸者水由地中行也配肺以苦者肺居膈上上部法天也配腎以辛者金水同源也此五藏五味與歲氣時藥之說別是一義故藏氣法時與金匱真言五常政等篇所舉五穀五畜互有不同素問宣明五氣篇五味所入酸入肝王冰曰肝合木而味酸吳昆曰五味所入各以類從易所謂同氣相求也張志聰曰胃者五藏六腑之海水穀皆入於胃五藏六腑皆稟氣於胃五味各走所喜酸先走肝苦先走心甘先走脾辛先走肺咸先走腎穀氣津液已行營衛大通乃化糟粕以次傳下東方生風風生木木生酸酸生肝故味之酸者入肝以養肝氣張介賓曰酸化從木驥案肝之本味酸與藏氣法時食甘之義不同辛入肺王冰曰肺合金而味辛張志聰曰西方生燥燥生金金生辛辛生肺故味之辛者入肺以養肺氣張介賓曰辛化從金驥案肺之本味辛與藏氣法時食苦之義不同苦入心王冰曰心合火而味苦張志聰曰南方生熱熱生火火生苦苦生心故味之苦者入心以養心氣張介賓曰苦化從火驥案心之本味苦與藏氣法時食酸之義不同鹹入腎王冰曰腎合水而味鹹張志聰曰北方生寒寒生水水生鹹鹹生腎故味之咸者入腎以養腎氣張介賓曰咸化從水驥案腎之本味鹹與藏氣法時食辛之義不同甘入脾王冰曰脾合土而味甘也新校正云按太素又云淡入胃張志聰曰中央生濕濕生土土生甘甘生脾故味之甘者入脾以養脾氣張介賓曰甘化從土驥案脾之本味甘與藏氣法時食鹹之義不同是謂五入所謂五色者脾病者宜食粳米飯牛肉葵棗張介賓曰此下言藏病所宜之味也脾屬土甘入脾故宜用此甘物心病者宜食麥羊肉杏薤張志聰曰心屬火苦入心故宜用此苦物腎病者宜食大豆黃卷豬肉栗藿張介賓曰大豆黃卷大豆芽也腎屬水鹹入腎故宜用此咸物肝病者宜食麻犬肉李韭張介賓曰肝屬木酸入肝故宜用此酸物肺病者宜食黃黍雞肉桃蔥張介賓曰肺屬金辛入肺故宜食用此辛物此五節與五藏生成論之五合宣明五氣篇之五入者意同皆用本藏之味以治本藏之病也馬蒔曰此言五色與五味相宜而五藏之病各有所當用也黃色屬土甘味屬土脾亦屬土故色之黃者宜甘而脾病者主脾氣不足宜食谷果畜菜之甘者以益之赤色屬火苦味屬火心亦屬火故色之赤者宜苦而心病者主心氣不足宜食谷果畜菜之苦者以益之黑色屬水鹹味屬水腎亦屬水故色之黑者宜咸而腎病者主腎氣不足宜食谷果畜菜之咸者以益之青色屬木酸味屬木肝亦屬木故色之青者宜酸而肝病者主肝氣不足宜食谷果畜菜之酸者以益之白色屬金辛味屬金肺亦屬金故色之白者宜辛而肺病者主肺氣不足宜食谷果畜菜之辛者以益之此即宣明五氣論之所謂五入也余伯榮曰五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣是以五色合五味而各有所宜也五藏內合五行外合五色五味入胃各歸所喜津液各走其道以養五藏故五藏病者隨五味所宜也肝色青宜食甘粳米飯牛肉棗葵皆甘心色赤宜食酸犬肉麻李韭皆酸脾色黃宜食鹹大豆豕肉栗藿皆咸肺色白宜食苦麥羊肉杏薤皆苦腎色黑宜食辛黃黍雞肉桃蔥皆辛馬蒔曰此言五藏宜食之味皆自其所苦者而治之也素問藏氣法時論肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之至末又云肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆本經作麻犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛夫前既曰脾苦濕急食苦以燥之而後乃云脾色黃宜食鹹啓元子云究斯宜食乃調機關之義也腎為胃關脾與胃合故假咸柔軟以利其關關利而胃氣乃行胃行而穀氣方化故脾之味與各藏不同此節與素問同張志聰曰藏氣法時論肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之夫色者氣之華也緩急燥濕藏氣之不和也五藏有五氣之苦故宜五味以調之用陰而和陽也愚按脾苦濕急食苦以燥之而又曰脾色黃宜食鹹大豆豕肉栗藿皆咸蓋脾為陰中之至陰而主濕土之氣乃喜燥而惡寒濕者也故宜食苦以燥之然灌溉於四藏土氣潤濕而後乃流行故又宜食鹹以潤之是以玉機真藏論脾者土也孤藏以灌四旁者也其來如水之流者此謂太過病在外故宜急食苦以燥之如鳥之喙者此謂不及病在中謂如黔喙之屬艮止而不行是以食鹹以滋其潤濕而灌溉也蓋脾為土藏位居中央不得中和之氣則有太過不及之分是以食味之有兩宜也靈樞五音五味篇上徵與右徵同穀麥畜羊果杏手少陰藏心色赤味苦時夏馬蒔曰上徵右徵者火音之人也故五穀五畜五果之內其麥羊杏皆屬火宜火音之人用此以調之也張介賓曰此下五條言五藏之裡以合四時五色五味也張志聰曰此節以五穀五畜五果之五味調養五音之人及二十五變之人蓋左右太少者從五音之所變也上徵者手少陰之人也右徵者左右上下手足三陽之人也上徵與右徵同者舉一而概四也蓋四變之人本於五音之所出是以五味調五音而四變之人亦調之以此五味也麥成於夏火之谷也巳午未會成火局羊乃火之畜也杏色赤而味苦心之果也經云五穀為養五果為助五畜為益夫味歸形氣歸精是以五音之形及二十五變之形不足者當補之以味也上徵者在氣為手少陰在藏為心在色為赤在味為苦在時為夏此五音之所主也右徵者以陰而變陽也仇汝霖曰按前後二篇並無針刺二字所謂調右手太陽上左足太陽下者即以此五味調之也列左右上下者分別二十五變之人使後學觀形以知血氣之盛虛非用五味之中而有上下之分也如用調左手太陽上右手太陽下總以麥谷羊畜調之也書不盡言言不盡意學者以意逆之則得之矣驥案此與上藏氣法時論五味篇參照下同上羽與太羽同谷大豆畜彘果栗足少陰藏腎色黑味鹹時冬馬蒔曰上羽太羽者水音之人也故五穀五畜五果之內其大豆彘栗屬水宜水音之人用此以調之也張志聰曰上羽足少陰之人也太羽者二十五變之形也曰右徵曰太羽經文錯綜其間者舉一而左右少太總調之以此味也豆色黑性澀水之谷也彘乃亥畜水之畜也栗色黑味鹹腎之果也上羽者在經氣為足少陰在藏為腎在色為黑在味為咸在時為冬倪仲宣曰所言足少陰藏腎者謂大豆彘栗之味在經氣調養足少陰在藏則調養腎也余藏同義上宮與太宮同谷稷畜牛果棗足太陰藏脾色黃味甘時季夏馬蒔曰上宮太宮者土音之人也故五穀五畜五果之內其稷牛棗皆屬土宜土音之人用此以調之也張志聰曰上宮足太陰之人也太宮者變而為足陽明也稷色黃味甘土之谷也牛乃土之畜棗者脾之果也在氣為足太陰在藏為脾在色為黃在味為甘在時為長夏上宮太宮加宮左宮少宮之人同調此谷畜之味也上商與右商同谷黍畜雞果桃手太陰藏肺色白味辛時秋馬蒔曰上商右商者金音之人也故五穀五畜五果之內其黍雞桃皆屬金宜金音之人用此以調之也張志聰曰上商手太陰之人也右商四變之形也黍色白而收成金之谷也雞屬酉而鳴於巳酉丑時金之畜也桃色白而有毛肺之果也在氣主手太陰在藏為肺在色為白在味為辛在時為秋上商右商少商太商左商之人同調此谷畜之味也上角與太角同谷麻畜犬果李足厥陰藏肝色青味酸時春馬蒔曰上角太角者木音之人也故五穀五畜五果之內其麻犬李皆屬木宜木音之人用此以調之也張志聰曰上角足厥陰之人也太角四變之形也麻色青莖直木之谷也犬屬戌而味酸厥陰之畜也李色青味澀肝之果也在經氣主足厥陰在藏為肝在色為青在味為酸在時為春上角太角右角𮡧角判角同調此谷果之味也仇汝霖曰調五音者補五藏調四變者補六腑靈樞九針篇五味酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五味驥案胃者五藏六腑之海也水穀皆入於胃五藏六腑皆稟氣於胃五味各走其所喜穀氣津液已行榮衛大通以次傳下王子律曰淡附於甘故淡入胃
