body:
  text: 卷九五過素問生氣通天論陰之所生本在五味陰之五宮傷在五味王冰曰所謂陰者五神藏也宮者五神之舍也言五藏所生本資於五味五味宣化各湊於本宮陰雖因五味以生亦因五味以損正為好而過節乃見傷也故下文曰吳昆曰言五味固足以養五藏亦足以傷五藏張志聰曰神氣生於陰精五藏之精生於五味是以首論氣而末論味藏象論五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生本神篇五藏主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死是以謹和五味長有天命蓋精神氣血皆由五味之所資生而資養者也五宮五藏神之所舍傷在五味者味有所偏勝也馬蒔曰此言五味能傷五藏而善養者慎之也陰陽應象大論酸生肝苦生心甘生脾辛生肺咸生腎則陰之所本五味陰者五藏皆屬陰也手太陰肺手少陰心足太陰脾足少陰腎足厥陰肝然陰之五宮所傷亦在五味陰陽應象大論酸傷筋苦傷氣甘傷肉辛傷皮毛咸傷血蓋五味過節則五藏亦傷於五味也其曰傷氣血者夫諸氣皆屬於肺而苦本入心何乃傷之正以水來乘火亦傷己之所勝也則五味信能傷五宮矣張介賓曰五宮五藏也六節藏象論地食人以五味夫味得地氣故能生五藏之陰若五味不節則各有所克反傷其陰矣義如下文驥案陽為氣陰為味故陰之傷在味五宮五神之舍王注是也黃庭經肝部之宮翠重里下有青童神公子心部之宮蓮含華下有童子丹元家脾部之宮屬戊己中有明童黃裳里肺部之宮似華蓋下有童子坐玉闕腎部之宮玄闕元中有童子冥上玄又百穀之實土地精五味外美邪魔腥臭亂神明胎氣零那能返老得還嬰此五味傷五宮之明證是故味過於酸肝氣以津脾氣乃絶王冰曰酸多食之令人癃小便不利則肝多津液津液內溢則肝葉舉肝葉舉則脾經之氣絶而不行何者木製土也吳昆曰木實則剋土故脾絶馬蒔曰酸所以生肝木勝土虧脾氣從茲而絶張介賓曰津液也酸從木化驥案過猶失也素問疏五過論謂醫治病有過失又過謂過度靈樞五禁篇刺有五過故過有二義不當用而用之謂之過當用而用過度亦謂之過西山記秋肺旺肝弱則養肝食酸物五穀中豆五果中李子五畜中犬肉五菜中藿菜與醫經同不可過也味過於咸大骨氣勞短肌心氣抑王冰曰咸多食之令人肌膚縮短又令心氣抑滯而不行咸走血也大骨氣勞咸歸腎也吳昆曰鹹入腎入骨能軟縮諸物又鹹從水化而走血水勝則火滅故心氣抑張志聰曰大骨腰高之骨腎之府也馬蒔曰大骨者高骨也玉機真藏論亦謂之大骨腎氣反傷大骨氣勞水邪剋火令人肌肉短縮心氣抑滯張介賓曰鹹入腎腎主骨驥案西山記四季脾旺腎弱養腎食鹹物五穀中粟米五果中山藥五畜中豬肉五菜中韭菜與醫經同不可過也味過於甘心氣喘滿色黑腎氣不衡王冰曰甘多食之令人心悶甘性滯緩故令氣喘滿而腎不平何者土抑水也衡平也吳昆曰甘性滯緩甘從土化土亢則害乎水張介賓曰土實則心氣不能傳之於子故喘滿腎主水其色黑土亢則傷腎故色黑而腎氣不平馬蒔曰甘所以生肉脾邪有餘子來乘母從前來者為實邪而心氣喘滿且土往剋水傳其所勝黑色外見腎氣不得其平張介賓曰甘入脾甘從土化土勝則水病驥案西山記春肝旺脾弱則養脾食甘物五穀中粳米五果中棗肉五畜中牛肉五菜中葵菜與醫經同不可過也味過於苦脾氣不濡胃氣乃厚王冰曰苦性堅燥又能養脾胃故脾氣不濡則胃氣強厚吳昆曰苦性堅燥故脾氣不濡胃喜燥故胃氣強厚張志聰曰陽明絡屬心子母之氣相通苦則母氣盛而胃氣強胃強則與脾陰相絶脾不為胃轉輸其津液而脾氣不濡脾不轉輸故胃氣乃厚馬蒔曰人之腸胃必有二層心氣太過土氣亦有餘故胃乃作脹而反厚不能納受水穀宜用清火收斂如芩連烏梅等今人不識此證以為飲食不進者多是胃氣已弱仍用參朮等類則胃邪益增飲食反減愈補愈脹病終不愈脈要精微論胃脈實則脹虛則泄所謂脹者正胃氣乃厚之謂須於胃脈之實者驗之若真虛則宜補耳張介賓曰濡者潤也脾氣不濡則胃氣留滯故曰乃厚厚者脹滿之謂五味論苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔者其義亦此驥案西山記冬腎旺心弱則養心食苦物五穀中小麥五果中橘子五畜中羊肉五菜中薤大致與醫經同不可過也味過於辛筋脈沮弛精神乃央王冰曰沮潤也弛緩也央久也辛性潤散養於筋故令筋緩脈潤精神長久何者辛補肝也藏氣法是論肝欲散急時辛以散之用辛補之新校正云按此論味過所傷難作精神長久之解央乃殃也古文通用字多假借用者也吳昆曰央殃同張志聰曰沮遏抑也弛懈弛也辛甚則燥津液不能相成而精神乃受其殃也馬蒔曰辛所以生肺也味過於辛金邪剋木筋脈阻弛精神至半而廢央者中央也半之謂也四氣調神論有未央絶滅則至半而絶此雲精神乃央言精神僅可至半也詩小雅夜未央張介賓曰沮壞也弛縱也央殃同辛散氣則精神耗傷故曰乃央驥案西山記夏心旺肺弱則養肺食辛物五穀中黃黍五果中桃子五畜中雞肉五菜中蔥菜與醫經同不可過也黃庭篇四海者何也氣血精髓也其要在乎戒五傷焉多乎咸則心傷矣多乎苦則肺傷矣多乎酸則脾傷矣多乎辛則肝傷矣多乎甘則腎傷矣是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命王冰曰是所謂修養天真之至道也張志聰曰腎主藏精而主骨肝主藏血而主筋夫風客淫氣則邪傷肝而精及之謹和五味則骨正筋柔而腠理以密是陽氣生於陰精而為陰之外衛故曰陰者藏精而起亟也陽者衛外而為固也知陰陽內外之道無煩勞以傷其陽節五味以養其精謹能養調和法則陰陽和平長有天命張介賓曰在內者皆陰氣為之主也然陰氣在裡腠理在外若不相及而此曰腠理以密者緣陰陽表裡原自相依不惟陽密足以固陰而陰強乃能壯陽也故如上文之邪因於外而為喘喝為痿厥為精亡為洞泄咳嗽等證此陽病之及於陰也又如煩勞大怒飲食起居之不節而為煎厥為形氣絶為筋脈腸痔氣逆骨壞等證是傷於陰者亦能病及外體陽分此陰之所以不可忽也素問五藏生成篇多食鹹則脈凝泣而變色王冰曰心合脈其榮色咸益腎勝於心心不勝故脈凝泣而顏色變陽也吳昆曰泣與澀同張志聰曰此承上文而言太過之為害也五行有相生相制不可偏廢如制之太過又有相賊之害馬蒔曰此以所主之所傷者言之心之所主者惟腎腎之味主咸張介賓曰咸從水化水能剋火多食苦則皮稿而毛拔王冰曰肺合皮其榮毛苦益心勝於肺肺不勝故皮枯稿而毛拔去吳昆曰苦從火化皮毛為金張志聰曰多食苦是火味太過而傷肺馬蒔曰肺之所主者唯心故心之味主苦張介賓曰苦從火化火能剋金多食辛則筋急而爪枯王冰曰肝合筋其榮爪辛益肺勝於肝肝不勝故筋急而爪乾枯吳昆曰辛從金化筋與爪為木張志聰曰多食辛是金味太過而傷肝馬蒔曰肝之所主者惟肺故肺之味主辛多食辛肝為肺傷張介賓曰辛從金化金能剋木多食酸則肉胝䐢而唇揭王冰曰脾合肉其榮唇酸益肝勝於脾脾不勝故肉胝䐢而唇皮揭舉吳昆曰酸從木化肉與唇為土張志聰曰多食酸是木味太過而傷脾馬蒔曰脾之所主者惟肝故肝之味主酸多食酸則脾為肝傷張介賓曰胝皮厚也手足駢胝之謂多食甘則骨痛而發落王冰曰腎合骨其榮發甘益脾勝於腎腎不勝故骨痛而發墮落吳昆曰甘從土化骨發屬腎水張志聰曰多食甘是土味太過而傷腎馬蒔曰腎之所主者惟脾故脾之味主甘多食甘則腎為脾傷張介賓曰甘從土化土能剋水此五味之所傷也王冰曰五味入口輸於腸胃而內養五藏各有所養有所欲欲則互有所傷吳昆曰五味各有所傷所謂陰之五宮傷在五味是張志聰曰五味所以養五藏者也藏有所勝則所不勝之藏受傷驥案五欲五苦詳見五宜篇中然味各有偏不宜太過不宜太多用氣不可稍乖用味尤當詳審洪範水曰潤下潤下作咸火曰炎上炎上作苦木曰曲直曲直作酸金曰從革從革作辛土爰稼穡稼穡作甘苦者直行而泄辛者橫行而散酸者束而收斂咸者止而軟堅甘之一味可上可下土位居中而兼五行五藏無歸專入太陽而通小便然草木乃有形無情之藥各逞一性以為功人稟五行有神有情之體全以陰陽變化制伏相成相長以為之用能補偏救弊劑調得宜無過不及恰合乎中斯無增氣偏勝之害而得和平長養之宜令無情以至有情皆用藥者神明化裁之妙斯無過傷之足慮也素問宣明五氣篇五味所禁辛走氣氣病無多食辛王冰曰病謂力少不自勝也吳昆曰辛陽也氣亦陽也同氣相求故辛走氣辛主發散氣弱者食之則氣益虛耗矣故在所禁張志聰曰陰之所生本在五味陰之五宮傷在五味故禁多食肺主氣辛入肺故走氣張介賓曰辛能散氣驥案五味篇辛入於胃其氣走上焦上焦受氣營諸陽故辛入而汗俱出咸走血血病無多食鹹苦走骨骨病無多食苦新校正云按皇甫士安云咸先走腎此云走血者腎合三焦血脈雖屬肝心而為中焦之道故鹹入而走血也苦走心此云走骨者火水相濟骨氣通於心也吳昆曰咸陰也血亦陰也同氣相求故咸走血血得咸則凝結而不流故血病禁鹹苦陰也骨亦陰也氣同則入故苦走骨骨得苦則陰益甚骨重而難舉矣故骨病禁苦張志聰曰心主血潤下作鹹鹹走血者水氣上交心也腎主骨炎上作苦苦走骨者火氣下交於腎也此與並於心則喜並於腎則恐之義相同蓋心腎水火之氣時相既濟故所走互更其餘三藏是本藏之味而走本藏所主之筋肉也馬蒔曰此言五藏之病各有禁食之味也靈樞五味篇酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人愧心少俞之所答尤為詳悉宜參看之張介賓曰血得咸則凝結不流也五味論咸與血相得則凝苦性沉降陰也骨屬腎亦陰也骨得苦則沉陰益腎骨重難舉矣故骨病禁苦九針論苦走血水化咸故走骨義亦當然驥案五味論鹹入於胃其氣上走中焦注於脈則血氣走之血脈者中焦之道也苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通苦入而走骨故入而復出知其走骨也甘走肉肉病無多食甘酸走筋筋病無多食酸王冰曰是皆為行其氣速故不欲多食多食則病甚故病者無食也吳昆曰甘土也肉亦土也相從以類故甘走肉肉得甘則病膚腫肉脹者滋甚矣故肉病禁甘酸木也筋亦木也以類相從故酸走筋筋得酸則病拘攣收引者益加矣故筋病無多食酸張志聰曰脾主肌肉甘為土味脾病而多食之則反傷其脾氣肝合筋酸走肝筋病而多食之則反傷其肝氣張介賓曰甘能緩中善生脹滿故肉病者無多食甘五味論甘走肉多食之令人悗心酸能收縮故在筋者無多食酸五味論酸走筋多食之令人癃驥案五味篇甘入於胃其氣弱小不能上至於上焦而與谷留於胃中者令人柔潤其氣外通於肉故甘走肉酸入於胃其氣澀以收上之兩焦弗能出入也下注膀胱得酸則縮踡約而不通水道不行陰者積筋之所終故走筋是謂五禁無令多食新校正云按太素五禁云肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘名為五裁楊上善云口嗜而欲食之不可多也必自裁之命曰五裁張志聰曰五味所以養五藏之氣者也病則氣虛故無令多食蓋少則補多則反傷其氣驥案經云五味入胃各歸所喜故久而增氣物化之常也氣增而久夭之由也與禁無多食義同靈樞五味篇五禁肝病禁辛心病禁咸脾病禁酸腎病禁甘肺病禁苦余氏曰五味五氣有生有克有補有瀉故五藏有病禁服勝克之味馬蒔曰此言五藏之味有五禁皆五行之相剋者也金剋木故肝病禁辛水剋火故心病禁咸木剋土故脾病禁酸土剋水故腎病禁甘火剋金故肺病禁苦此節當與素問宣明五氣論之五禁靈樞九針論之五裁參看宣明五氣篇辛走氣氣病無多食辛鹹走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁九針論病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘張介賓曰辛味屬金能克肝木鹹味屬水能克心火酸味屬木能克脾土甘味屬土能克腎水苦味屬火能克肺金黃帝問於少俞曰五味入於口也各有所走各有所病酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心餘知其然也不知其何由願聞其故任谷菴曰五運行大論東方生風風生木木生酸酸生肝肝生筋南方生熱熱生火火生苦苦生心心生血是五藏本於五味之所生而生外合之筋骨血肉也是以五味入口而各有所走心主血腎主骨苦乃火之味鹹乃水之味苦走骨而咸走血者陰陽水火之交濟也肺主氣故辛走散馬蒔曰癃小便不通洞心者心內空也悗心者心內悶也少俞答曰酸入於胃其氣澀以收上之兩焦弗能出入也不出即留於胃中胃中和溫則下注膀胱膀胱之胞薄以懦得酸則縮綣約而不通水道不行故癃陰者積筋之所終故酸入而走筋矣任氏曰五味陰陽之用辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅是發散湧泄之中而又有收散緩急之性矣上焦開發宣五穀味中焦出氣如露以行水穀之精酸氣收澀故弗能出於上之兩焦不出則留於胃而溜於下焦注於膀胱矣膀胱為脬之室脬居於中故膀胱之體質脆薄以懦得酸則易於縮綣縮則納而不通水道不行故為癃閉陰者前陰積筋者宗筋也宗筋者筋之主也酸入於宗筋故走筋也經筋章足厥陰之筋上循陰股結於陰器絡諸筋其病陰股病轉筋陰器不用傷於內則不起傷於寒則縮入傷於熱則縱挺不收是足厥陰肝經主宗筋而外合於通體之筋馬蒔曰篇內言三焦者俱營衛生會篇之三焦膀胱為胞之室胞在其中陰器者乃一身之筋於此而終酸入則走筋其陰器亦有所約而小便不利矣豈特膀胱之在內者為然哉張介賓曰謂上中二焦澀結不舒也綣不分也約束也癃水不利也陰陽別論女子胞者氣厥論胞移熱於膀胱五音五味篇衝脈任脈皆起於胞下皆此胞字皆音包乃以子宮為言此節云膀胱之胞蓋以溲脬為言胞音有二而字則相同恐人莫辨故在本篇特加膀胱二字以明此非子宮正欲辨其疑似後人不解但讀為包反曰經語遂認膀胱與胞為二物故在類纂則曰膀胱者胞之室王安道則曰膀胱為津液之腑又有胞居膀胱之室之説甚屬不經夫脬即膀胱膀胱即脬也焉得復有一物致資後學之疑陰者陰器也積筋者宗筋之所聚也肝主筋其味酸故內為膀胱之癃而外走肝經之筋也又宣明五氣篇酸走筋筋病無多食酸驥案女子胞音包指子宮此膀胱之胞音拋以溲脬為言以子宮言者素問評熱論胞脈屬心而絡於胞中月事不來者胞脈閉也奇病論胞絡者繫於腎痿論悲哀太甚則胞絡絶金匱婦人妊娠篇胞胎阻以溲脬言者素問痹論胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕通評虛實論胞氣不足靈樞水脹篇石瘕生於胞中此不可不辨也酸説文酢也關東謂酢曰酸書洪範木曰曲直曲直作酸曲直筋象周禮醫師以酸養骨注酸木味木根立地中似骨筋附於骨故酸走筋黃帝曰咸走血多食之令人渴何也少俞曰鹹入於胃其氣上走中焦注於脈則血氣走之血與咸相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本干而善渴血脈者中焦之道也故鹹入而走血矣任氏曰中焦並胃中出上焦之後此所受氣者泌糟粕蒸精液化其精微上注於肺脈乃化而為血鹹入於胃其氣上走中焦注於脈者咸性之上湧也注於脈則走於血氣矣血者中焦之汁奉心神而化赤咸乃寒水之味故血與咸相得則凝凝則不行而胃中之汁悉注之胃中汁竭則咽路焦枯故舌本干而善渴血脈者中焦之道路咸氣上走於中焦故走血王子方曰胃腑水穀之精汁化而為赤營於脈中人一呼一吸脈行六寸者血氣之流行也呼吸不已氣血之行無少停息故血凝則胃中之汁注之以資其流行馬蒔曰世俗宰牲加鹽以凝血凝則血燥而胃中之汁注以潤之由是胃中之汁竭竭則咽路枯焦故舌根干而善渴也張介賓曰血為水化咸亦屬水驥案咸銜也北方味也廣韻不淡也韻會鹽味爾雅釋音鹹苦也咸之極必苦故以咸為苦也鹹苦同化素問藏氣法時論心欲軟急食鹹軟之補之腎欲堅急食苦堅之補之兩少陰同氣故心食腎味腎食心味也周禮天官醫師以咸養脈脈乃心之合苦化燥咸軟堅故血氣走而凝津液竭而渴也黃帝曰辛走氣多食之令人洞心何也少俞曰辛入於胃其氣走於上焦上焦者受氣而營諸陽者也薑韭之氣薰之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出任氏曰上焦開發宣五穀味薰膚充身澤毛若霧露之溉是謂氣辛走氣故其氣走於上焦上焦者受中焦之氣而營諸表陽者也夫營衛之氣生於中焦皆從上而出故薑韭之氣上熏則營衛之氣不時受之久留心下則為洞心辛與上焦之氣俱行於表陽則開發皮腠而汗出俞伯榮曰辛氣留於心下而上熏則為洞心與氣俱行則與汁共並而出蓋汗乃中焦水穀之液也王子方曰論五味而曰氣者味之性也馬蒔曰此辛味之氣惟此薑韭之氣久留心下則物在心下而氣薰於上焦上焦氣輳心內似空故多食辛者必洞心也且此辛氣與心中之氣相得而俱行辛入則汗必出汗之出者以氣之出也其心安得而不洞張介賓曰洞心心空也營諸陽營養陽分也辛味屬陽故走上焦之氣分過於辛則開竅而散故為洞心為汗出宣明五氣篇辛走氣氣病無多食辛驥案辛有二義就辛之味言説文秋時萬物成而熟金剛味辛辛痛則泣出徐注言萬物初見斷制故辛痛洪範金曰從革從革作辛白虎通金味所以辛者西方煞傷成物辛所以煞傷之也猶五味得辛乃委煞也周禮醫師以辛養筋注辛金味金之纏合異物似筋人之筋纏合諸骨故以辛養之正韻苦辛取辛酸之意筋骨相纏金木無忤故辛能養筋酸能養骨也此斷制收煞之義以辛味中之氣言月令其日庚辛注辛之為言新也史記律書言萬物之辛生也風土記元旦以蔥蒜韭蓼蒿雜合而食之名五辛盤取迎新之意正字通壬癸繼辛天道剝中有復秋德義中寓仁非偏屬斷制焦殺又經謂辛甘發散為陽此味中之氣曰氣走上焦曰辛與氣俱行曰辛入而汗出屬第二義即生新發散之謂也黃帝曰苦走骨多食之令人變嘔何也少俞曰苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也任谷菴曰炎上作苦君主之味也故五穀之氣皆不能勝之苦性下泄故入於下脘三焦者少陽火也苦性寒故三焦之道皆閉塞不通則入胃之水穀不得通調布散故變而為嘔也夫腎主骨腎為寒水之藏苦性寒故走骨同氣相感也然苦乃火味故入於下而復出於上以其性下泄而上湧也余伯榮曰少陰之上君火主之標陽而本寒也炎上作苦而苦寒下泄此少陰之味也故能從本從標天食人以五氣地食人以五味地之五行上呈天之六氣是以味合五行氣合三陰三陽之六氣馬蒔曰苦入下脘則上中下焦之氣閉而不通遂使五穀在胃者氣味不和所以變而為嘔齒者乃骨之所終故苦入則走骨走骨則走齒張介賓曰苦味性堅而沉故走骨入而復出其變為嘔宣明五氣篇苦走骨骨病無多食苦驥案苦説文大苦苓也詩採苦採苦傳苦菜一名荼又誰謂荼苦月令苦菜秀苦菜與苦𦽿無異嫩莖葉可食洪範火曰炎上炎上作苦苦火之味甘之對周禮醫師以苦養氣注火味火出入無形似氣人所睹見似若有形攪之不得亦是無形故云似氣而以苦養之也素問藏氣法時論脾苦濕則食苦以燥之是苦能化燥土能生金則養氣肺苦氣上逆食苦以泄之苦能降火氣有餘則泄之不足則燥之亦養氣之意腎欲堅則食苦以堅之苦性堅燥故腎之所欲三者不離乎燥與養氣相合然燥之太過則三焦閉而不通故嘔燥以堅腎腎之合骨齒乃骨之餘故走骨黃帝曰甘走肉多食之令人悗心何也少俞曰甘入于于胃其氣弱小不能上至於上焦而與谷留於胃中者令人柔潤者也胃柔則緩緩則蠱動蠱動則令人悗心其氣外通於肉故甘走肉任谷菴曰稼穡作甘坤土之味也坤德柔順故其氣弱小太陰濕土主氣故令人柔潤柔者土之性潤乃濕之氣也夫蟲乃陰類胃秉陽明燥熱之氣若胃柔而緩則蟲動而上入於胃矣蟲上食故人悗心土氣外主於肌肉故甘走肉馬蒔曰蠱當作蟲蟲因味甘食在而動蟲動則心自悶所謂甘走肉者甘既屬土土主於肉肉在於外甘味之氣必走而聚之也內與外不相通其心安得而不悶張介賓曰悗悶甘入脾脾主肉故甘走肉宣明五氣篇甘走肉肉病無多食甘驥案甘説文美也徐曰物之甘美也正韻甜也洪範稼穡作甘傳甘味生於百穀月令中央土其味甘是甘為脾土之味脾欲緩急食甘肝苦急急食甘甘具和緩之性已見藏氣法時論中周禮醫師甘以養肉注甘土味土含載四者似肉疏謂金木水火非土不載如人之肉亦含載筋骨氣脈故云似肉故以甘養之與此甘走肉義同和緩柔潤則蟲動史記倉公傳薄吾病蟯瘕案病得之寒濕宛篤化為蟲中藏經有伏蛔白肉肺胃赤弱蛔九種古有伏蛔白肉肺蝟膈赤蟯九種傷寒胃中冷必吐蛔夫胃寒則從濕化風木乘之蛔乃生橫著曲直左右上下者蟲病也藥不中與也又傳尸有六代蟲又有肝勞熱心勞熱脾勞熱肺勞熱腎勞熱皆有蟲大抵諸蟲皆因飲食不節或飢飽失宜或過飧腥膾炙爆其症眼眶鼻下青黑麵痿黃臉上有幾條血絲如蟹爪分明飲食不進肌肉不生此皆脾土和柔不健而蟲生之候此言蟲動悗心相與吻合故附之詳見慎柔五書暨倉公傳注靈樞九針論五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也必自裁也故曰五裁王子律曰裁者酌其適中而不可多也夫五味入口內養五藏外濡形身病則嗜食故宜裁之驥案此即氣增而久夭之由也之意
