body:
  text: 敘余輯內經方已又輯內經藥瀹說者謂內經有方如是我聞內經不言藥不與本經同類子何斤斤以藥瀹為不知本經著錄三百六十而氣味足以統之內經不言藥物名品但言寒熱溫涼之氣則氣無非藥言甘辛酸鹹苦淡之味則味無非藥是言言氣味則言言皆藥天食人以五氣地食人以五味氣味齊調藥方斯備特內經挈其綱本經詳其目內經發其凡而起其例本經核其實而舉其名也安往而非藥哉瀹者何也子華子醫道篇藥者瀹也瀹者養也以其所有餘也而養其所乏以其所益多也而養其所損反其所養則益者彌損反其所養則有餘者彌乏察於三反而加疏瀹焉夫是之謂藥故曰藥者瀹也瀹者養也吾取子華子吾輯內經藥瀹由是而推之周禮疾醫五味五穀五藥養其病瀹也推之瘍醫藥以酸養骨以辛養筋以咸養脈以苦養氣以甘養肉以淡養竅瀹也推之本經名例上藥一百二十種為君主養性中藥一百二十種為臣主養命下藥一百二十五種為佐使主治病養命養性瀹也治病亦瀹也吾輯藥瀹吾取子華子其篇第奈何陰陽五行其理幽奧徵於易筆於書載於史志詳於百家傳記三教九流之籍大而無外小而無內仁者見仁智者見智證之於藥固明明有形色氣味之可徵也故先之以陰陽色氣味藥物有陰陽司氣有陰陽歲運有陰陽太過者為陽不及者為陰人在天地氣交之中為天地立心劉子所謂受中以生者也人不能外天地安能違氣運哉故次之以氣運天有三陰三陽曰氣地有五行曰運運有太少即有勝復補偏救弊司歲備物化不可代時不可違歲也時也不可不先也故次之以五歲歲有太過天泉制之歲有不及天泉益之明此制益則氣化乃平故次之以六化天氣既明地亦既講地有東西南北即有高下寒熱溫涼地氣不同醫調立異執死方以治生人削吾之足以適人之履未見其得也故次之以五方天地既判服食以陳人不食則飢不飲則渴故食以養陰飲以養陽水穀者人生之大命也故次之以水穀水穀以養人生藥物以攻人病藥有畏惡亦有苦欲無可不可無宜不宜則五氣五味五藏皆各因其宜者而投焉因其不宜者而去焉則五宜次之天地之間六合之內不離於五因其宜而投之太甚經所謂久而增氣夭之由也有五宜勢不得不生五過則五過又次之宜者投之過者謹之謹調五味五氣以合於五臟六腑毋傷歲運毋伐天和高下寒熱地氣適調依是而省疾問病命藥處方庶幾可告無罪於斯人矣故次之以藥制終焉書凡十卷說者又謂此篇陰陽五行之說不且與科學戾乎曰彼亦一科學此亦一科學彼之科學自形質此之科學自氣化形質死體氣化生機陰陽五行此正吾之科學也安得是彼而非此然則憑乎曰春溫秋涼夏燠冬寒主之氣運也春涼秋溫夏寒冬燠客之氣運也吾於二十年來冬至後依推步家流年之例以佔一歲之氣交病十九皆驗安得無憑有憑則實無憑則虛陰陽五行此正吾之科學也顧此篇言藥瀹非言氣運專書也然與藥瀹有關者具於是矣吾輯內經藥瀹亦猶輯內經方誌也讀內經方然後讀內經藥瀹讀內經藥瀹然後讀本經蓋內經挈其綱本經詳其目內經發其凡而起其例本經核其實而舉其名也合而讀之則制方之大本立矣雖謂之專門之學可也何兢兢以科學耀人耳目哉癸亥臘日張驥書於尊黃行素之室
