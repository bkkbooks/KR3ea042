body:
  text: 卷五六化下至真要大論帝曰治之奈何岐伯曰諸氣在泉風淫於內治以辛涼佐以苦甘以甘緩之以辛散之王冰曰風性喜溫而惡清故治之以涼是以勝氣治之也佐以苦隨其所利也木苦急則以甘緩之苦抑之以辛散之藏氣法時論肝苦急急食甘以緩之肝欲散急食辛以散之此之謂也食亦音飼己曰食他曰飼大法正味如此諸為方者不必盡用之但一佐二佐病已則止餘氣皆然吳昆曰不務德謂之淫風淫於內自外而入淫於內也風為木氣金能勝之故治以辛涼辛過甚則恐傷其真氣故佐之以苦甘苦勝辛甘益氣也木性急故以甘緩之木喜條達故以辛散之驥案素問至真要大論風氣大來木之勝也六元紀風病行於上風論風為百病之長善行而數變又有五藏之風左傳秦和曰淫生六疾注淫過也氣味聲色所以養人然過則生害蓋風為六氣之一劉守真六氣病謂風為厥陰風木乃肝之氣也辛涼仲景有麻黃連翹湯白虎湯吳鞠通有銀翹散桑菊飲皆辛涼解肌之例然李東垣有卒然昏憒不省人事之中風乃本氣自病非外來之邪此由於酒色勞役七情口腹致傷藏氣王安道謂之類風此風之變局非大劑參附不能挽回不以辛涼治也熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之王冰曰熱性惡寒故治以寒也熱之大盛甚於表者以苦發之不盡復寒制之寒制不盡復苦發之以酸收之甚者再方微者一方可使必已時發時止亦以酸收之吳昆曰熱為火氣水能勝之故治之以鹹寒佐之以甘甘勝咸所以防其過也必甘而苦者防咸之過而又以瀉熱氣作實也熱散於諸經以酸收之熱結而不散以苦發之張志聰曰熱乃火氣水能勝之故宜治以鹹寒佐以苦甘甘勝咸所以防咸之過苦能泄所以去熱之實也酸乃木味火生於木以酸收之者收火歸原也熱鬱於內而不解者以苦發之驥案素問熱論評熱論兩篇論熱尤詳劉守真六氣病謂手少陰君火之熱乃真心小腸之氣也仲景苦寒有黃連黃芩湯鹹寒有黃連阿膠湯重則陽邪內陷少陰有急下三法用大承氣湯皆寒鹹苦甘之例是謂正治東垣有夏月中暑身形拘急疼痛心煩肌膚大熱無汗謂為房室陰寒所遏陽氣不得升越有大順散之例此又熱淫之變局也濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之王冰曰濕與燥反故治以苦熱佐以酸淡也燥除濕故以苦燥濕也淡利竅故以淡滲泄也藏氣法時論脾苦濕急食苦以燥之靈樞經淡利竅也生氣通天論味過於苦脾氣不濡胃氣乃厚明苦燥也新校正云按天元正紀大論下太陰其化下甘溫吳昆曰濕為土氣苦熱從火化能燥濕者也故治以苦熱酸從木化能制土者也故佐以酸然必酸淡者淡能利竅故也使酸而非淡則味厚滋濕非所宜矣濕熱之濕以苦燥也濕濡而腫以淡泄之泄滲與汗也驥案杜桐峰濕論謂濕者天地間陰陽蒸潤之氣也傷則下先受之更喜侵於脾胃者以其同氣相求也劉守真六氣病足太陰濕土乃脾胃之氣也證見虛寒理中可以溫補而淡滲又有五苓散豬苓湯之例若手足自溫未成厥逆亦有取乎四逆之治苦熱淡泄此正治也火淫於內治以鹹冷佐以苦辛以酸收之以苦發之王冰曰火氣大行心腹心怒之所生也咸性柔軟故以治之以酸收之大法候其須汗者以辛佐之不必要資苦味令其汗也欲柔軟者以咸治之藏氣法時論心欲軟急食鹹以軟之心苦緩急食酸以收之此之謂也吳昆曰相火畏火也故治以鹹冷苦能瀉熱辛能滋養既苦且辛則瀉熱而滋陰水矣以酸收之以苦發之其義詳見上文熱淫條下驥案少陽相火在經主半表半裡仲景立小柴湯為和解之局若火結甚而為痞則有瀉心諸湯旋覆代赭湯黃芩湯乾薑黃芩黃連湯諸治所以散結除滿皆苦寒清冷之例劉守真六氣病少陽相火之熱乃心包三焦之氣故治有正法有變例劉宗厚火論凡動皆屬火火不妄動隨觸而發人在氣交之中多動少靜火一妄動元氣更傷故火證獨多內經病機十九條而屬火者五然火有君火相火君火可以輕伏可以水滅可以直折芩連之屬可以制之相火則不可以水折當從其性而伏之若飲食勞倦內傷元氣之火宜甘溫之劑以除之陽亢陰微煎熬血液之火宜甘寒以降之若左腎真陰失守而火熾則地黃元參之類可以壯水制陽若右腎命門虛弱火衰則桂附之類可以消陰益火若胃虛過食冷物抑遏陽氣於脾土之中則升麻葛根可以升散鬱火然則治火之法多端未可一概也燥淫於內治以苦溫佐以甘辛以苦下之王冰曰溫利涼性故以苦治之下謂利之使不得也新校正云按藏氣法時論肺苦氣上逆急食苦以泄之用辛瀉之酸補之又按下文司天燥淫所勝佐以酸辛此云甘辛者甘字疑當作酸天元正紀大論下酸熱與苦溫之治又異又云以酸收之而安其下甚則以苦泄之也吳昆曰燥為金氣火能勝之故治以苦溫苦溫從火化故也甘辛亦溫也燥而中寒者宜佐之燥熱之燥以苦下之可也驥案素問病機十九條遺漏燥證為其兼風熱之化但言風熱而燥在其中劉守真於六氣病補出諸澀枯涸乾勁皮揭皆屬於燥謂陽明燥金在肺與大腸之表也夫風能勝濕濕去則燥生燥兼熱化熱即火也易曰燥萬物者莫嘆乎火故喻昌補燥氣論其方用甘潤微寒而有清燥救肺之設葉桂亦有燥氣化火之論主於辛涼甘潤即經燥化於火熱反勝之治以辛涼佐以苦甘也乃燥之勝氣非燥之本氣也沈目南燥病論燥令必以涼氣感人肝木受邪而為燥故燥病屬涼謂之次寒病與傷寒同類故此但云燥淫於內治以苦溫沈明生燥論治燥之法以沸釜為喻血喻湯氣喻火火猛湯沸當沃薪滅火猶芩連梔膏朴硝大黃大苦至寒等劑清降火邪若沸久將干又當添益新水勝火猶冬地參耆歸芍甘寒甘溫之劑氣血雙補則燥得所潤而火有所制也醫壘元戎治燥方北方其脈遲寒燥也宜溫熱藥治之如硫附桂姜之屬吳溏溫病條辨於燥門立桑菊飲沙參麥冬湯翹荷湯治勝氣之燥立杏蘇飲加味桂柴各半湯治本氣之燥所謂秋燥之氣輕則為燥重則為寒化氣為濕復氣為火故經有辛涼苦溫之二法也寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之王冰曰以熱治寒是為摧勝折其氣用令不滋繁也苦辛之佐通事行之新校正云按藏氣法時論腎苦燥急食辛以潤之腎欲堅急食苦以堅之用苦補之咸瀉之舊注引此在濕淫於內之下無義今移於此吳昆曰寒為水氣甘從土化熱從火化土能制水熱能制寒故治以甘熱苦而辛亦熱品也故佐以苦辛傷寒內熱者以咸瀉之傷寒內燥者以辛潤之傷寒內熱見血者以苦堅之驥案太陽寒水之氣在人主表為心肺之陽統一身之榮衛實寒水之所司劉守真六氣病足太陽寒水乃腎與膀胱之氣也仲景在太陽有麻桂之例甘熱也入少陰有麻辛附子湯附子湯真武湯四逆白通等湯諸法亦甘熱也有黃連阿膠湯有急下承氣三證又苦寒也張會卿傷寒約法治分六端曰汗吐下溫清補汗主溫辛吐主發散下主鹹寒清主苦寒溫補主甘熱於經旨適合蓋太陽一經本寒標熱對化為火水勝必剋火論中之麻桂姜附治寒之本氣正化之本病也白虎承氣治寒之復氣對化之標病也故曰不明勝復之理不可與言氣化司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之王冰曰厥陰之氣未為盛熱故曰涼藥平之夫氣之用也積涼為寒積溫為熱以熱少之則其溫也以寒少之則其涼也以溫多之則其熱也以涼多之則其寒也各當其分則寒寒也溫溫也熱熱也涼涼也方書之用可不務乎故寒熱溫涼升降多少善為方者意必精通餘氣皆然從其制也新校正云按本論上文云上淫於下所勝平之外淫於內所勝治之故在泉曰治司天曰平也吳昆曰在泉言治司天言平平與治少異治有攻去之義平則調和之也風勝而平以辛涼金能平木也佐以苦甘則苦不至於燥急木性急故以甘緩之木氣升而不降故以酸瀉之張志聰曰按在泉之氣曰淫於內而曰治司天之氣曰所勝而曰平蓋天氣在外而地氣在內也治者治其內而使之外平者平其上而使之下是以在泉曰以辛散之在司天曰以酸瀉之馬蒔曰風淫所勝則平以辛涼佐以苦甘以甘緩之以酸瀉之彼厥陰在泉者其法與此同而復有以辛散之之語耳無以酸瀉之也驥案己亥歲半以上風化於天風為木氣惟金能勝故治以辛涼辛從金化涼為金氣也辛涼太過反傷金氣故佐以苦甘苦能溫金甘能益氣也經曰肝苦急急食甘以緩之以酸瀉之此生克勝復之理五運行大論天地之氣勝復之作不形於診六微旨大論氣有勝復太過者氣勝勝而複製則傷害甚不及者氣衰衰而復克則敗亂極勝復循環之理出乎天地之自然如木勝肝強必傷脾土肝勝不已燥必復之而肝亦病燥勝不已火必復之而肺亦病五藏互有盛衰人身自有虛實惟其有虛而復強者勝之有勝而復承者復之無衰無勝無勝無復其氣和平焉得有病有勝則復無勝則否勝微復微勝甚復勝勝復之微甚實由變化之盛衰馬元素輩假仲景之名而為傷寒鈴法用運氣之更遷擬主病之方治拘滯不通是不明天道生克勝復之理不足與言醫道熱淫所勝平以鹹寒佐以苦甘以酸收之王冰曰熱氣已退時發動者是為心虛氣散不斂以酸收之既以酸收亦兼寒助乃能殄除其源本矣熱見太甚則以苦發之汗已便涼是邪氣盡勿寒水之汗已猶熱是邪氣未盡則以酸收之已又熱則復汗之已汗復熱是藏虛也則補其心可矣法則合爾諸治熱者亦未必得再三發三治況四變而反覆者乎吳昆曰熱勝而平以鹹寒水能平火也佐以苦甘者苦瀉而甘緩也以酸收之者收其浮熱也張志聰曰此與在泉之治法相同但少以苦發之蓋自下而上淫於內者宜從之而發散於外也驥案此子午歲半以上熱化於天熱為火氣惟水能勝故治以鹹寒鹹寒太過反傷君火故以苦燥以甘補以酸收恐熱越不斂陽氣散亂也濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之王冰曰濕氣所淫皆為腫滿但除其濕腫滿自衰因濕生病不腫不滿者亦爾治之濕氣在上以苦吐之濕氣在下以苦泄之以淡滲之則皆燥也泄謂滲泄以利水道下小便為法然酸雖熱亦用利小便去伏水也治濕之病不下小便非其法也新校正云按濕淫於內佐以酸淡此云酸辛者辛疑當作淡吳昆曰濕勝而平以苦熱苦能燥濕濕得熱而消也木能制土故佐以酸酸而辛則非斂聚之酸矣故宜佐之濕而熱者以苦燥之濕而不熱以淡滲之馬蒔曰濕淫所勝則平以苦熱佐以酸辛以苦燥之以淡泄之彼太陰在泉者其法與此大同而止有佐以酸淡與此佐以酸辛者少異驥案丑未歲半以上濕化於天濕為土氣惟燥能勝故治以苦熱苦從木化用以制之辛酸並同者辛勝酸防酸之過也苦從火化火能助燥濕上甚而熱治以苦溫佐以甘辛以汗為故而止王冰曰身半以上濕氣有餘火氣復鬱郁濕相薄則以苦溫甘辛藥解表流汗而祛之故云以汗除病之故而已也吳昆曰金匱要略腰以下腫當利小便腰以上腫當發汗乃愈此皆治水濕之要法驥案濕鬱於上而化熱苦溫欲其燥甘辛取其汗火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之熱淫同王冰曰同熱淫義熱亦如此法以酸復其木氣也不復其氣則淫氣空虛招其損馬蒔曰火淫所勝則平以鹹冷佐以苦甘以酸收之以苦發之以酸復之與上熱淫所勝者同法蓋上為君火而此為相火也又與彼少陽在泉者同法但無以酸復之之一語耳張介賓曰此與在泉熱淫治同蓋水能勝火故平以鹹冷苦能瀉火之實甘能緩火之急故佐以苦甘火盛而散越者以酸收之火鬱而伏留者以苦發之然以發去火未免傷氣故又當以酸復之而火熱二氣同治也驥案寅申歲半以上火化於天火即熱氣與熱淫同此曰酸冷者酸能收逆氣寒能勝熱氣也火鬱則伏以苦發之而復以酸復之者恐發之過而傷氣也燥淫所勝平以苦濕佐以酸辛以苦下之王冰曰制燥之勝必以苦濕是以火之氣味也宜下必以苦宜補必以酸宜瀉必以辛清甚生寒留而不去則以苦濕下之氣有餘則以辛瀉之諸氣同新校正云按上文燥淫於內治以苦溫此云苦濕者濕當為溫又注中濕字三並當作溫又按六元正紀大論亦作苦小溫吳昆曰燥淫而平以苦濕苦從火化勝燥故也苦而濕則燥得其潤矣佐以酸辛者酸生液辛潤燥也燥甚非攻下不除是宜以苦下之張志聰曰苦溫能勝清金辛能潤燥燥必內結故以酸苦泄之馬蒔曰燥淫所勝則平以苦溫佐以酸辛以苦下之彼陽明在泉者其法與此大同但彼則佐以甘辛而此則佐以酸辛耳驥案卯酉歲半以上燥化於天燥為金氣惟火能勝苦從火化故平以苦溫酸瀉木而補金辛瀉金而補木故佐以酸辛燥兼熱化燥萬物者莫嘆乎火苦能降火故以苦下之寒淫所勝平以辛熱佐以甘苦以咸瀉之王冰曰淫散止之不可過也新校正云按上文寒淫於內治以甘熱佐以苦辛此云平以辛熱佐以甘苦者此文為誤又按六元正紀大論云太陽之政歲宜苦以燥之也吳昆曰寒淫而平以辛熱者辛能散寒熱能回陽也佐以苦甘者苦以濟辛熱甘以和辛熱也傷寒入胃則為裡熱若是者以咸瀉之張志聰曰夫淫於內則干涉於藏氣故上文曰以辛潤之以苦堅之此勝於外止宜平之瀉之馬蒔曰寒淫所勝則平以辛熱佐以苦甘以咸瀉之彼太陽在泉者則復有以辛潤之以苦堅之之二語耳張介賓曰辛熱足以散寒苦甘可以勝水以咸瀉之水之正味其瀉以咸也驥案辰戌歲半以上寒化於天寒為水氣惟熱能勝熱從火化也然陰病惡燥故以辛潤辛從金化水之母也帝曰邪氣反勝治之奈何岐伯曰風司於地清反勝之治以酸溫佐以苦甘以辛平之王冰曰厥陰在泉則風司於地謂五寅歲五申歲邪氣勝盛故先以酸瀉佐以苦甘邪氣退則正氣虛故以辛溫養而平之吳昆曰不能淫勝於他氣勝己者為邪而反勝之治以酸溫者酸為風木之嚮導溫抑清氣之反勝也苦勝燥而甘緩之故佐以苦甘辛能溫清又能補木故以辛平之張志聰曰邪氣反勝者不正之氣反勝在泉主歲之氣又當用勝邪之氣味以平治之天氣反時則可依時此之謂也張介賓曰反勝者以天地氣不足則間氣乘虛為邪而反勝之驥案素問六節藏象論太過不及各有所勝又至而不至此為不及所不勝以薄之五運行大論氣不及則己所不勝侮而乘之侮而受邪寡於畏也此清勝風寒勝熱熱勝濕寒勝火熱勝燥熱勝寒皆邪氣也故曰反勝至真要大論必先五勝疏其邪氣寶命全形論五勝更立五十難從所不勝來者為賊邪是謂邪氣反勝也經曰邪之所湊其氣必虛故先治其勝而後平之以復其正也熱司於地寒反勝之治以甘熱佐以苦辛其鹹平之王冰曰少陰在泉則熱司於地謂五卯五酉之歲也先瀉其邪而後平其正氣也吳昆曰甘與熱皆陽治以甘熱者扶熱而抑寒也佐以苦辛者寒得苦而投遇辛而散也寒在外熱在內怫熱作實故以鹹平之濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之王冰曰太陰在泉則濕司於地謂五辰五戌歲也補瀉之義餘氣皆同吳昆曰苦冷陰也治以苦冷者扶濕而抑熱也佐以鹹甘者熱得甘而緩遇咸而軟也猶有未解者則以苦平之火司於地寒反勝之治以甘熱佐以苦辛以鹹平之王冰曰少陽在泉則火司於地謂五己五亥歲也吳昆曰與熱司天同不復詳燥司於地熱反勝之治以平寒佐以苦甘以酸平之以和為利王冰曰陽明在泉則燥司於地熱反勝之謂五子五午歲也燥之性惡熱亦畏寒故以冷熱和平為方制也吳昆曰治以平寒者燥為慘殺之氣不欲扶之但以平寒抑熱耳佐以苦甘者苦能瀉實熱甘能瀉虛熱也熱與燥皆能消人五氣故以酸平之以和為和者戒過甚也寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之王冰曰太陽在泉則寒司於地謂五醜五未歲也此六氣方治與前淫勝法殊貫云治者瀉客邪之勝氣也云佐者皆所利所宜也云平者補已弱之正氣也吳昆曰治以寒冷者扶寒氣之不足抑熱氣之有餘也佐以甘辛者甘以調寒熱辛以行鹹冷也以苦平之調其未盡之邪也帝曰其司天邪勝何如岐伯曰風化於天清反勝之治以酸溫佐以甘苦王冰曰己亥歲也吳昆曰酸能為風化之嚮導溫能平清氣之反勝甘以和之苦以下之張志聰曰此論六氣司天邪氣反勝宜以所勝之氣味平之馬蒔曰此言六氣司天反為邪氣所勝者而有治之之法張介賓曰言司天反勝驥案上言司地邪勝之治法此言司天邪勝之治法熱化於天寒反勝之治以甘溫佐以苦酸辛王冰曰子午歲也吳昆曰甘溫能勝寒苦為反佐酸以養陰辛以散寒濕化於天熱反勝之治以苦寒佐以苦酸王冰曰丑未歲也吳昆曰苦寒能祛熱熱勝則亡陰液故佐以苦酸火化於天寒反勝之治以甘熱佐以苦辛王冰曰寅申歲也吳昆曰甘熱能勝寒苦為反佐辛能散寒燥化於天熱反勝之治以辛寒佐以苦甘王冰曰卯酉歲也吳昆曰辛能散熱寒能勝熱苦能下熱甘能緩熱寒化於天熱反勝之治以鹹冷佐以甘辛王冰曰辰戌歲也吳昆曰治以鹹冷所以假其祛熱苦以下熱辛以散熱帝曰六氣相勝治之奈何岐伯曰厥陰之勝治以甘清佐以苦辛以酸瀉之少陰之勝治以辛寒佐以苦鹹以甘瀉之太陰之勝治以咸熱佐以辛甘以苦瀉之少陽之勝治以辛寒佐以甘鹹以甘瀉之陽明之勝治以酸溫佐以辛甘以苦泄之太陽之勝治以甘熱佐以辛酸以咸瀉之王冰曰六勝之至皆先歸其不勝己者之故不勝者當先瀉之以通其道次瀉所勝之氣令其退釋也治諸勝而不瀉遣之則盛氣浸盛而內生諸病也新校正云詳此為治皆先瀉其不勝而後瀉其來勝獨太陽之勝治以甘熱為異疑甘字苦之誤也若云治以苦熱則六勝之治皆一貫也吳昆曰木勝則土敗治之以甘益土也治之以清平木也佐以苦辛散風熱也木氣作實以酸瀉之熱勝則乘金治之以辛散熱也治之以寒平熱也佐以苦鹹下熱也甘能緩火之急乃所以瀉之土勝則濕勝治之以咸潤下也治之以熱燥濕也佐以辛甘利土氣也濕土作實以苦瀉之火勝乘金治以辛寒者辛能散火寒能抑火也佐以甘鹹者甘緩火氣之急速咸軟火氣之燥實也復言以甘瀉之重甘瀉也金勝則燥勝治之以酸潤燥也治之以溫平金也佐以辛甘散清也以苦瀉之下燥實也太陽寒水也治之以甘益土以防水也治之以熱扶陽而散寒也佐之以辛則甘不滯佐之以酸則熱不燥寒氣入里變熱而作燥實則用鹹以瀉之張志聰曰治諸勝氣寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者軟之脆者堅之衰者補之強者瀉之各安其氣則病氣衰去此治之大體也驥案厥陰之勝風木氣勝而土受制治以甘清者甘土味而清金氣也土木相生木有制而土不克也苦以生土辛以平木故佐之木性條達以酸瀉之少陰君火氣勝而金受制辛為金味寒為水氣金水相生則火有制而金不傷也故以治之佐以苦鹹者苦從火化以助其辛鹹從水化以助其寒火性急故以甘緩之太陰濕土氣勝而水受制治以咸熱者濕熱則以咸化之濕寒則以熱治之濕勝則土寒辛能溫甘能補故佐以辛甘若濕勝而土實則以苦瀉之土之正味其瀉以苦也少陽相火氣勝而金受制則治以辛寒瀉之以甘與少陰同佐以甘鹹與少陰異甘能瀉火咸能泄熱也陽明燥金氣勝而木受制治以酸溫者酸為木味溫為火氣木火相生則金有制而木不傷陽明有燥金之氣有清金之氣燥氣有餘則辛以散之清氣不足則甘以滋之苦從火化能泄燥邪也太陽寒水氣勝而心受制治以甘熱者甘為土味熱為火氣火土相生則水有制而火不散辛能散寒酸收心氣故佐以辛酸水之正味其瀉以咸故以咸瀉之帝曰六氣之復何如岐伯曰厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之王冰曰不太緩之夏猶不已復從於勝故治以辛寒也新校正云按別本治以酸寒作治以辛寒也吳昆曰風木以升發為性治之以酸收之也治之以寒清之也佐以甘辛順其升達之體也以酸瀉之瀉其有餘也以甘緩之緩其太急也張介賓曰復者報復之義六氣盛衰不常有所勝則有所復也王氏凡先有勝後必復新校正引玄珠正化對化之義云正司化令之實對司化令之虛對化勝而有復正化勝而不復反以王注為未然或又曰甲丙戊庚壬陽年太過有勝無復乙丁己辛癸陰年不及有勝必有復皆未達之言也夫勝復之道隨氣盛衰而見非有正對之分考之本經諸篇原無此言其於不及有復太過無復之說蓋以氣交變大論凡太過之運皆不言復惟不及之年則有之六元正紀大論所載六十年運氣之紀亦惟不及之歲言復而太過之年則無似乎陽年太過有勝無復然五常正大論發生之紀不務其德則收氣復赫曦之紀暴烈其政藏氣乃復敦阜之紀大風迅至邪傷脾也堅成之紀收政暴變長氣斯救流衍之紀政過則化氣大舉是皆以太過之歲為言由此觀之則陽年未嘗無復也惟是陰年氣弱彼來勝我故子必起而報之故謂之復陽年氣強無勝我者但以我勝彼故承乃從而制之然曰承曰複本一理也但相繼而制者謂之承因勝而報者謂之復勝復相仍本無罅隙故經曰有勝則復無勝則否勝至則復無常數也又曰微者復微甚者復甚然則氣之微甚尚不可以假借又何有陰陽正對復與不復之理哉故本論無分太過不及之年皆有淫勝反勝相勝之氣可見陽年未必全勝而反者有之陰年未必全衰而淫勝者亦有之天地變化消長無窮但當隨厥氣幾而察以方月之義庶得其妙若必因辭害意則失之遠矣驥案復者子復母仇也酸木味寒水氣木之正味其瀉以酸木火相生宜治之以寒也木盛土衰甘補土辛制木故佐以辛甘也酸瀉辛緩木之正治少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之以咸軟之王冰曰不大發汗以寒攻之持至仲秋熱內復結而為心熱少氣少力而不能起矣熱伏不散歸於骨矣吳昆曰君火以熱為政治以鹹寒用其所不勝也佐以苦辛苦降而辛散也火遇甘而緩是為瀉之遇酸而斂是為收之結熱得苦而散是為發之堅實得咸而解是為軟之驥案鹹水味寒水氣水制火也發不遠熱故佐以苦辛甘酸瀉火而斂浮熱苦寒散火而解結熱太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之王冰曰不燥泄之久而為身腫腹滿關節不利腨及伏兔沸滿內作腰膝脛內胕腫病吳昆曰太陰以濕為政治之以苦燥濕也治之以熱熯濕也佐以酸辛者酸從木化能平濕土之甘辛從金化能散濕土之滯以苦瀉之奪之也濕勝不宜潤故燥之濕勝不宜塞故泄之馬蒔曰太陰之復治以苦熱佐以酸辛內用苦者所以瀉之燥之泄之也驥案苦火味熱火氣苦瀉土熱燥濕也佐以酸辛者木能生火火不足則佐以酸金能生水火太過則佐以辛土位之主其瀉以苦瀉以奪其實燥以勝其濕泄以利其濕也少陽之復治以鹹冷佐以苦辛以咸軟之以酸收之辛苦發之發不遠熱無犯溫涼少陰同法王冰曰不發汗以奪盛陽則熱內淫於四肢而為解㑊不可名也謂熱不甚謂寒不甚謂強不甚謂弱不甚不可以名言故謂之解㑊粗醫呼為鬼氣惡病也久久不已則骨熱髓涸齒乾乃為骨熱病也發汗奪陽故無留熱故發汗者雖熱生病夏月及瘥亦用熱藥以發之當春秋時縱火熱勝亦不得以熱藥發汗汗不發而藥熱內甚助病為瘧逆伐神靈故曰無犯溫涼少陰氣熱為療則同故云與少陰同法也數奪其汗則津竭涸故以酸收以咸潤也新校正云按六元正紀大論發表不遠熱吳昆曰少陽相火也治以鹹冷用其所不勝也佐以苦辛苦能降火辛能散火也因火而作堅實者以咸軟之因火而傷陰氣者以酸收之因火而鬱怫者辛苦發之凡發表不遠熱但無犯溫涼耳熱甚於溫所以不用溫者徒能溫中不能達表散邪反滋內熱故也所以不用涼者本以陽明涼勝故少陽復之又犯其涼是違天也不可明矣少陰同驥案鹹水味冷水氣水能勝火也苦從火化火氣虛則佐以苦辛從金化火氣盛則佐以辛而又鹹軟以解熱之結酸收以斂熱之浮參少陰條陽明之復治以辛溫佐以苦甘以苦泄之以苦下之以酸補之王冰曰泄謂滲泄汗及小便湯浴皆是也秋分前後則亦發之春有勝則依勝法或不已亦湯漬和其中外也怒復之後其氣皆虛故補之以安全其氣余復治同吳昆曰陽明以清為政治以辛溫用其所不勝也佐以苦甘苦勝燥甘勝急也以苦泄之湧之也以苦下之奪之也燥傷液酸生之是謂補之驥案辛金味溫火氣瀉金以辛勝清以溫也故治以辛溫苦以制金甘以生金故佐以苦甘而又苦泄以開燥結酸補以斂津液下泄也太陽之復治以咸熱佐以甘辛苦以堅之王冰曰不堅則寒氣內變止而復發發而復止綿歷年歲生大寒疾吳昆曰太陽寒水也治之以咸從治也治之以熱正治也佐以甘辛用其散也以苦堅之用其守也張介賓曰寒水通於腎腎不堅則寒易起驥案鹹水味熱火氣瀉水以咸治咸以熱也故治以咸熱甘制水辛散寒故治以甘辛經曰腎欲堅急食苦以堅之治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者軟之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也王冰曰太陽氣寒少陰少陽氣熱厥陰氣溫陽明氣清太陰氣濕有復勝則各倍其氣以調之故可使平也宗屬也調不失理則余之氣自歸其所屬少之氣自安其所居勝復衰已則各補養而平定之必清必靜無妄撓之則六氣循環五神安泰若運氣之寒熱治之平之亦各歸司天地氣也吳昆曰宗主也言病氣衰去歸依六氣所主更無偏勝為患也張志聰曰五味六氣之中辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或渴或軟或堅有補有瀉有逆有從各隨五行六氣之所宜安其勝復之氣使之必清必靜則病氣得而各歸其所主之本位此治之大體也馬蒔曰此總結言治之勝復之大體高者抑之下者舉之有餘折之不足補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之王冰曰高者抑之制其勝也下者舉之濟其弱也有餘折之屈其銳也不足補之全其氣也雖制勝扶弱而客主須安一氣失所則矛盾更作榛棘互興各伺其便不相得志內淫外並而危敗之由作矣同謂寒熱溫清氣相比和者異謂水火金木土不比和者氣相得者則逆所勝之氣以治之不相得者則順所不勝氣以治之治火勝負欲益者以其味欲瀉者亦以其味勝與不勝皆折其氣也何者以其性躁動也治熱亦然張志聰曰高者抑之謂主氣之逆於上也下者舉之謂客氣之乘於下也有餘者勝氣也不足者所不勝之氣而為病也佐以所利者利其所欲也如肝欲散急食辛以散之是以厥陰之勝佐以辛心欲軟急食鹹以軟之是以少陰之勝佐以咸脾欲緩急食甘以緩之是以太陰之勝佐以辛甘肺欲收急食酸以收之是以燥淫所勝佐以辛酸腎欲堅急食苦以堅之是以寒淫所勝佐以甘苦和其所宜者利其五味之所宜也如厥陰色青宜食甘少陰少陽色赤宜食酸太陰色黃宜食鹹陽明色白宜食苦太陽色黑宜食辛安其主客者使各守其本位也適其寒溫者治寒以熱治熱以寒治溫以涼治涼以溫也同者逆之謂氣之相得者宜逆治如主客之同司火熱熱則當治以鹹寒如同司寒水則當治以辛熱溫涼亦然此逆治之法也異者從之謂不相得者當從治之如寒水司天以臨於二火主氣之上客勝當從二火之熱以治寒主勝當從司天之寒以治熱餘氣皆然此平治異者之法也馬蒔曰大約病在高者則抑而下之病在下者則舉而升之李東垣云高者抑之非高者固當抑也以其本下而失之太高故抑之而使下若本高何抑之有下者舉之非下者固當舉之也以其本高而失之太下故舉而使之高若本下何舉之有病為邪氣有餘則折之病為正氣不足則補之佐以所利和以所宜必使主客各安而寒溫相適寒熱溫清與民病之氣相同者則逆而正治之不相得而異者從治之此其治主客之大體也帝曰治寒以熱治熱以寒氣相得者逆之不相得者從之餘以知之矣其於正味何如岐伯曰木位之主其瀉以酸其補以辛王冰曰木位春分前六十一日初之氣也吳昆曰主客氣同為相得主客氣異為不相得正味調攝六部主客之正味也張志聰曰此承上文而言四時主客之氣各有本位之正味木位之主厥陰所主之位也此乃四時不易之定位故曰位如未至所主之時而陽春之氣先至此氣之盛也宜瀉之以酸如至而未至此氣之衰也宜補之以辛蓋木性升酸則反其性而收之故為瀉辛則助其發生之氣故為補馬蒔曰木位之主氣春分前六十一日為初之氣張介賓曰五行化氣補瀉之味各有專主故曰正味此不特客主之氣為然驥案主客之位運氣皆有之運有五木火土金水五運分五氣風暑濕燥寒木運之氣為風順布春令為初之運火運之氣為暑順布夏令為二之運土運之氣為濕順布長夏之令為三之運金運之氣為燥順布秋令為四之運水運之氣為寒順布冬令為五之運此五運之主位也六氣之主位厥陰風木主春初之氣少陰君火主夏二之氣少陽相火主盛夏三之氣太陰濕土主長夏四之氣陽明燥金主秋五之氣太陽寒水主冬六之氣此六氣之主位也天以五為制地以六為節四時常令年年相仍而不易故曰主木性升酸則反其性而收之故瀉木喜達辛則助其氣而發之故補火位之主其瀉以甘其補以咸王冰曰君火之位春分之後六十一日二之氣也相火之位夏至前後各三十日三之氣也二火之氣雖殊然其氣用則一吳昆曰火有二春分後六十一日二之氣也少陰君火主之大暑以後六十一日四之氣也少陽相火主之張志聰曰二之氣乃君火所主之位三之氣乃相火所主之位如未至三月而暄熱之氣先至未至五月而炎暑之氣先至此來氣有餘也宜瀉之以甘蓋從子而泄其母氣也如至而不至此氣之不及也宜補之以咸蓋以水濟火也王子律曰腎水不足則心懸如病飢水之不濟也驥案火性速甘則反其性而緩之故曰瀉火欲軟咸則順其性而軟之故曰補土位之主其瀉以苦其補以甘王冰曰土之位秋分前六十一日四之氣也吳昆曰小滿後六十一日三之氣也太陰濕土主之張志聰曰土主於四之氣如主氣之時埃蒸注雨氣之盛也宜苦以泄之瀉其敦阜之氣如化氣不令風寒並興主氣之不足宜補之以甘蓋氣不足者補之以味也驥案土性濕苦則反其性而燥之故曰瀉土欲緩甘則順其性而緩之故曰補金位之主其瀉以辛其補以酸王冰曰金之位秋分後六十一日五之氣也吳昆曰秋分後六十一日五之氣也陽明燥金主之張志聰曰五之氣也未及時而清肅之氣早至此氣之盛也其瀉宜辛以辛散之也如至秋深而暑熱尚在氣之不及也其補宜酸以酸收之也驥案金性收辛則反其性而散之故曰瀉金欲收酸則順其氣而收之故曰補水位之主其瀉以咸其補以苦王冰曰水之位冬至前後各三十日終之氣也吳昆曰小雪以後六十一日終之氣也太陽寒水主之張志聰曰終之氣也如未及時而天氣嚴寒冰雪霜雹氣之盛也瀉之以咸蓋咸能泄下從其類而瀉之也如已至而天氣尚溫此氣之不及也宜補之以苦蓋味苦陰寒而炎上作苦助太陽標本之味也所謂調之正味以平為期勿使四時不平之氣而為民病也驥案水性凝咸則反其性而軟之故曰瀉水欲堅苦則順其氣而堅之故曰補厥陰之客以辛補之以酸瀉之以甘緩之少陰之客以咸補之以甘瀉之以咸收之王冰曰新校正云按藏氣法時論心苦緩急食酸以收之心欲軟急食鹹以軟之此云以咸收之者誤也吳昆曰客者逐年更易如客之不常也其法以當年支後第三支起初之氣如子年子後第三支是戌戌為寒水初氣便以寒水為客以次推遷厥陰則二氣也張志聰曰此加臨之六氣而有太過不及之正味也六氣運行無有定位如賓客之外至故曰客常以正月朔日平旦視之張介賓曰客者客氣之為病也後仿此驥案主客之位運氣皆有主氣已如上述所謂客氣者加臨之氣也古聖仰觀五天五氣見蒼天木氣下臨丁壬之方故識丁壬合化而生木丹天火氣下臨戊癸之方故識戊癸合化而為火黅天之氣下臨甲己之方故識甲己合化而為土玄天水氣下臨丙辛之方故識丙辛合化而為水素天金氣下臨乙庚之方故識乙庚合化而為金此天氣合化加臨主氣五位之客運也起以所化統主本中運為初運如甲己之年土運統之起初運土生金為二運余仿土運起之此言天干起運若地支起氣例如子午少陰君火司天陽明燥金在泉氣由下而升上故以下之陽明起之陽明二陽也二陽生三陽三陽太陽也太陽寒水為客初氣即地之左間也三陽陽極生一陰一陰厥陰也厥陰為客二氣即天之右間也余仿此法起例每歲司天在泉左右四間氣者即六氣分統上下本年司天統主上半年在泉統主下半年之統氣也對主運主氣言之故曰客太陰之客以甘補之以苦瀉之以甘緩之少陽之客以咸補之以甘瀉之以咸軟之陽明之客以酸補之以辛瀉之以苦泄之太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也王冰曰客之部主各六十一日居無常所隨臟遷移客勝則瀉客而補主主勝則瀉主而補客應隨當緩當急以治之張志聰曰藏氣法時論脾欲緩急食甘以緩之心欲軟急食鹹以軟之肺苦氣上逆急食苦以泄之腎欲堅急食苦以堅之腎苦燥急食辛以潤之開腠理致津液通氣也馬蒔曰太陰之客氣以甘補之以苦瀉之以甘緩之蓋其補甘瀉苦者與主氣同而補之者正所以緩之也少陽之客氣以咸補之以甘瀉之與主氣同而補之者正所以軟之也陽明之客氣以酸補之以辛瀉之以苦泄之蓋其酸補辛瀉者與主氣同而又必以苦泄之也太陽之客氣以苦補之以咸瀉之蓋其苦補咸瀉者與主氣同而又必以苦堅之以辛潤之也此皆所以開發腠理致其津液以通各經之氣耳帝曰夫子言春秋氣始於前冬夏氣始於後余已知之矣然六氣往復主歲不常也其補瀉奈何王冰曰以分至分明六氣分位則初氣四氣始於立春立秋前各一十五日為紀法三氣六氣始於立夏立冬後各一十五日為紀法由是四氣前後之紀則三氣六氣之中正當二至日也故曰春秋氣始於前冬夏氣始於後也然以三百六十五日易一氣一歲已往氣則改新新氣既來舊氣復去所宜之味天地不同補瀉之方應知先後故復以問之也吳昆曰主歲指司天在泉而言張志聰曰春秋之氣始於前者言春在歲半以上之前秋在歲半以下之前夏冬之氣在二氣之後謂四時之主氣也六氣往復主歲不常者謂加臨之客氣六期環轉無有常位也馬蒔曰此言六氣主歲各有宜用之正味也岐伯曰上下所主隨其攸利正其味則其要也左右同法大要曰少陽之主先咸後苦厥陰之主先酸后辛少陰之主先苦後甘佐以所利資以所生是謂得氣王冰曰主謂主歲得謂得其性用也得其性用則舒捲由人不得性用則動生乖忤豈祛邪之可望乎適足以伐天真之妙氣爾如是先後之味皆謂有病先瀉之而後補之也吳昆曰此皆先瀉而後補也利者升降浮沉各因其性而利之也生者標本與中各有所從生化之氣也張志聰曰四時之主氣前後交通得氣之清靜若受客勝以動之又不能循序而苛疾起是以上下所主及左右之間氣當隨其攸利正其味以調之乃其要也大要宜先瀉而後補之蓋以佐主氣之所利資主氣之所生是謂得四時之氣生化而交通也特前章論客氣之補瀉先補而後瀉者在客之本氣而論也此復以先瀉而後補者為四時之主氣而言也張介賓曰司天在泉上下各有所主應補應瀉但因所利而用之其要以正味為主也左右間氣上者同於司天下者同於在泉故曰同法主謂主歲非客主之主也按此即六氣補瀉之正味六氣勝至必當先去其有餘後補其不足故諸味之用皆先瀉而後補自補瀉正味之外而復佐以所利兼其所宜也資以所生助其化源也是得六氣之和平矣驥案六氣司天在泉勝復主客之補瀉不名一藥而六味之酸苦辛甘鹹淡四氣之寒熱溫涼入各臟而分補瀉者皆藥也皆方也後人謂內經為無方之書是不知藥物性味之所以然苟明性味便知用藥便能處方余輯內經十二方注已備詳之又謂古方不能治今病不知古今人同此經絡臟腑古今藥物之性味同此溫涼寒熱酸苦辛甘鹹淡果能明於五藏之苦欲氣味補瀉之無差握其制方之根原醫療之本始安見其不能治病也欲明六氣之勝復與補瀉之權宜不可不於此篇三致意也茲將海藏湯液本草六氣補瀉法圖於下方俾歸簡易庶讀者一目瞭然而免繁難也
