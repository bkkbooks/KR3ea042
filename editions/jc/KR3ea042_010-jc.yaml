body:
  text: 卷十藥制素問五常政大論上取下取內取外取以求其過能毒者以厚藥不勝毒者以薄藥王冰曰上取謂以藥制有過之氣也制而不順則吐之下取謂以迅疾之藥除下病攻之不去則下之內取謂食及以藥內之審其寒熱而調之外取謂熨藥令所病氣調適也當寒反熱以冷調之當熱反寒以溫和之上盛不已吐而脫之下勝不已下而奪之謂求得氣過之道也藥厚薄謂氣味厚薄者也新校正云按甲乙經胃厚色黑大骨肉肥者皆勝毒其瘦而薄胃者皆不勝毒又按異法方宜論西方之民陵居而多風水土剛強不衣而褐薦華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥吳昆曰察其面目口舌上取也問其二便通塞不取也切其脈之虛實內取也探其身之寒熱外取也若其人胃厚色黑形大肉肥此能毒者宜治以厚藥若其胃薄色浮形小肉瘦此不能毒者宜治以薄藥張志聰曰上下謂司天在泉之氣夫司天在泉之氣升降於上下五運之氣出入於外內各求其有過者取而治之此治歲運之法也徐振公曰能以大寒之藥治熱淫大熱之藥治寒病是能勝其毒者馬蒔曰凡治病者或取之上而吐之或取之下而下之或取之內而內消之或取之外而熨解之此上下內外皆就人身言皆求人身之有病者何在靈樞經論痛篇少俞曰胃寒色黑大骨及肥者皆勝毒故其瘦而薄皮者皆不勝毒驥案人身有上下內外證治亦有上下內外三焦之氣所以通行上下者也營衛之氣所以內外出入者也素問至真要大論氣有高下證有內外補上治上制以緩緩則氣味薄薄者則頻而少服補中治下制以急急則氣味厚厚者則頻而多服陰陽應象大論高者因而越之下者引而竭之皆上取下取之法又從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先調其外而後調其內外有輕揚汗發之制內有泄瀉攻通之制此內取外取也凡藥皆有毒周禮醫師類聚毒藥以供醫事素問異法方宜篇西方之人邪不能傷其形體病生於內治宜毒藥靈樞邪氣臟腑病形篇陰陽形氣俱不足調以甘藥終始篇陰陽俱不足可將以甘藥不可飲以至劑蓋藥味之甘而淡者和平無毒藥之有毒者謂乖戾不和稟氣之偏者也故氣之毒者必熱味之毒者必辛枝苗氣薄而升以治上根鬚味厚而降以治下又鄭注藥之辛苦者恆多毒然苦參細辛雖辛苦而無毒有毒者謂巴豆狼牙之類無毒者謂人參芎藭之類變通運用存乎其人氣反者病在上取之下病在下取之上病在中傍取之王冰曰下取謂寒逆於下而熱攻於上不利於下氣盈於上則溫下以調之上取謂寒積於下溫之不去陽藏不足則補其陽也傍取謂氣並於左則藥熨其右氣並於右則熨其左以和之必隨寒熱為適凡是七者皆病無所逃動而必中斯為妙用矣吳昆曰反謂反其常候也治之者亦權其反而取之張介賓曰氣反者本在此而標在彼也其病既反其治亦宜反張志聰曰至真要大論上勝而下俱病者以地名之下勝而上俱病者以天名之即此義也馬蒔曰上文上下內外皆正治也然有反氣而治者驥案陰陽上下中外左右互為其根上為陽下為陰外為陽內為陰左為陽右為陰素問陰陽應象大論陽病治陰陰病治陽繆刺論左刺右右刺左清陽為天濁陰為地天氣上為云地氣下為雨雨出地氣云出天氣六微旨篇升已而降降者謂天降已而升升者謂地脈要精微論上部法天胸喉中事下部法地少腹腰股膝脛足中事易雷風相薄天地交泰水火既濟山澤通氣上下相通故氣反者逆取之又脾主為胃行其津液建中央以運四旁又中外不相及則治主病皆經說治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之王冰曰氣性有剛柔形證有輕重方用有大小調治有寒溫盛大則順氣性以取之小軟則逆氣性以伐之氣殊則主必不容力倍則攻之必勝是則謂湯飲調氣之制新校正云按至真要大論熱因寒用寒因熱用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已者也吳昆曰治熱以寒溫而行之者寒藥溫服也治寒以熱涼而行之者熱藥涼服也治溫以清冷而行之者清藥冷服也治清以溫熱而行之者溫藥熱服也張介賓曰藥以與病逆者恐不相投故從其氣以行之假借之道也驥案寒熱陰陽各有真假似是而非每至錯亂如病人大熱煩燥口渴舌躁似乎熱病視其面色赤此戴陽也切其脈尺弱而無力寸關豁大而無倫此則陰盛於下逼陽於上假陽之症以苦寒之藥從其性而折之頃刻平矣如人惡寒身不離復衣手足逆冷有似乎寒視其面色滯切其脈澀按之細數而無力此係假寒之症寒在皮膚熱在骨髓以辛涼之劑溫而行之一汗而愈仲景白通用膽汁五苓用桂明乎逆順思過半矣劉河間曰夏熱太甚林木流津冬寒太甚流水冰堅火極似水陰極似陽也故消之削之吐之下之補之瀉之久新同法王冰曰量氣盛虛而行其法病之新久無異道也張志聰曰消之削之內取外取也吐之下之上取下取也補之瀉之補上補下治上治下也久者謂伏氣之病新者感而即發也張介賓曰消以去滯削以攻堅上實者宜吐下實者宜下補因正之不足瀉因邪之有餘但此中用有緩急治有先後而病之久新同其法也驥案徐之才十劑宣可去壅姜橘之屬推之瓜蒂散梔豉湯姜鹽湯參蘆藜蘆之類皆宣也皆所以吐之也通可去滯通草防己之屬推之五苓四苓琥珀海金砂桃仁紅花五靈脂之類皆通也皆所以消之削之也瀉可去閉葶藶大黃之屬推之大小承氣大柴胡十棗湯之類皆瀉也皆所以下之瀉之也補可扶弱人參羊肉之類推之四君四物八珍十全皆所以補之也和劑者本此帝曰病在中而不實不堅且聚且散奈何岐伯曰悉乎哉問也無積者求其藏虛則補之王冰曰隨病所在命其藏以補之吳昆曰積者五臟所生聚而不散者不實不堅且聚且散則為無積張志聰曰此謂五運之氣為病而有治之之法也病在中者根於中也不實不堅且聚且散者出入於外內也故敷和之紀其藏肝其病裡急支滿備化之紀其藏脾其病痞蓋五運之氣內合五藏故無積者當求其藏也藏氣虛則補之馬蒔曰此言病有在中而聚散不常當審虛實兼藥食和中外以治之張介賓曰積者有形之病有積在中則堅實不散今不實不堅且聚且散無積可知無積而病在中藏之虛也故當隨病所在求其藏而補之驥案素問大積大聚衰其大半五十五難積者陰氣聚者陽氣氣之所積名曰積氣之所聚名曰聚積發有常處痛不離其部上下有終始左右有常處聚發無根本上下無留止痛無始處金匱五藏風寒積聚篇積者藏病終不移聚者府病發作有時展轉痛移此不堅不實且聚且散是無積也無積是臟虛虛則當補之臟虛連讀藥以祛之食以隨之王冰曰食以無毒之藥隨湯元以迫逐之使其盡也馬蒔曰食即穀肉果菜張介賓曰藥以祛之去其病也食以隨之養其氣也驥案此承上補虛來邪之所湊其正必虛補正所以祛邪也如先天之陽虛當補命門桂附之類是也先天之陰虛宜補腎水地茱麥味之類是也後天之陽虛宜溫胃以補氣參耆苓朮之類後天之陰虛宜補心肝以養血歸地芍藥之類正盛而邪自祛矣如邪未去或少加祛邪之藥而邪無不祛矣食即周禮食醫食齊眂春時羹齊眂夏時醬齊眂秋時飲齊眂冬時此藥食宜也參五宜篇行水漬之和其中外可使畢已王冰曰中外通和氣無流礙則釋然消散真氣自平張志聰曰行水漬之以取汗和其中外使邪從外出可使畢已馬蒔曰用藥之湯水以漬之則藥食調其中而湯水治其外庶幾中外和而病可已張介賓曰行水漬之通其經也若是則中外調和而病可已祛者非攻擊之謂凡去病者皆可言祛漬資四切浸洗也驥案水漬法所以宣通形表散發邪氣虛邪傷人當以汗解若人肌膚堅實腠理密緻難於取汗素問陰陽應象大論其有邪者漬形以為汗玉機真藏論脾風可浴巢氏病源邪在表洗浴發汗本草衍義熱湯助陽氣行經絡風冷氣痹之人多以湯漬腳至膝上厚被使汗出朱真人治風疾掘坑令坐坑內熱湯淋之良久以簟蓋之汗出而愈許仁則桃柳等三物浴湯取汗李時珍治寒濕加艾煎湯治風虛加五枝按食物本草五枝桃柳桑柘槐也或五加煎湯薰洗為效更速皆取汗法聖濟總錄有因大飲中酒恐毒氣內攻於藏者有服五石發動氣攻於陽者皆以浴法治之聖惠治傳屍骨蒸有沐浴方驅惡氣千金方有沐浴方七首治客忤馬通浴方本草治咳嗽生薑沐浴嬰孺方治小兒不生肌肉又三歲不行五參浴湯小兒直訣治肥體體熱用烏蛇白礬青黛天麻全蠍朱麝桃枝浴體博愛心鑑治痘瘡頂陷有水揚湯經驗後方小兒胗豆令速出酒沃沸胡荽噴一身百合病金匱有百合洗方卒死壯熱又有礬石水煎漬腳中風千金有大戟洗方方氏家藏方用蛇床防風等八味淋渫水腫本草引韋宙獨行方赤小豆煮爛汁漬膝以下神巧萬全方樟柳赤豆麻黃桑白水氣薰洗虛冷御醫院方還童散外固壯陽氣用丁香十四味水煎少腹以下淋浴又百花散用百花窠等五味水煎淋洗補元陽通血脈又施圓端效方治下元虛冷用椒目桂川烏細辛乾薑水煎渫浴下部聖惠發背門已潰未潰毒氣結聚當用藥煮湯淋拓瘡上散其熱毒是水漬除汗法外有攻有補法各不同今邨亮祗卿醫事啟源皇國亦有湯漬法見榮花物語余謂暖洗所以生陽宜澡洗而不澡洗使人陽氣上行陰邪相害不當澡渫而澡渫使人濕侵皮膚熱生肌體若用之得宜汗下攻補無不取效此承上補虛來當從虛邊治帝曰有毒無毒服有約乎岐伯曰病有新久方有大小有毒無毒固宜常制矣大毒治病十去其六王冰曰下品藥毒毒之大也吳昆曰此約其常制也勿使過之過之恐傷其正而生大患張志聰曰約規則也病有久新者謂病之能勝毒不能勝毒也方有大小者謂有可以厚藥可以薄藥也毒者有大寒大熱及燥濕偏勝之毒氣故止可攻疾中病即止過則傷正矣是以大毒之藥治病病去其六即止後服馬蒔曰靈樞禁服篇約方猶約囊也囊滿而弗約則輸泄方成而弗約則神與弗俱伯言病有久者則方必大病有新者則方必小故藥有大毒常毒小毒無毒之分則去病以六分七分八分九分而止當量其病之新故而制方大小以用之病重者宜大毒輕者宜小毒無毒者宜多有毒者宜少驥案神農本草名例下品一百二十種為佐使以應地多毒不可久服此屬大毒常毒治病十去其七王冰曰中品藥毒次於下也張志聰曰常毒治病病去其七即止驥案神農本草名例中品一百二十種為臣以應人有毒無毒斟酌其宜此屬常毒小毒小毒治病十去其八王冰曰上品藥毒毒之小也張志聰曰小毒治病病去其八即止之無毒治病十去其九王冰曰上品中品下品無毒藥悉謂之平張志聰曰即無毒之藥亦不可太過所謂久而增氣物化之常也氣增而久夭之由也張介賓曰治病之法藥不及病則無濟於事藥過於病則反傷其正而生他患故當知約制而進止有度也驥案神農本草名例上品一百二十種為君以養天無毒多服此屬無毒穀肉果菜食養盡之無使過之傷其正也王冰曰大毒之性烈其為傷也多少毒之性和其為傷也少常毒之性減大毒之性一等加小毒之性一等所傷可知也故至約必止之以待來證爾然無毒之藥性雖平和久而多之則氣偏勝則有偏絕久攻之則藏氣偏弱既弱且困不可長也故十去其九而止服至約已則以五穀五肉五果五菜隨五藏宜者食之已盡其余病藥食兼行亦通也新校正云按藏氣法時論毒藥攻邪五穀為養五果為助五畜為益五菜為充張志聰曰藥石治病穀肉食養使病盡去張介賓曰病以去其八九而有餘未盡者但當以穀肉果菜飲食之類培養正氣而餘邪自盡驥案食養詳五宜篇周禮食醫和六食六飲六饍百饈百醬八珍之齊食齊眂春春多酸羹齊眂夏夏多苦醬齊眂秋秋多辛飲齊眂鼕鼕多咸凡會饍食之宜牛宜稌羊宜黍豕宜稷犬宜梁雁宜麥魚宜苽新林元圭食物摘要分水穀菜果魚介禽獸八種孟銑食物本草因食醫之義著書三卷張鼎補八十九種陳士良食性本草附以食醫諸方及四時調養之法皆可參不盡行復如法王冰曰法謂前四約也余病不盡然再行之毒之大小至約而止必無過驥案長生秘典飲食之後解帶摸腹伸腰徐行作噴以通其秘用呵以通其滯能令飲食下行方可就坐飽坐發痔曲腰而坐成中滿醉後勿食冷飽余勿使臥食後勿怒怒後勿食冷熱之物不宜互食尊生編飲以養陽食以養陰食宜常少亦勿令虛不飢強食不渴強飲則脾黃髮脹朝勿令飢夜勿令飽淡食則多補五辛善助火調食法寧少毋食多寧飢毋食飽寧遲毋食速寧熱毋食冷寧零毋食頓寧軟毋食硬修養不如節勞服藥不如忌口靈樞食飲者熱無灼灼寒無滄滄寒溫適中故氣將持乃不致邪辟此可為食養法故並述之必先歲氣無伐天和王冰曰歲有六氣分主有南面北面之政先知此六氣所在人脈至尺寸應之太陰所在其脈沉少陰所在其脈鉤厥陰所在其脈弦太陽所在其脈大而長陽明所在其脈短而澀少陽所在其脈大而浮如是六脈則謂天和不識不知呼為寒熱攻寒令熱脈不變而熱疾已生制熱令寒脈如故而寒病又起欲求其適安可得乎夭枉之來率由於此吳昆曰歲氣有偏勝人病因之用藥者必明夫歲氣不得更益其邪而伐其天和天和者天真沖和元氣也張志聰曰必先知歲運之盛衰衰則補之盛則瀉之補則從之瀉則逆之無伐天運之中和張介賓曰五運有紀六氣有序四時有令陰陽有節皆歲氣也人氣應之以生長收藏即天和也設不知歲氣變遷而妄呼寒熱則邪正盛衰無所辨未免於犯歲氣伐天和矣夭枉之由此其為甚驥案歲氣乃五運之歲太過不及之氣例如甲己之年丙作首丙屬火火生土土喜暖而惡寒宜溫劑以助之乙庚之歲戊為頭戊屬土土生金金喜清而惡燥宜平劑以清之丙辛之年從庚起庚屬金金生水水喜暖而寒則凝宜熱劑以溫之丁壬壬上順行流壬上順流之則為癸癸屬水水生木木性寒而怕燥宜和劑以平之戊癸之年何方發甲寅之上好追求甲屬木木生火火性本熱而惡熱宜涼劑以解之再參司天在泉之氣應天為天符承歲為歲直及三合為治諸法五運六氣推衍無遺又五運以甲己土運為尊六氣以少陰君火為尊故以甲己土運為南政南面而行其令其餘四運為北政以臣事之則面北而受令者也詳見氣運五歲六化諸篇此言必先歲氣者如此年忽多淫雨民病多濕當用二術苦寒以燥之佐以風藥風能勝濕此即必先歲氣之謂也毋伐天和即春夏養陰秋冬養陽春夏禁用麻桂秋冬禁用石膏知母苓連芍藥此即毋伐天和之謂也無盛盛無虛虛而遺人天殃王冰曰不察虛實但思攻擊而盛者轉盛虛者轉虛萬端之病從茲而甚真氣日消病勢日侵殃咎之來若天之與難可逃也悲夫吳昆曰盛盛虛虛則伐其天和馬蒔曰邪氣實者而補之是謂盛盛又謂致邪正氣虛而瀉之是謂虛虛又謂失正斯則遺人以天殃而絕其長命張介賓曰邪氣實者復助之盛其盛矣正氣奪者復攻之虛其虛矣不知虛實妄施攻補虛者愈虛真氣日消則病氣日甚遺人天殃醫之咎也驥案虛盛所包甚廣如邪盛正虛正盛邪去陽盛陰虛陰盛陽虛腸實胃虛胃實腸虛或彼盛此虛或互盛互虛或以生而盛以克而虛或以補而盛以瀉而虛或以瀉而盛以補而虛不勝枚舉要之虛實乃諸病之根本補瀉為治療之綱紀經曰邪之所湊其氣必虛凡言虛者精氣奪也凡氣實者邪氣勝也是故虛則受邪邪為實經曰邪氣盛則實精氣奪則虛倘邪重於本則以瀉為補是瀉中有補也本重於邪則以補為瀉則補中有瀉也運用合宜有何實實虛虛之足慮乎靈樞終始篇虛而瀉之是謂重虛九針十二原篇五藏氣已絕於內而用針者反實其外是謂重竭重竭重虛虛虛也八正神明論月滿而補命曰重實重實盛盛也又十二難陽絕補陰陰絕補陽是謂實實虛虛損不足而益有餘八十一難肺實肝虛用針者不補其肝而反重實其肺故曰實實虛虛義同無致邪無失正絕人長命王冰曰所謂伐天和也攻虛謂實是則致邪不識藏之虛斯為失正氣既失則為死之由矣吳昆曰盛盛為致邪虛虛為失正張志聰曰邪則祛之正則養之張介賓曰盛其盛是致邪虛其虛是失正驥案邪正不兩立致邪則失正失正則致邪運用不合則兩失之經言邪有五從後來者為虛邪從前來者為實邪從所不勝來者為賊邪從所勝來者為微邪自病為正邪邪則干正正以祛邪故不兩立也帝曰其久病者有氣從不康病去而瘠奈何王冰曰從謂順也吳昆曰氣順而猶不安康病已去而猶見瘦瘠張志聰曰此論人之形體亦由氣運之所資養者也夫神去則機息氣止則化絕神氣之不可不調養也然而神氣猶主人形體若器宇形與神俱而後可終其天年是形之不可不調養也氣從者謂神氣以調養不康而瘠謂身不康而形尚瘦也馬蒔曰此言人病而瘠者當順化奉時以待之也帝問歲氣有久病者氣乃不康及病去而瘠岐伯曰昭乎哉聖人之問也化不可代時不可違王冰曰化謂造化也代大匠斫猶傷其手況造化之氣人能以力代之乎夫生長收藏各應四時之化雖巧智者亦無能先時而致之明非人力所及由是觀之則物之生長收藏化必待其時也物之成敗理亂亦待其時也物既有之人亦宜然或言力必可致而能代造化違四時者妄也吳昆曰言化物必待天工人為不足以代也天時須順之不得違之而助長以速其化也張志聰曰化謂五運之化氣代更代也時謂六氣之主時違逆也如敷和之紀其藏肝其養筋升明之紀其藏心其養血備化之紀其藏脾其養肉審平之紀其藏肺其養皮毛靜順之紀其藏腎其養骨髓是形之皮肉筋骨皆由化運之所資養不可更代者也又如春氣養筋夏氣養血脈長夏氣養肌肉秋氣養皮毛冬氣養骨髓是形之皮肉筋骨又皆由四時氣之所養而時不可違也馬蒔曰伯言天地有自然之化不可以人力代故無代化也人物有成敗之時不可以私智違故無違時也張介賓曰化造化也凡造化之道衰王各有不同如木從春化火從夏化金從秋化水從冬化四時有不同之化以及五運六氣各有所主皆不可以人力代也故曰化不可代人之藏氣亦必隨之而有衰王欲復藏氣之虧不因時氣不可也故曰時不可違不違時者如金水根於春夏木火基於秋冬藏氣皆有化原設不預為之地則有時不易於復元或邪氣乘虛再至雖有神手無如之何愚按此節諸注皆謂天地有自然之化人力不足以代之故曰化不可代然則當聽之矣而下文曰養之和之者又將何所為乎謂非以人力而替天工者乎其說不然乎驥案經言不知年之所加氣之盛衰虛實之所以起不可以為工王冰謂蒼天布氣不越乎五行人在氣中豈不應乎天道所謂化不可代時不可違故當隨運氣陰陽之盛衰以為祛病養生之微旨此理固不可不知而實不可以偏執也繆仲醇曰五運六氣者虛用也歲有是氣至則算無是氣至則不算既無是氣焉用是藥又況內外兩因隨時感受太過之運亦有不及之時不及之運亦多有餘之患若專泥運氣能無實實虛虛損不足而益有餘乎又天氣反常冬有時而溫夏有時而寒春有時而燥秋有時而暖又春氣西行秋氣東行夏氣北行秋氣南行卑下之地春氣常在高阜之境冬氣常在西北多風東南多濕方土不齊其病各異西北氣厚安能人人皆實東南氣薄安能人人皆虛久旱則亢陽久雨則亢陰陽盛人耐秋冬不耐春夏陰盛人耐春夏不耐秋冬天氣反常人稟異趣地域高下不同代化違時又當別論岐伯言之以明天氣歲氣立法之常醫者通之以處天氣歲氣法外之變斯為完全而無流弊也夫經絡不通血氣以從復其不足與眾齊同養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也帝曰善王冰曰大要上古經法也引古之要旨以明時化之不可違不可以力代也吳昆曰大要上古書言為不可以代化工趨事不可以逆天時也易之復卦一陽生於五陰之下陽回之象也故化至而生氣漸長謂之來復張志聰曰脈絡者所以行氣血而營陰陽血者神氣也如經絡以通血氣以從復其神氣之不足而與無病者之相同是神氣已復但身不康健而形尚瘦瘠故當靜養其神和調其氣靜以待時謹守其氣無使傾移其形得時化之養漸乃彰著矣此氣運養身之大要也馬蒔曰久病而不康及病去而瘠者其經絡已通血氣以順當復其不足之藏而與足者同必養之和之而靜以待時則形自彰而不瘠矣張介賓曰疾病既去而不求其復則元氣由衰而瘠矣養者養以氣味和者和以性情靜以待時者預有修為而待時以復也如陽虛者喜春夏陰虛者喜秋冬病在肝者愈於夏病在心者愈於長夏病在脾者愈於秋病在肺者愈於冬病在腎者愈於春皆其義也謹守其氣無使傾移則固有弗失日新可期是即復原之道而生氣可漸長矣大要上古書名此引古語以明化不可代時不可失不可不養不可不和以待其來復未有不復者矣來復之義即易之復卦一陽生於五陰之下陽氣漸回則生意漸長同此理也六元正紀大論黃帝問曰婦人重身毒之何如岐伯曰有故無殞亦無殞也王冰曰故謂有大堅癥瘕痛甚不堪則治以破積愈癥之藥是謂不救必乃盡死救之蓋存其大也雖服毒不死也上無殞言母必全亦無殞言子亦不死也吳昆曰重平聲重身懷孕也毒謂厲藥也故下文所謂積聚急痛欲死之故必毒之始可生也馬蒔曰此言妊婦之用毒藥者可用而不可過也婦人懷妊謂之重身然用毒藥以治其病者正以內有其故則有病以當毒藥其子必無殞也不惟子全而母亦無殞也張介賓曰重身孕婦也毒之謂峻利藥也故如下文大積大聚之故有是故而用是藥所謂有病則病受之故孕婦可無殞而胎氣亦無殞也殞傷也驥案重身素問奇病論婦人重身九月而瘖重身妊娠也金匱妊娠篇婦人宿有癥病經斷未及三月而得漏下不止胎動則臍上為癥痼害六月動者前三月經水時胎也下血者後斷三月胚也所以血不止者以癥不去也當下其癥桂枝茯苓丸主之沈明宗謂其癥不去阻害癊胎之血不入於胎而漏下當下其癥丹皮桃仁為胎所忌服一丸而漸磨不致動胎尤怡謂其癥不去則血不守血不守則胎終不安此丸下癥之力頗輕且緩恐峻厲之藥傷胎氣也徐彬曰此丸用桂芍一陽一陰茯苓丹皮一氣一血桃仁破惡血消癥塊而不嫌傷胎者病當之也消癥方甚多惟此丸甚善帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其太半而止過者死王冰曰衰其太半不足以害生故衰太半則止其藥若過禁待盡毒氣內余無病可攻以當毒藥毒攻不已則敗損中和故過則死吳昆曰衰其太半而止則真氣雖傷未至大壞過則真氣無存故死張志聰曰此言胎孕積聚亦有陰陽寒熱之分所當遠寒而遠熱者也毒者大寒大熱之藥也娠婦始結胎之一月二月乃木氣司養三月四月主火五月六月主土七月八月主金九月十月主水至太陽而五行已周陰陽水火分而成後天之形身矣然未生之前五行之氣各有盛有虛有勝有郁宜以寒熱溫涼順逆而調之設或有病而欲不遠寒不遠熱亦無傷於胎氣所謂有故無殞然亦無過之而致殞也即如大積大聚乃屬臟腑之五行尚其可犯寒而犯熱者也若過犯之則死寒熱溫涼是謂四畏可不慎諸此節大有關於治道學者宜細心體會又七月所生小兒能育而亦多長壽者蓋七月乃肺藏司養肺屬天而主氣主血天一生水感天地之氣而生故育九月十月乃少陰太陽所主皆感陰陽水火而生若夫八月乃陽明大腸主氣感陽明之府氣而生故雖生而不育張介賓曰身雖孕而有大積大聚非用毒藥不能攻攻亦無害故可犯也然但宜衰其太半便當止藥如上篇大毒治病十去其六者是也若或過用則病未必盡而胎已受傷多致死矣驥案素問四時刺逆從論厥陰澀則病少腹積氣少陰澀則病積溲血太陰澀則病積心腹時滿陽明澀病積時善驚太陽澀則病積時善巔疾少陽澀則病積時善筋急目痛靈樞百病始生篇積之始生得寒乃生厥乃成積又汁沫與血相摶則併合凝聚不得散而積乃成當補則補當瀉則瀉五變篇邪氣留止積聚乃傷邪氣稍至蓄積留止大聚乃起金匱積聚篇病有積有聚積病終不移聚者展轉痛移為可治又脈來細而附骨者積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心中微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中各以其部處之前無積者求其藏虛則補之與此對勘其義始全素問至真要大論帝曰論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治王冰曰謂治之而病不衰退反因藥寒熱而隨生寒熱病之新者也亦有止而復發者亦有藥在而除藥去而發者亦有全不息者方士若廢此繩墨則無更新之法欲依標格則病勢不除捨之則阻彼凡情治之則藥無能驗心迷意惑無由通悟不知其道何恃而為因藥病生新舊相對欲求其愈安可奈何吳昆曰寒之而熱言寒之而熱猶故熱之而寒言熱之而寒猶故馬蒔曰此言正治而病不愈以其不求之所屬或專治王氣或偏用五味也以寒治熱而熱病仍在以熱治寒而寒病不去甚至新病復起者何也驥案寒熱本乎陰陽治寒以熱治熱以寒凡藥之熱者本於夏長萬物者也藥之寒者本於冬殺萬物者也元氣虛極大虛必挾寒宜辛熱以補之邪氣盛滿而至過極過者抑之宜苦寒以瀉之要之溫熱之藥宜補虛寒涼之藥宜瀉實倘不明虛實概以寒涼投之則陽氣傷無陽則陰無以生無陰則陽無以化是以故病不去新病復起新病者陰陽相乖補偏救弊暫用其偏久病者陰陽漸弱扶元養正宜用其平久病而以重藥投之吾恐其絕耳丹溪偏於補陰猶雲實火可瀉苓連之屬虛火可補參耆之屬可以知寒熱之用矣岐伯曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也王冰曰言益火之源以消陰翳壯水之主以制陽光故曰求其屬也夫粗工褊淺學未精深以熱攻寒以寒療熱治熱未已而冷疾已生攻寒日深而熱病更起熱起而中寒尚在寒生而外熱不除欲攻寒則懼熱不前欲療熱則思寒又止進退交戰危亟已臻豈知藏府之源有寒熱涼溫之主哉取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可觀斯之故或治熱以熱治寒以寒萬舉萬全孰知其意思方智極理盡辭窮嗚呼人之死者豈謂命不謂方士愚昧而殺之耶吳昆曰王注所謂益與壯者求其所利而已初不膠於寒熱之跡也張志聰曰此言用寒熱之不應者更有治之之法也寒之不寒真陰不足熱之不熱真陽不足是以病不解而久用寒熱偏勝之病反生故當求其屬以衰之屬類也謂五藏同類之水火寒熱也取之陰取之陽者謂當補其陰而補其陽也夫以寒治熱以熱治寒此平治之法也補陰以勝熱補陽以勝寒乃反佐之道也馬蒔曰人有五藏腎經屬水為陰今寒之而仍熱者當取之陰經所謂壯水之主以制陽光者是也心經屬火為陽今熱之而仍寒者當取之陽經所謂益火之源以消陰翳者是也此皆求之於本經之所屬也驥案陰陽者虛名也水火者實體也寒熱者天之淫氣也水火者人之真元也淫氣生疾以寒熱藥攻之真元致疾即以水火之真調之然不求其屬投之不入先天水火原屬同宮火以水為主水為火之原故取之陰者火中求水其精不竭取之陽者水中尋火其明不熄斯大寒大熱之病得其平矣錦囊之論亦精帝曰善服寒而反熱服熱而反寒其故何也岐伯曰治其王氣是以反也王冰曰物體有寒熱氣性有陰陽觸王之氣則強其用也夫肝氣溫和心氣暑熱肺氣清涼腎氣寒冽脾氣兼病之故也春以清治肝而反溫夏以冷治心而反熱秋以溫治肺而反清冬以熱治腎而反寒蓋由補益王氣太甚也補王太甚則藏之寒熱氣自多矣吳昆曰春木夏火秋金冬水當其王時而欲反之是違天也故春不能使木之不溫夏不能使火之不熱秋不能使金之不涼冬不能使水之不寒故當其王氣而治之則人不能以違天適以反之而已張志聰曰王去聲此言氣味之不可偏用者也夫四時有寒熱溫涼之氣五藏有酸苦辛鹹之味五味四氣皆當和調而用之若偏用則有偏勝之患故偏用其寒則冬令之寒氣王是以服熱而反寒如偏用其熱則夏令之熱氣王是以服寒而反熱此用氣之偏而不和者也如偏用其苦則苦走心而火氣盛如偏用其咸則咸走腎而水氣盛此用味之偏而不調者也凡物之五味以化生五氣味久則增氣氣增則陰陽有偏勝偏絕之患矣馬蒔曰治其所屬而病不愈者心主於夏而復補其王氣則熱太過而水不生故雖用寒藥而熱不去也腎主於冬而復補其王氣則寒太過而火不生故雖用熱藥而寒不去也驥案反反治也本篇逆者正治從者反治從少從多觀其事也李時珍春用藥加辛溫薄荷荊芥之屬夏用藥加辛熱香薷生薑之屬長夏用藥加甘苦辛溫人參二術黃柏之屬秋用藥加酸溫芍藥烏梅之屬冬用藥加苦寒黃芩知母之屬是謂從從者反治也反治亦聖法惟不察微甚不辨多少治其王氣與從者反治不同帝曰不治王而然者何也岐伯曰悉乎哉問也不治五味屬也夫五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也驥案藥有君臣佐使逆從反正厚薄輕重畏惡相反君為主臣為輔佐為助使為用制方之原也逆則攻從則順反則異正則宜治病之法也氣厚為陽中之陽薄為陽中之陰味厚為陰中之陰薄為陰中之陽薄則疏通厚則滋泄畏者畏其制我惡者惡其異我畏惡之中亦可相成是在因病制方輕重多寡之間毋增氣以致夭斯為上工靈樞脈度篇經脈為里支而橫者為絡絡之別者為孫盛而血者疾誅之盛者瀉之虛者飲藥以補之張志聰曰此言脈度十六丈二尺止以經脈為數支而橫者絡脈孫絡也夫經脈內榮於臟腑外絡於形身浮而見於皮部者皆絡脈也盛而血者邪盛於外血留於絡脈故當疾誅之盛者邪客於外故當瀉之虛者本虛於內故當飲藥以補之蓋言血氣本於臟腑之所生也馬蒔曰此言經絡孫絡之義及有用針用藥之法也經脈為里者如手太陰肺經自中府至少商乃直行之經在於裡裡者即上文所謂經隧也其支而橫者即肺經有列缺穴橫行手陽明大腸經者為絡也其絡之別者為孫猶有子而又生孫較之正絡為尤盛也但曰絡曰孫而血脈盛者急誅之急誅云者正以邪氣盛者當瀉之也若正氣虛者則止飲藥以補之耳驥案虛者飲補藥亦須參合脈證蓋脈有真假藥有逆從先天陽虛補命門後天陽虛溫胃氣先天陰虛補腎水後天陰虛補心肝心為血之主肝為血之藏也六脈洪大有力是真陰不足六味地黃湯右寸洪大則加麥味如真陽不足假陽乘之則加桂味如弦數細數之類是如真陰真陽俱損當重用六味少加桂附以火濟火之類是類既可從承乃可制火既制而陰易長矣況脈不微而洪大不緩而弦數近乎無胃氣既補真陽以息假陽復借真火以保脾土此補腎中真陰真陽之至論也至於六脈浮大無力此中氣不足榮血有虧養榮湯去陳皮六脈沉細無力又宜大補中州辛溫鼓舞以行藥力歸脾湯之用木香十全湯之用肉桂是也古用薑棗亦是運行脾胃也六脈遲緩而甚微者急宜救陽輕則人參理中重則附子理中不得雜一陰分之藥六脈細數久按無力此先後天之陰陽並虧也早服六味丸晚服養榮去陳皮或十全去川芎生地換熟地可也如兩寸洪大兩尺無力者八味加牛膝五味兩尺無力兩寸甚弱者補中湯至於加減宜忌妙有權衡如應十全湯而肺脈洪大則芎耆應去而麥味宜加六脈無力則耆朮倍加止用當歸勿參地芍至於地黃一湯熟地重可加至二三兩山茱止可加至三四錢酸能掩諸藥之長也此補法之大略臨證時細酌之可耳靈樞論痛篇黃帝曰人之勝毒何以知之少俞曰胃厚色黑大骨及肥者皆勝毒故其瘦而薄胃者皆不勝毒也張志聰曰此復論少陰與陽明之相合也陽明居中土主受納水穀藉少陰之氣上升戊癸相合化火火土之氣合而後能蒸泌水穀之精微是以胃厚色黑大骨及肥者少陰陽明之氣並盛故皆能勝毒倪氏曰中下二焦互相資生然後筋骨強堅肌肉豐厚此注與素問厥論合看張介賓曰胃厚者藏堅色黑者表固骨大者體強肉肥者血盛故能勝峻毒之物若肉瘦而胃薄者氣血本屬不足安能勝毒也驥案勝毒不勝毒義已見前
