body:
  text: 卷一陰陽色氣味素問陰陽應象論清陽為天濁陰為地地氣上為雲天氣下為雨雨出地氣云出天氣王冰曰陰凝上結則合以成雲陽散下流則注而為雨雨從云以施化故言雨出地氣云憑氣以交合故言云出天氣天地之理且然人身清濁亦如是吳昆曰出通也雨出而通地氣云出而通天氣以人喻之飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺上焦開發若霧露焉是地氣上為云也肺行降下之令通調水道下輸膀胱水精四布是天氣下為雨也膀胱者州都之官精液藏焉氣化則能出是雨出地氣也上焦如霧其氤氳者心肺和而呵出之是云出天氣也此六句者見陰陽清濁不可失位而倒置順之則天地位而萬物育逆之則下飧泄而上䐜脹矣張志聰曰地雖在下而地氣上升為雲天雖在上而天氣下降為雨天有云而後有雨是雨雖天降而實本地氣所升之云故雨出地氣由雨之降而後有云之升是云雖地升而實本天氣所降之雨故云出天氣此陰陽交互之道也而人亦應之此篇言天地之陰陽與人之陰陽相合是以一節言天地陰陽水火一節言清濁藏腑精形以天人相間而言也馬蒔曰地雖在下而陰中之陽者升故其上也為云正蒙陰為陽得則飄揚為云而昇天雖在上而陽中之陰者降故其下也為雨正蒙陽為陰素則相持為雨而降驥案說文雲山川氣也雨從云下也玉篇雨雲雨也元命苞陰陽和為雨大戴記天地之氣和則雨和則天地氣交陰陽相感此上下二字有升降之義六微旨大論升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天天地之升降者謂之陰陽陰陽之上下者謂之雲雨天地之氣如此人身之升降上下亦如之故清陽出上竅濁陰出下竅王冰曰氣本乎天者親上氣本乎地者親下各從其類也上竅謂耳目口鼻下竅謂前陰後陰馬蒔曰陰陽升降唯一氣以為合一之妙即人身觀之凡人身之物有屬清陽者如涕唾氣液之類則出於上竅耳目口鼻之為七竅者皆清陽之所出也有屬濁陰者如汙穢便濁之類則出於下竅前陰後陰之為二竅者皆濁陰之所出也驥案周禮疾醫兩之以九竅之變注謂陽竅七陰竅二疏謂陽竅七者在頭上露見故為陽陰竅二者在下不見故為陰陽清陰濁如上文但上文專就人身言此兼藥物言清陽發腠理濁陰走五藏王冰曰腠理謂滲泄之門故清陽可以散發五藏為包藏之所故濁陰可以走之張志聰曰腠者三焦通會元真之處理者皮膚藏府之文理言清陽之氣通會於腠理而陰濁之精血走於五藏五藏主藏精者也馬蒔曰凡人身所用之物有屬清陽者如飲食藥物之性有屬陽之類據曰發曰走曰實曰歸知其為在外之物惟陽者主升故發於腠理以腠理主表為陽也指物類陽氣言若物之有形質者則入於六腑矣有屬濁陰者如飲食藥物有屬陰之類惟陰者主降故走於五藏以五臟主裡為陰也指物類陰氣言若物之形質不入於五臟張介賓曰腠理肌表也陽發散於皮膚故清陽歸之陰受藏於五藏故濁陰走之驥案素問生氣通天論腠理以密注謂膚表之毛孔也素靈言五藏心肝脾肺腎疾醫言九藏正藏外有胃膀胱大小腸於六腑中取四腑以益五藏為九藏四腑皆有受盛故謂之腑亦有藏稱故入九藏之數此言陽發外陰走內不拘為五為九馬注得之清陽實四肢濁陰歸六腑王冰曰四肢外動故清陽實之六腑內化故濁陰歸之張志聰曰脾主四肢又曰手太陰獨受其濁蓋濁中之清者由脾轉輸而充實於四肢濁中之濁者歸於六腑馬蒔曰凡清陽之物實於四肢以四肢為諸陽之本也指物之氣凡濁陰之物歸於六腑以六腑受化物而不藏也指物有形質者言人身之有陰陽其清濁升降之妙何以異於天地哉驥案支肢胑通易美在其中而暢於四肢疏謂四肢猶言手足靈樞邪客篇天有四時人有四肢謂兩手兩足位於身軀之四隅為全身之肢持護衛故名六腑疾醫九藏心肝脾肺腎為正藏取胃膀胱大腸小腸以益五藏為九藏引八十一難謂三焦為孤府非正府腑四腑六不必拘泥不過言清陽所實者肢濁陰所歸者腑而已又東垣用藥法象清陽發腠理清之清實四肢清之濁濁陰歸六腑濁之濁走五藏濁之清清之清者清肺以助其天真清之濁者榮華腠理濁之濁者堅強骨髓濁之清者榮養於神亦有理水為陰火為陽王冰曰水寒而靜故為陰火熱而躁故為陽馬蒔曰陰陽者萬物之父母水火者實陰陽之徵兆舉水火而足以盡陰陽矣故水為陰而凡物之成於水者屬陰火為陽而凡物之成於火者屬陽張介賓曰天以日月為水火易以坎離為水火醫以心腎為水火丹以精氣為水火腎者水也水中生氣即真火也心者火也火中生液即真水也火水互藏乃至道之所在醫家首宜省察驥案水曰潤下潤下者潤而又下也火曰炎上炎上者炎而又上也下為陰上為陽就五行而言若以藥物言水為陰則益火之源以消陰翳火為陽則壯水之主以制陽光張景岳薛立齋趙養葵六味八味左歸右歸其大凡也陽為氣陰為味王冰曰氣惟散布故陽為之味曰從形故陰為之吳昆曰臊焦香腥腐為氣為陽酸苦甘辛鹹為味為陰張志聰曰水性潤下故為陰火性炎上故為陽清陽上升故為氣濁陰下降故為味蓋以水火而徵兆氣味之陰陽也張介賓曰氣無形而升故為陽味有質而降故為陰此以藥食氣味言也驥案氣味皆有各陰陽經所謂天有陰陽三陰三陽上奉之溫涼寒熱是也溫熱天之陽涼寒天之陰是氣不獨陽亦有陰也地有陰陽金木水火土生長化收藏下應之辛甘淡酸苦鹹五味是也辛甘淡地之陽酸苦鹹地之陰是味不獨陰亦有陽也味歸形形歸氣氣歸精精歸化王冰曰形食味故味歸形氣養形故形歸氣精食氣故氣歸精化生精故精歸化故下文曰吳昆曰五味入於陰血陰血依於陽氣形歸氣也真陽之氣依於元精氣歸精也元精依於元神精歸化也馬蒔曰凡物之味所以養吾人之形故味歸於形正以體屬陰而味亦為陰也然吾人之形必歸於吾人之氣豈非形必資氣而後生乎凡物之氣所以養吾人之精故氣歸於精正以精屬陽而氣亦屬陽也然吾人之精必歸於吾精之化豈非精必資化而後有乎所謂氣歸精者以精能食萬物之氣精賴氣而生猶云食此氣耳所謂味歸形者以形能食萬物之味也形賴味而滋猶云食此味耳所謂精歸化者以化生此精也化為精之母故精歸於化所謂形歸氣者以氣生此形也氣為形之父故形歸氣張介賓曰歸依投也五味生精血以成形故味歸於形形之存亡由氣之聚散故形歸於氣氣者真氣也所受於天與穀氣並而充身者也人身精血由氣而化故氣歸於精精者坎水也天一生水為五行之最先故物之形初生其形皆水由精以化氣由氣以化神是水為萬化之原故精歸於化驥案張注歸依也地食人以五味味依形形依氣天食人以五氣氣依精精依化精食氣形食味王冰曰氣化則精生味和則形長故云食之也張志聰曰水穀之精氣以生此精精食氣也五味入胃以養此形形食味也馬蒔曰精食氣者明上文氣歸精也形食味者明上文味歸形也張介賓曰食如子食母氣之義氣歸精故精食氣味歸形故形食味化生精氣生形王冰曰精微之液惟血化而成形質之有資氣行營立故斯二者各各生乎吳昆曰精不自生生於運化之神形不自生生於無形之氣馬蒔曰化生精者明上文精歸化也氣生形者明上文形歸氣也末四句明上文中四句也陽為氣氣歸精精食氣三氣字指萬物之氣也形歸氣氣生形二氣字指人身自有之氣也張介賓曰萬物化生必從精始故化生精前言精歸化者言未化之前由精為化也此言化生精者言既化之後由化生精也氣聚則形生氣散則形死也味傷形氣傷精王冰曰過其節也吳昆曰味過於酸肝氣以津脾氣乃絕之類味傷形也氣有餘便是火火炎則水乾氣傷精也馬蒔曰味或太過適所以傷此形如生氣通天論陰之所生本在五味陰之五宮傷在五味如肝在味為酸而酸又傷筋者是也氣或太過適所以傷此精指萬物之氣言上文言味能傷形則萬物有味必有氣其氣豈不傷精精化為氣氣傷於味王冰曰精承化養則食氣精若化生則不食氣精血內結郁為穢腐攻胃則五味倨然不得入也女子重身精化百日皆傷於味也馬蒔曰化生精者不自化也其始由氣以化之然歸精於化則既而精必化為氣蓋不但氣之能生形而形歸於氣也正以精氣神三者相須以有成耳然則凡物之味既能傷人之形獨不能傷人之氣乎左傳晉屠蒯曰味以行氣故曰精化為氣氣傷於味又嘗由此推彼人之氣能生形而形又歸於人之氣則凡物之氣能傷人之精獨不能傷人之氣乎張介賓曰精化為氣謂元氣由精而化也珠玉集水是三才之祖精為元氣之根其義即此然上文既雲氣歸精是氣生精也而此又曰精化氣是精生氣也二者似乎相反而不知此正精氣互根之妙以應上文天地雲雨之義也夫陽化氣即云之類陰成形即雨之類雨乃不生於地而降於天之雲氣歸於精也云乃不出於天而升於地之氣精化為氣也人身精氣全是如此故氣聚則精盈精盈則氣盛精氣充而形自強矣帝所以先舉雲雨為言者正欲示人精氣升降之如此耳驥案陰陽五行生剋勝復之理相生相剋有勝有復不獨氣運為然此段藥物氣味陰陽亦復如是陰味出下竅陽氣出上竅王冰曰味有質故下流於便瀉之竅氣無形故上出於呼吸之門馬蒔曰此言凡物之氣味有厚薄而人身之所由以盛衰也凡物之有味者屬陰而人身之下竅亦屬陰故味出於下竅凡物之有氣者屬陽而人身之上竅亦屬陽故氣出於上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰王冰曰陽為氣氣厚者為純陽陰為味味厚者為純陰故味薄者為陰中之陽氣薄者為陽中之陰馬蒔曰味之厚為純陰用之則泄瀉其物於下如大黃味之薄者為陰中之陽用之則流通不至於泄瀉如木通澤瀉氣之厚者為純陽用之則發熱不止於發汗如附子氣之薄者為陽中之陰用之則發其汗於上如麻黃氣味太厚者火之壯如烏附氣味之溫者火之少如參歸驥案馬注引東垣味薄如木通澤瀉與東垣原文稍異不如舊說茲將原圖附後味厚則泄薄則通氣薄則發泄厚則發熱王冰曰陰氣潤下故味厚則泄利陽氣炎上故氣厚則發熱味薄為陰少故通泄氣薄為陽少故汗出發泄謂汗出也張志聰曰味厚為陰中之陰降也故主泄瀉味薄為陰中之陽升也故主宣通氣薄為陽中之陰降也故主發泄氣厚為陽中之陽升也故主發熱此節論氣味之陰陽升降馬蒔曰唯味之厚者為純陰所以用之則泄瀉其物於下如大黃氣大寒味極厚為陰中之陰主於泄瀉李東垣曰酸苦鹹寒是也味之薄者陰中之陽所以用之則流通不至於泄瀉也如木通澤瀉為陰中之陽主於流通李東垣曰酸苦鹹平是也氣之薄者為陽中之陰所以用之則發其汗於上如麻黃氣之薄者陽也升也故能發表出汗李東垣曰辛甘淡平涼寒是也氣之厚者為純陽所以用之則發熱不止於發汗也如用附子則大熱之類李東垣曰辛甘溫熱是也驥案五味所用苦味泄甘味緩酸味收鹹味軟淡味滲泄辛味散五氣風氣升生熱氣浮長濕氣化成燥氣降收寒氣沉藏肝膽之味辛補酸瀉氣溫補涼瀉心小腸之味鹹補甘瀉氣熱補寒瀉脾胃之味甘補苦瀉氣溫涼寒熱補瀉各從其宜肺大腸之味酸補辛瀉氣涼補溫瀉腎膀胱之味苦補寒瀉氣寒補熱瀉其氣味厚薄陰陽如馬氏引東垣之例已發其大凡余詳前圖壯火之氣衰少火之氣壯王冰曰火之壯者壯已必衰火之少者少已則壯馬蒔曰氣味太厚者火之壯也用壯火之品則吾人之氣不能當之而反衰矣如用烏附之類而吾人之氣不能勝之故發熱氣味之溫者火之少也用少火之品則吾人之氣漸爾生旺而益壯也如用參歸之類而氣血漸旺者是也驥案君火即壯火相火即少火火主少陽之經故曰少火位顯明之右故曰壯六元紀大論君火以明相火以位王注謂君火在相火之右但立名於君位不立歲氣故曰君火以名相火守位奉命故云相火以位又六微旨大論顯明之右君火之位也君火之右退後一步相火主之是謂少陰君火退位少陽相火行權也今壯火氣衰即君火退位少火氣壯即相火行權之謂惟以氣運言則曰君曰相以氣味言則曰壯曰少微有不同耳壯火食氣氣食少火壯火散氣少火生氣王冰曰氣生壯火故云壯火食氣少火滋氣故云氣食少火以壯火食氣故氣得壯火則耗散以少火益氣故氣得少火則生長人之陽氣壯少亦然張志聰曰夫氣為陽火為陽合而言之氣即火也少陽三焦之氣生於命門遊行於外內合於包絡而為相火然即少陽初生之氣也歸於下焦而主納歸於中焦而主化納化水穀之精微而生此氣以養此形故承上文而言五味太過則有傷於氣而壯火太過亦有傷於氣蓋氣生於精而精之所生由氣之所化形食其味而味之入胃亦出氣化以養此形是氣之不可有傷者也故曰壯火之氣衰少火之氣壯蓋陽亢則火壯而生氣反衰陽和則火平而氣壯盛矣如火壯於內則食氣氣盛於內則食火食猶入也言火壯則氣並於火氣盛則火歸於氣氣火之合一也如火壯於外則散氣火平於外則生氣故曰相火為元氣之賊欲養此精氣形者又當平息其火焉王子芳曰壯火之氣少火之氣是氣即火之氣也馬蒔曰壯火之氣衰正以壯火能食吾人之氣故壯火之氣自衰耳少火之氣壯正以吾人之氣能食少火故少火之氣漸壯耳惟壯火為能食人之氣此壯火所以能散吾人之氣也食則必散散則必衰故曰壯火之氣衰惟吾人之氣為能食少火之氣此少火所以能生吾人之氣也食則必生生則必壯故曰少火之氣壯按此節分明論萬物有陰陽氣味而吾人用之有為泄為通為發泄為發熱及衰壯生散之義王注不明與前後陰陽氣味俱無著非本篇之大旨也驥案少陰君火勝陽明肺金肺金主氣故云食氣散氣少陽相火生太陰脾土脾土生金故曰氣食少火少火生氣此言火氣以概其凡餘氣統此下文辛甘酸苦專言味馬注可參氣味辛甘發散為陽酸苦湧泄為陰王冰曰非惟氣味分正陰陽然辛甘酸苦之中復有陰陽之殊氣爾何者辛散甘緩故發散為陽酸收苦泄故湧泄為陰馬蒔曰凡物之氣大體為陽凡物之味大體為陰然而氣主發散者固為陽其味之辛甘者亦為陽味主酸苦者固為陰其氣之湧泄者亦為陰正以氣之陽中有陰味之陰中有陽也驥案至真要大論辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅以所利而行之調其氣使其平也可以互參此但舉其略爾陰勝則陽病陽勝則陰病王冰曰勝則不病不勝則病吳昆曰水勝則火滅火勝則水乾馬蒔曰用酸苦湧泄之品至於太過則勝矣陰承上文物類而言陰勝則吾人之陽分不能敵陰品而陽分斯病也陽主人身陽分言凡人身之屬陽分與手足六陽經皆是用辛甘發散之品至於太過則陰勝矣陽承上文物類而言陽勝則吾人之陰分不能敵陽品而陰分斯病也陰主人身陰分言凡人身之屬陰分與手足六陰經皆是張介賓曰此下言陰陽偏勝之為病陰陽不和則有勝有虧故皆能為病陽勝則熱陰勝則寒王冰曰是則太過而致也新校正云按甲乙經作陰病則熱陽病則寒文異意同馬蒔曰陽勝則陰病者以陽勝則太熱彼陰分安得不病陰勝則陽病者以陰勝則太寒彼陽分安得不病重寒則熱重熱則寒王冰曰物極則反亦猶壯火之氣衰少火之氣壯也吳昆曰陰極則陽生陽極則陰生張志聰曰苦化火酸化木久服酸苦之味則反有木火之熱化矣辛化金甘化土久服辛甘之味則反有陰濕之寒化矣所謂久而增氣物化之常也氣增而久夭之由也馬蒔曰陰勝雖寒而寒之又寒是重寒也寒久則熱生如今冬感於寒是重寒也而至春為溫至夏為熱非重寒則熱乎陽勝雖熱而熱之又熱是重熱也熱久則寒生如今病熱極者而反生寒慄之類凡上文寒熱俱主人身病體言此二句與重陰必陽重陽必陰二句相似張介賓曰陰陽之氣水極則似火火極則似水陽勝則隔陰陰勝則隔陽故有真寒假熱真熱假寒之辨此而錯認則死生反掌驥案此即至真要大論因利而行調平其氣之意凡陽勝陰勝重寒重熱皆不可也寒傷形熱傷氣王冰曰寒則衛氣不利故傷形熱則榮氣內消故傷氣雖陰成形陽化氣一過其節則形氣被傷吳昆曰寒陰也故傷形熱陽也故傷氣張介賓曰寒為陰形亦屬陰寒則形消故傷形熱為陽氣亦屬陽熱則氣散故傷氣氣傷痛形傷腫王冰曰氣傷則熱結於肉分故痛形傷則寒薄於皮腠故腫吳昆曰氣無形病故痛血有形病故腫張志聰曰陽化氣陰成形寒則陰甚故傷形熱則陽盛故傷氣氣無形故痛陰有形故腫馬蒔曰惟熱之傷氣也則氣之傷者其痛生所謂諸痛皆屬於火者是也惟寒之傷形也則形之傷者其腫生所謂寒則堅凝而腫斯作也張介賓曰氣欲利故傷之則痛形有質故傷之則腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也王冰曰先氣證而病形故曰氣傷形先形證而病氣故曰形傷氣吳昆曰先痛後腫為氣病而傷及於血先腫後痛為血病而傷及於氣張志聰曰形歸氣而氣生形陰陽形氣之相合也故氣傷則轉及於形形傷則病及於氣馬蒔曰為腫為痛復有相因之機先有是痛而後發腫者蓋以氣先受傷而形亦受傷謂之氣傷形也先有是腫而後為痛者蓋以形先受傷而氣亦受傷謂之形傷氣也形非氣不充氣非形不生形氣相為依附而病之相因者又如此素問六節藏象論草生五色五色之變不可勝視草生五味五味之美不可勝極王冰曰言物生之眾稟化各殊目視口味尚無能盡之況於人心乃能包括邪吳昆曰言五行陰陽之變猶五色五味之不可勝極張志聰曰草者五穀五菜概及果木而言也蓋天三生木故先言草木而及於昆蟲萬物也草生五色者其色為蒼其化為榮其色為赤其化為茂其色為黃其化為盈其色為白其化為斂其色為黑其化為肅物極而象變不可勝視也草生五味者其味為酸其味為苦其味為甘其味為辛其味為咸以草生之五味而及於五菜五穀五果五畜之美不可勝極也馬蒔曰萬物有色而草之五色有出於天成者有出於人為者極之而有不可勝視者也萬物有味而草之五味有出於天成者有出於人為者極之有不可勝美者也張介賓曰此以草言木亦在其中青黃赤白黑五色之正也然色有淺深間雜之異故五色之變不可勝視酸辛甘苦鹹五味之正也然味有厚薄優劣之殊故五味之美不可勝極即此五色五味之變已不可窮而天地萬物之化又烏得而量哉驥案五色青赤黃白黑也青入肝青蒿青黛之類赤入心丹皮丹參之類黃走脾黃精黃芩之類白入肺白蘞白芨之類黑走腎黑豆烏頭之類然草只一種而根莖枝葉果實色各不同鮮干老嫩其變不一五味靈樞九針篇酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃淡與甘近故只言五然有一物一味者有一物三味者有一物而生熟異味根苗異味者非博物專家莫能細別故不可勝視而勝極也此言草而木實可知言色味而性氣可知矣嗜欲不同各有所通王冰曰言色味之眾雖不可遍盡所由然人所嗜所欲則自隨己心之所愛耳故曰嗜欲不同各有所通張志聰曰言人嗜欲不同而五味各歸所喜如苦先入心酸先入肝五氣入鼻藏於心肺五味入口以養五氣故各有所通張介賓曰物生不齊各有嗜欲聲色臭味各有相宜故各有所通也驥案通即五藏生成篇之五欲藏氣法時篇之五急五宜也岐伯曰五味入胃各有所喜各有所禁各有所走各有所傷故曰不同天食人以五氣地食人以五味王冰曰天以五氣食人者臊氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎也地以五味食人者酸味入肝苦味入心甘味入脾辛味入肺鹹味入腎也清陽化氣而上為天濁陰成味而下為地故天食人以氣地食人以味也陰陽應象大論清陽為天濁陰為地故曰陽為氣陰為味吳昆曰五氣非徒臊焦香腥腐而已此乃地氣非天氣也蓋謂風氣入肝暑氣入心濕氣入脾燥氣入肺寒氣入腎當其不亢不害不能害人人在氣交之中以鼻受之而養五藏是天食人以五氣酸苦甘辛鹹地之五味也五藏賴以養是地食人以五味驥案劉完素謂寒熱溫涼四氣生於天酸苦辛鹹甘淡六味成乎地是以有形為味無形為氣王冰謂入肝為溫入心為熱入肺為清入腎為寒入脾為至陰而四氣兼之故此曰五氣李杲謂味象地辛甘淡者地之陽酸苦鹹者地之陰淡統於甘故曰五味東方生木木生酸酸生肝南方生熱熱生火火生苦苦生心中央生濕濕生土土生甘甘生脾西方生燥燥生金金生辛辛生肺北方生寒寒生水水生鹹鹹生腎是為地之五味氣味雖有五然一味之中有四氣如辛味則石膏寒桂附熱半夏溫薄荷涼使氣使味或氣味俱使或先氣後味先味後氣不可不察也又六微旨論少陽之上火氣治之陽明之上燥氣治之太陽之上寒氣治之厥陰之上風氣治之少陰之上熱氣治之太陰之上濕氣治之熱火同物二火實為一火燥為涼風為溫其實一也茲將東垣藥類法象表列後方與前圖互參引而伸之觸類而長之可以知用藥之大凡矣風升生味之薄者陰中之陽味薄則通酸苦鹹平是也防風純陽性溫味甘辛升麻氣平味微苦柴胡氣平味苦辛羌活氣微溫味苦甘平威靈仙氣溫味苦葛根氣平味甘獨活氣微溫味苦甘平細辛氣溫味大辛桔梗氣微溫味甘辛白芷氣溫味大辛藁本氣溫味大辛鼠黏子氣平味辛蔓荊子氣清味辛川芎氣溫味辛天麻氣平味辛秦艽氣微溫味苦辛平麻黃氣溫味甘苦荊芥氣溫味苦辛前胡氣微寒味苦薄荷氣溫味苦辛熱浮長氣之厚者陽中之陽氣厚則發熱辛甘溫熱是也黑附子氣熱味大辛烏頭氣熱味大辛乾薑氣熱味大辛生乾薑氣溫味辛良薑氣熱味辛本味甘辛肉桂氣熱味大辛桂枝氣熱味甘辛草豆蔻氣熱味大辛丁香氣溫味辛厚朴氣溫味辛木香氣熱味苦辛益智氣熱味大辛白豆蔻氣熱味大辛川椒氣熱溫味大辛吳茱萸氣熱味苦辛茴香氣平味辛延胡索氣溫味辛縮砂氣溫味辛紅藍花氣溫味甘神麯氣大酸味甘濕化成戊土其本氣平其兼氣溫涼寒熱在人以胃應之己土其本味甘其兼味辛酸鹹苦在人以脾應之黃耆氣溫平味甘人參氣溫味甘甘草氣平味甘當歸氣溫味辛一作味甘熟地黃氣寒味苦半夏氣微寒味辛平白朮氣溫味甘蒼朮氣溫味甘陳皮氣溫味微苦青皮氣溫味辛藿香氣微溫味甘辛檳榔氣溫味苦莪朮氣平味苦辛京三稜氣平味苦阿膠氣微溫味甘辛訶子氣溫味苦杏仁氣溫味甘苦大麥蘗氣溫味鹹桃仁氣溫味甘苦紫草氣寒味苦蘇木氣平味甘鹹一作味酸燥降收氣之薄者陽中之陰氣薄則發泄辛甘淡平寒涼是也滑石氣寒味甘瞿麥氣平味甘車前子氣寒味甘燈心草氣平味甘五味子氣溫味酸桑白皮氣寒味苦酸天門冬氣寒味微苦白芍藥氣微寒味酸麥門冬氣寒味微苦犀角氣寒味苦酸烏梅氣平味酸牡丹皮氣寒味苦地骨皮氣寒味苦枳殼氣寒味苦琥珀氣平味甘連翹氣平味苦枳實氣寒味苦酸木通氣平味甘寒沉藏味之厚者陰中之陰味厚則泄酸苦鹹氣寒是也大黃氣寒味苦黃柏氣寒味苦黃芩氣寒味苦黃連氣寒味苦石膏氣寒味辛草龍膽氣寒味大苦生地黃氣寒味苦知母氣寒味大辛防己氣寒味大苦茵陳氣微寒味苦平朴硝氣寒味苦辛栝蔞根氣寒味苦牡蠣氣微寒味鹹平玄參氣寒味微苦山梔子氣寒味微苦川楝子氣鹹味苦平香豉氣寒味苦地榆氣微寒味甘鹹五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生王冰曰心榮面色肺主音聲故氣藏於心肺上使五色修潔分明音聲彰著氣為水母故味藏於腸胃內養五氣五氣和化津液方生津液與氣相副化成神氣乃能生而宣化也吳昆曰五者之氣由鼻而入藏於心肺之間心肺得受天之五氣豈徒藏之入通五藏生五色而發五音若人失養於天之五氣則必失色而喪音矣味有所藏謂五味各有所藏酸入肝苦入心甘入脾辛入肺鹹入腎也五藏得此五味則以之養乎五氣而氣從矣陽為氣陰為味氣得味陽得陰氣得乎味味以養氣為陰陽和而生生者也生生則化津液五液交相成則陰中有陽陽中有陰二氣五行妙和而凝神乃自生矣張志聰曰天位居高而包乎地之外故五氣從外竅而入於心肺心肺居上為陽也心榮色而華於面故使五色修明肺主聲故音聲能彰也地位居下而處乎天之內故五味藏於腸胃以養五藏之氣氣得味養則陰陽和而相生矣水穀皆入於口其味有五津液各走其道氣和津成而五藏之神乃自生矣濟公曰神氣為陽故曰生津液為陰故曰成馬蒔曰靈樞憂恚無言論喉嚨者氣之所以上下者也此乃入於鼻上下於喉嚨而通於五藏者歟又云咽喉者水穀之道路也此乃入於口由於咽喉而通於六腑者歟張介賓曰心主血故華於面肺主氣故發於聲五味入口由咽喉而藏於腸胃胃藏五味以養五藏之氣而化生津液以成精精氣充而神自生驥案三十七難肺氣通於鼻鼻和則知香臭故音聲張脾氣通於口口和則知穀味故味有所藏靈樞憂患無言篇咽喉者水穀之道路也喉嚨者氣之所以上下也會厭者音聲之門戶也口唇者聲音之扇也懸雍垂者音聲之關也頏顙者分氣之所泄也咽喉乃胃之上口喉嚨在咽之前主氣之呼吸氣不利則聲音不利病在喉咽喉在喉嚨之後主進水穀病在咽則水穀不能下故治咽喉以胃為主又五藏別論五味入口藏於胃以養五藏氣五氣入鼻藏於心肺心肺有病而鼻為之不利厥論篇胃不和則精氣竭能知喉嚨咽喉之道路此理不煩言而解西醫謂喉嚨為氣總管咽喉為食管與此同
