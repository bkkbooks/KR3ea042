已不飢吐利腥穢亦寒疾也馬蒔曰犯寒則寒至凡為堅否為腹滿為痛急為下利之病生矣張介賓曰寒至則陽衰不能運化郁注下眼瘛腫腳嘔鼽衄頭痛骨節變內痛血溢血泄淋閟之病生矣王冰曰暴喑冒昧目不識人躁擾狂越妄見妄聞罵詈驚癇亦熱之病馬蒔曰犯熱則熱至凡為身熱為吐下為霍亂為癰疽為瘡瘍為瞀郁為注下為瞤瘛為腫脹為嘔為鼽衄為頭痛為骨節變為內痛為血溢為血泄為淋閟之病生矣張介賓曰熱至則火灼諸經帝曰治之奈何岐伯曰時必順之犯者治以勝也王冰曰春宜涼夏宜寒秋宜溫冬宜熱此時之宜不可不順然犯熱治以寒犯寒治以熱犯春宜用涼犯秋宜用溫是以勝也犯熱治以咸涼犯寒治以甘熱犯涼治以苦溫犯溫治以辛涼亦勝之道也吳昆曰時必順之順其升降浮沉也犯者治以勝逆其寒熱溫涼也故春宜升秋宜降夏宜浮冬宜沉順四時之謂也溫宜涼熱宜寒涼宜溫寒宜熱治以所勝之謂也張志聰曰此言主時之六氣亦當遠寒而遠熱者也按前章之所謂熱無犯熱寒無犯寒者論司天在泉及加臨之六氣此章論主時之六氣亦有寒熱之者太陰之氣在於長夏太陽之氣在於冬少陰之氣在於夏陽明之氣在於秋厥陰之氣在於春如冬有熱化以徵少陰之勝夏有寒化以徵太陽之勝此與春勝長夏長夏勝冬之義相同徐振公曰此即帝所問之有勝有覆在六氣為勝復在四時為勝化馬蒔曰治之者春則宜涼夏則宜寒秋則宜溫冬則宜熱時所必用不可不順其有犯而病勝者則犯熱治以鹹寒犯寒治以甘熱犯涼治以苦溫犯溫治以辛涼治之以所勝而病可解矣張介賓曰時必順之治當順時也若有所誤犯則當治之以勝驥案元和紀用經六氣為主五味為用司歲備物則無遺主藥當其歲味當其氣氣味厚薄性用躁靜治保多少力化淺深寒熱溫涼隨勝用之歲運所主舉抑之制制勝扶弱客主須安一氣失所矛盾交作臟腑淫並危敗消亡寶書所載商較服餌藥不具五味不備四氣而久服之雖且獲勝益久流變必致橫天寒熱溫涼衰之以屬隨其攸利萬舉萬全卷舒在心去留從意微者逆之甚者從之龍火得濕而焰遇水而燔伏其所主先其所因聖如南陽今古一人氣運用藥皆如上例余謂有大暑之候而得寒證大寒之候而得熱證證有性偏陰虛雖當隆冬陰粒虧立水不制火陰無所依外泄為熱或反汗出藥宜滋陰若舍證從時誤用辛溫勢必立斃又有性偏陽虛雖當盛夏陽氣不足不能衛外灑淅戰栗時思熱食且御重裘天令雖熱不能敵真陽之虛病屬虛寒藥宜溫補若從時舍證誤用苦寒亦必立斃又如春令主升升為春氣為風化為木象升有散之之義也若因飲食勞倦則陽氣下陷宜升陽益氣瀉利不止宜升陽益胃鬱火伏內宜升陽散火因濕洞泄宜升陽除濕此證四時都有夏秋尤多升之之令不獨行之於春也又如秋令主降降為秋氣為燥化為金象降有斂之之義也若系陰火旺發而炎上咳嗽多痰吐血鼻衄口苦舌乾頭疼齒痛骨蒸寒熱是謂上熱下虛之候宜枇杷葉麥冬貝母白芍牛膝五味之屬以降氣或用滋水添精之藥以救本此亦四時都有夏冬多見降之之令不專行之於秋也運氣用藥最宜活看
