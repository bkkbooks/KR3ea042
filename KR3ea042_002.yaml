body:
  text: 卷二氣運素問六元紀論甲子甲午歲其化上鹹寒中苦熱下酸熱所謂藥食宜也新校正云玄珠下苦熱又按至真要大論熱淫所勝平以鹹寒燥淫於內治以苦溫此云下酸熱疑誤也吳昆曰君火在上宜治以鹹寒太宮在中宜治以苦熱燥金在下宜治以酸熱張志聰曰上謂司天下謂在泉中謂化運君火司天故宜鹹寒以制化太陰濕土運化於中故宜苦以燥濕熱以溫陰陽明清涼在泉故宜酸以助收熱以溫涼藥食並相宜也此即上章宜苦以燥之溫之食宜同法之義餘歲俱仿此馬蒔曰上言司天宜用之藥食也蓋太過之火勝水故用鹹寒以扶水即所謂熱淫所勝平以鹹寒中言土運宜用之藥食也下言在泉宜用之藥食也即所謂燥淫於內治以苦溫此誤言酸熱張介賓曰中苦熱治太宮濕勝也下酸熱與前後四運稍異然後言溫此言熱亦不相遠驥案元珠密語天運加臨紀甲午歲熱行於上治之以鹹寒水性水味以伏火熱之勝勿食苦熱物佐火之王元和紀用經少陰君火鹹寒為治以咸調上以酸調下必先胃主必先營衛歲主藥食五味所宜六位之主主勝為逆客勝為淫客勝則瀉客補主主勝則瀉主補客客主之部各六十居無常所隨歲遷移化原一歲十二月一云三月迎而取之無使邪勝少陰之主先甘後咸先以甘瀉後以咸補此上熱下清宣補不可造次宜用赤小豆花地黃沒藥蒲黃白芍甲香決明子鹽白殭蠶粟羚羊胡連安息香大菊羌活獨活雌黃蛇蛻之類皆歲主所宜隨證命方鹹寒者倍之治上治下隨其所當者倍之相當者兩倍之運氣主客逆從所賴者三倍之倍多者為君君以定名倍少者佐君為臣不倍者應臣為使甲子甲午上少陰鹹寒中土運苦熱下陽明苦小溫元珠密語元和紀用經並王冰作下同乙丑乙未歲其化上苦熱中酸和下甘熱所謂藥食宜也新校正云按玄珠上酸平下甘溫又按至真要大論濕淫所勝平以苦熱寒淫於內治以甘熱吳昆曰其化言其化病也末句釋上中下三句張志聰曰金氣主收故宜酸以收之和者謂五運之氣雖各主一歲而一歲之中又有生長化收藏之五運故又宜五味以和之甘為土味能制化寒水馬蒔曰上言司天宜用之藥食也至真要大論濕淫所勝平以苦熱中言金運宜用之藥食也玄珠上酸平下言在泉宜用之藥食也至真要大論寒淫於內治以甘熱玄珠下甘溫張介賓曰中酸和者金位之主其補以酸治少商之不足也上下同驥案元珠密語天運加臨紀乙未歲濕行於上治之以酸平以木味木性以平土濕之勝元和紀用經太陰濕土苦熱為治苦溫兼化上下調和九月化原迎而取之其化苦熱以平淫濕補解易處宣散邪濕宜用術麻黃附子牡荊實熟艾葉獨活柴胡芍藥射干乾薑桂穰之類皆歲主所宜隨證命方苦熱者宜之上太陰苦熱中土運苦和下太陽甘熱丙寅丙申歲其化上鹹寒中鹹溫下辛溫所謂藥食宜也新校正云按玄珠下辛涼又按至真要大論火淫所勝平以鹹冷風淫於內治以辛涼張志聰曰水運主咸而以咸助之後之化運多用和助之味所謂折其鬱氣資其化原也馬蒔曰上言司天宜用之藥食中言水運宜用之藥食下言在泉宜用之藥食玄珠下辛涼張介賓曰中咸同水化溫治寒下辛溫在泉木新校正云詳丙申之歲申金生水水化之令轉盛司天相火為病當減半中鹹溫咸同水化溫以治寒也下辛溫以在泉之木兼運寒之氣也驥案元珠密語天運加臨紀丙寅歲治之以寒鹹水味水性也以伏火熱之盛勿食苦熱物佐火之勝元和紀用經少陽相火鹹寒為治以咸調上以辛調下化原三月迎而取之風熱參半其化鹹寒以平風熱治內辛涼水運辛溫宣風解熱邪不能勝宜用羚羊石膏白薇車前子澤瀉白殭蠶旋覆花牡蠣人參鐵粉之類皆歲主所宜鹹寒者倍之上少陽鹹寒中水運鹹溫下厥陰辛涼丁卯丁酉歲王冰曰丁歲會新校正云詳丁年正月壬寅為干德符便為平氣勝復不至運同正角金不勝木木亦不災土又丁卯年得卯木佐之即上陽明不能災之其化上苦小溫中辛和下鹹寒所謂藥食宜也新校正云按至真要大論燥淫所勝平以苦溫熱淫於內治以鹹寒又玄珠上苦熱也馬蒔曰上言司天宜用之藥食玄珠上苦熱中言木運宜用之藥食下言在泉宜用之藥食張介賓曰上苦小溫苦屬火以火治金也中辛和辛屬金以和少角也下鹹寒以水治火也驥案元珠密語天運加臨紀丁酉歲治之以苦熱火味火性可伏金性之疾勿服辛涼物佐金之勝也元和紀用經陽明司天苦溫為治以苦調上以咸調下化原六月迎而取之陽專其令其化苦溫命曰小溫以平專令故也寒次冷冷大寒也寒然後涼涼然後小溫小溫然後溫溫之甚曰和和甚曰小熱小熱甚則熱矣以此為法平調六氣溫解寒宣宜用牛膽紫參知母桑白皮槐實蔞仁竹葉竹瀝犀角豉梔子升麻柴胡丹參前胡五加皮茗苦茶天冬菊花獨活秦艽黃芩芍藥南星牛黃狗膽樺皮桃仁牛角腮露蜂房麻黃紫菀術莪朮芒硝葶藶殭蠶決明子鹿角栗蚯蚓旋覆花羚羊角漏蘆青黛鐵粉石斛之類皆歲主所宜隨證命方苦小溫溫者倍之治上治下隨所當者倍之戊辰戊戌歲其化上苦溫中甘和下甘溫所謂藥食宜也新校正云按至真要大論寒淫所勝平以辛熱濕淫於內治以苦熱又玄珠上甘溫下酸平馬蒔曰上言司天宜用之藥食中言火運宜用之藥食下言在泉宜用之藥食張介賓曰本年上下之治俱同前惟中運太徵與前不同故宜治以甘和也後仿此驥案元珠密語天運加臨紀戊戌歲治之以甘溫即土之性味也勿食鹹寒物佐水之勝己巳己亥歲其化上辛涼中甘和下鹹寒所謂藥食宜也新校正云按至真要大論風淫所勝平以辛涼火淫於內治以鹹冷馬蒔曰上言司天宜用之藥食中言土運宜用之藥食下言在泉宜用之藥食張介賓曰中運少宮不及故宜甘和上下同前驥案元珠密語天運加臨紀己亥歲風病行於上治之以辛涼金之性味也勿食酸物佐木之勝元和紀用經厥陰風木辛涼為治以辛調上以咸調下必先胃主必先榮衛胃主生之原榮衛氣之主氣主既輔生原無窮精神內居病無不愈精生形盛不失其機人迎氣口持道深微不知胃主不知榮衛不可以語奉生之宜不知人迎不知氣口不可以語逆順之合離化原四月迎而取之風火同德調下者宜酸寒宣解易處辛涼煥然衆或可知若病當補宜用車前子雞肶胵楮實秦椒地骨皮丹砂磁石元參乾生地黃丹參丹皮澤瀉戎鹽之類皆歲主所宜寒補者倍之咸而寒者兩倍之應運者倍之運氣主客逆從所賴者三倍之倍多主病者為君君以定名倍少者佐君為臣不倍者應臣為使宣解之道咸以為準庚午庚子歲王冰曰同天符驥案元珠密語天運加臨紀庚子歲化盛而不實其化上鹹寒中辛溫下酸溫所謂藥食宜也新校正云按玄珠下苦熱又按至真要大論燥淫於內治以苦熱馬蒔曰上言司天宜用之藥食中言金運宜用之藥食下言在泉宜用之藥食張介賓曰中辛溫辛以從金溫以治寒也上下同前驥案元和紀用經陽明苦小溫上中同辛未辛丑歲王冰曰同歲會其化上苦熱中苦和下苦熱所謂藥食宜也新校正云按玄珠上酸和下甘溫又按至真要大論濕淫所勝平以苦熱寒淫於內治以甘熱馬蒔曰上言司天宜用之藥食中言土運宜用之藥食下言在泉宜用之藥食張介賓曰中苦和下苦熱苦從火化治寒以熱也治上下同前驥案元珠密語天運加臨紀辛未歲濕行於上治之以酸和木之性味也勿食甘溫物佐土之勝元和紀用經下太陽甘熱上中同壬申壬寅歲王冰曰同天符其化上鹹寒中酸和下辛涼所謂藥食宜也馬蒔曰上言司天宜用之藥食中言木運宜用之藥食下言在泉宜用之藥食張介賓曰上鹹寒治司天之火中酸和木運太過故宜酸和下辛涼治在泉也木火合氣故宜辛涼驥案元珠密語天運加臨紀壬寅歲病熱行於上治之以鹹寒水之性味也勿食苦熱物佐火之勝元和紀用經中木運咸和上下同癸酉癸卯歲王冰曰同歲會其化上苦小溫中鹹溫下鹹寒所謂藥食宜也新校正云按玄珠上苦熱馬蒔曰上言司天宜用之藥食中言火運宜用之藥食下言在泉宜用之藥食張介賓曰中少徵火故治雖用鹹而必溫也驥案元珠密語天運加臨紀癸酉歲燥行於上治之以苦熱火之性味也勿食辛涼物佐金之勝元和紀用經上中下並同甲戌甲辰歲王冰曰歲會同天符其化上苦熱中苦溫下苦溫藥食宜也新校正云按玄珠上甘溫下酸平又按至真要大論寒淫所勝平以辛熱濕淫於內治以苦熱馬蒔曰上言司天宜用之藥食中言土運宜用之藥食下言在泉宜用之藥食張介賓曰中苦溫治濕土也驥案元珠密語天運加臨紀甲戌歲寒行於上治之以甘溫土之性味也勿食鹹寒物佐水之盛元和紀用經上苦溫中下同乙亥乙己歲其化上辛涼中酸和下鹹寒藥食宜也馬蒔曰上言司天宜用之藥食中言金運宜用之藥食下言在泉宜用之藥食張介賓曰中運少商不及故宜治以酸和上下同前以酸治金義見少陰之政壬子壬午歲謂酸能收也驥案元珠密語天運加臨紀乙亥歲風行於上治之以辛涼金之性味也勿食酸和物佐木之盛元和紀用經上中下並同丙子丙午歲王冰曰丙子歲會其化上鹹寒中咸熱下酸溫藥食宜也新校正云按玄珠下苦熱又按至真要大論燥淫於內治以酸溫張介賓曰中太羽故治宜咸熱上下同前驥案元珠密語天運加臨紀丙午歲熱行於上治之以鹹寒水之性味也可伏火熱之疾勿食苦熱物佐火之盛元和紀用經下陽明小苦溫上中同丁丑丁未歲其化上苦溫中辛溫下甘熱藥食宜也新校正云按玄珠上酸平下甘溫又按至真要大論濕淫所勝平以苦熱寒淫於內治以甘熱張介賓曰甘熱從土之化治在泉之寒水也驥案元珠密語天運加臨紀丁未歲病腫濕於上治之以酸佐之以平勿食甘溫元和紀用經上太陰苦熱中火運鹹溫下同戊寅戊申歲王冰曰戊申天符新校正詳戊申年與戊寅年小異申為金佐於肺肺受火刑其氣稍實民病得半驥案元珠密語天運加臨紀戊寅歲治之以鹹寒用水之性味滅火盛也勿食苦熱物佐火之王其化上鹹寒中甘和下辛涼藥食宜也己卯己酉歲新校正云詳己卯金與運土相得子臨父位為逆張介賓曰中甘和者太徵之火瀉以甘也上下同前驥案元珠密語天運加臨紀己酉歲燥行於上治之以苦熱火之性味也元和紀用上中下並同其化上苦小溫中甘和下鹹寒藥食宜也張介賓曰中甘和治土運不足也上下同前驥案元和紀用經上中下並同新校正云按玄珠上酸和下甘溫又按至真要大論濕淫所勝平以苦熱寒淫於內治以甘熱張介賓曰中鹹溫咸從水化所以治火少徵不及故宜從溫上下同前驥案元珠密語天運加臨紀癸未歲民病腫濕於上治之以酸和以木性木味可平土勝元和紀用經上太陰苦熱中下同甲申甲寅歲其化上鹹寒中咸和下辛涼藥食宜也張介賓曰中咸和以軟堅利濕治土勝也上下同前驥案元珠密語天運加臨紀甲寅歲熱行上脘治之以鹹寒水性水味以伏火熱之勝勿食苦熱物佐火之王元和紀用經上中下並同乙酉乙卯歲王冰曰乙酉太乙天符乙卯天符其化上苦小溫中苦和下鹹寒藥食宜也張介賓曰中苦和苦從火化所以制金金運不足故治宜苦和上下俱同前驥案元珠密語天運加臨紀乙酉歲燥行於上治之以苦熱火性火味勿食辛涼物佐金之勝也元和紀用經上中並同丙戌丙辰歲新校正曰按玄珠上甘溫下酸平又按至真要大論寒淫所勝平以辛熱濕淫所勝治以苦熱張介賓曰中鹹