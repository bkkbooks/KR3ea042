body:
  text: 卷三五歲素問五常政大論敷和之紀木德周行陽舒陰布五化宣平王冰曰自當其位不與物爭故五氣之化各布政令於四方無相干犯新校正云按王注太過不及各紀年辰此平木運注不紀年辰者平氣之歲不可以定紀也或者欲補註云謂丁巳丁亥壬寅壬申歲者是未達張志聰曰紀年也木之平也是為敷和木德周行則陽氣舒而陰氣布蓋生長化收藏之五氣先由生氣之宣布生氣和則五氣皆平矣驥案六節藏象論五運相襲而皆治之終期之曰周而復始時立氣布如環無端故曰不知其年之所加氣之盛衰虛實不可以為工此即五運統歲歲立四時時布氣立運氣之所由來也天元紀丁壬之歲木運統之木無太過與不及是謂敷和至真要大論生而勿殺是謂平氣氣交變論東方生風其德敷和三因有敷和湯詳後又案甲乙木丙丁火戊己土庚辛金壬癸水是五行之本氣甲己土乙庚金丙辛水丁壬木戊癸火是五行合化之氣諸家注不明化氣未能詳其所以素問五運行大論引天元冊文五氣經天以著五行之合化黅天之色黃其氣土心尾在甲度而經中土已分故甲己合而化土甲陽已陰在五音為太宮少宮也素天之色白其氣金亢氐在乙度而經昂庚度故乙庚合而化金乙陰甲陽在五音為少商太商也元天之色黑其氣水張翼在丙度而經婁胃辛度故丙辛合而化水丙陽辛陰在五音為太羽少羽也蒼天之色青其氣木危室在壬度而經柳鬼丁度故丁壬合而化木丁陰壬陽在五音為少角太角也丹天之色赤其氣火牛女在癸度而經中土戊分故戊癸合而化火戊陽癸陰在五音為太徵少徵也所謂戊己分者奎璧角軫天地之門戶也是謂五行化氣陰陽法同其果李王冰曰味酸也張志聰曰在果為李色青而味酸其實核王冰曰中有堅核者張志聰曰核內有仁仁分兩片木之生原也張介賓曰諸核皆屬木其質強其畜犬王冰曰如草木之生無所避也新校正云按金匱真言論其畜雞張志聰曰犬性勇往直前感春生怒發之氣張介賓曰味酸也金匱真言其畜雞無犬其味酸王冰曰木化敷和則物酸味厚張介賓曰酸為木化升明之紀正陽而治德施周普五化均衡王冰曰均等也衡平也張志聰曰火味南方故正陽而治火主陽氣故德施周普陽和之氣四布五氣皆以均平感火之化馬蒔曰升明之紀故火主南方為正陽張介賓曰火之平運火主南方故曰正陽陽氣無所不至故曰周普五化義見前均等也衡平也驥案天元紀戊癸之歲火運統之此言中運二火之平歲無太過與不及五常政大論長而勿罰氣交變論南方生火其德彰顯三因有升明湯正陽湯詳後其穀麥王冰曰色赤也新校正云按金匱真言論其谷黍又藏氣法時論穀麥也張志聰曰麥乃夏成之谷張介賓曰色赤也金匱真言論火谷曰黍木谷曰麥又藏氣法時論亦言麥苦其果杏王冰曰味苦也張志聰曰杏色赤而味苦其實絡王冰曰中有支絡者張志聰曰絡者果實之脈絡張介賓曰實中之系脈絡之類也其畜馬王冰曰健決躁速火類同新校正云按金匱真言論其畜羊張志聰曰馬屬午火之畜張介賓曰快健躁疾得火性也金匱真言論金畜曰馬火畜曰羊其味苦王冰曰升明氣化則物苦味純張志聰曰苦火之味張介賓曰苦為火化備化之紀氣協天休德流四政五化齊修王冰曰土之德靜分助四方贊成金木水火之政土之氣厚應天休和之氣以生長收藏終而復始故五化齊修張志聰曰協合也天主生地主成土氣和平合天之休美而化生萬物也土德流於四方而五化齊修矣張介賓曰土之平運是曰備化氣協天休順承天化而濟其美也德流四政土德分助四方以贊成金木水火之政也故生長收藏咸德其政而五者齊修矣驥案天元紀甲己之歲土運統之此言中運濕土之平氣無太過與不及是為備化氣交變論中央生土其德溽蒸三因有備化湯詳後其谷稷王冰曰色黃也新校正云按金匱真言論作稷藏氣法時論作粳張志聰曰稷黅谷也張介賓曰小米之粳者曰稷其果棗王冰曰味甘也張志聰曰棗色黃而味甘其實肉王冰曰中有肌肉者張志聰曰肉果實之肉張介賓曰土主肌肉其畜牛王冰曰成彼稼穡土之用也牛之應用其緩而和張志聰曰牛土之畜張介賓曰其性和緩其功稼穡得土氣也其味甘王冰曰備化氣豐則物味甘厚審平之紀收而不爭殺而無犯五化宣明王冰曰犯謂刑犯於物也收而不爭殺而無犯匪審平之德何以能如是哉張志聰曰金兵象也金氣和平故收而不爭天地之氣春生秋殺殺而無犯不殘害於物也金氣清肅故五化得之咸有宣明馬蒔曰收氣者金氣也殺氣者亦金氣也惟氣得其正故收而不爭殺而無犯凡生長化收藏之五化無不宣明驥案天元紀乙庚之歲金運統之此言中運燥金之平氣無太過與不及五常政大論收而勿害是謂審平氣交變論西方生金其德清潔三因有審平湯詳後其谷稻王冰曰色白也新校正云按金匱真言論作稻藏氣法時論作黃黍張志聰曰稻乃秋成之谷張介賓曰色白也其果桃王冰曰味辛也張志聰曰桃色白而有毛肺之果也張介賓曰味辛也其實殼王冰曰外有堅殼者張介賓曰凡食物之皮殼皆堅金剛居外也其畜雞王冰曰性善鬥傷象金用也新校正云按金匱真言論其畜馬張志聰曰雞性善鬥感肅殺之氣張介賓曰金匱真言論木畜曰雞金畜曰馬其味辛王冰曰審平化治則物辛味正張志聰曰辛乃金之味張介賓曰辛為金化靜順之紀藏而勿害治而善下五化咸整王冰曰治化也水之性下所以德全江海所以能為百谷王者以其善下之也張志聰曰水之平運是為靜順夫萬物得生長之氣而茂盛水運和平故雖主藏而不害於物也整齊也平治而善下故五氣感之而咸整也馬蒔曰藏氣者水氣也唯氣之平故藏而勿害水性下故治而善下凡生長化收藏之五化咸各整齊張介賓曰五化得水而後齊故曰咸整驥案天元紀丙辛之歲水運統之此言中運寒水之平氣無太過與不及五常政大論藏而勿抑是謂平氣氣交變論北方生水其德淒滄三因有靜順湯詳後其谷豆王冰曰色黑也新校正云按金匱真言論及藏氣法時論同張志聰曰豆乃水之谷張介賓曰菽也谷色純黑惟豆有之其果慄王冰曰味鹹也張志聰曰栗色黑味鹹腎之果也其實濡王冰曰中有津液也其畜彘王冰曰善下也彘豕也張介賓曰豕也其色多黑其味鹹王冰曰味同也張介賓曰咸為水化驥案六十年之中運以合化之五行為紀而以在天之十干分陰陽以五音之太少分有餘不足甲丙戊庚壬陽年為太過乙丁己辛癸陰年為不及如中運太過而得天地之制是為平氣不足而得天地之助則宮為正宮商為正商羽為正羽角為正角徵為正徵而曰備化審平敷和升明靜順者是亦無過與不及而為平氣也委和之紀是謂勝生王冰曰丁卯丁丑丁亥丁酉丁未丁巳之歲張志聰曰所勝之氣勝其生氣馬蒔曰此詳言歲運不及之紀生氣者木氣也化氣者土氣也長氣者火氣也收氣者金氣也木氣不及金能勝之是謂勝生張介賓曰凡丁壬皆屬木運而丁木陰柔乃為不及故於六丁之歲生氣不政收氣勝之驥案丁壬化木此中運少角木運不及之歲不及之歲則為我弱我弱則勝我者乘我之衰而來兼其化此少角木運勝木之金來兼木化即經所謂乘其弱來同其化也兼謂以彼化我也生氣不政化氣乃揚王冰曰木少故生氣不政土寬故化氣乃揚張志聰曰金氣勝則木之生氣不能章其政令木政不章則土氣無畏而化氣乃揚張介賓曰木氣衰土氣無制長氣自平收令乃早王冰曰火無忤犯故長氣自平木氣既少故收令乃早張志聰曰木衰則火氣不盛故長氣自平金氣盛故收令乃早張介賓曰火無所生故長氣自平木衰金勝故收氣乃蚤其果棗李王冰曰棗土李木實也新校正云詳李木實也按火土金水不及之果李當作桃王注亦非張志聰曰其果之棗李張介賓曰棗土果也李當作桃金果也蓋木不及則土金二果盛其實核殼王冰曰核木殼金王張志聰曰實之核殼張介賓曰核應木殼應金木衰金盛其谷稷稻王冰曰金土谷也張志聰曰谷之稷稻張介賓曰土之稷金之稻木不及則二谷當成其味酸辛王冰曰味酸之物熟兼辛也張志聰曰味之酸辛張介賓曰酸者衰辛者勝木兼金化其畜犬雞王冰曰木從金畜張志聰曰畜之犬雞張介賓曰犬木畜雞金畜有盛衰也驥案六丁年少角運歲木不及陳無擇有蓯蓉牛膝湯用蓯蓉熟地牛膝當歸白芍木瓜甘草鹿角生薑大棗㕮咀每服四錢水盞半烏梅七個空心服繆問解此方曰是年風燥火熱多陽少陰不資液以救焚則熇熇之勢遂致燎原故當藉天一之水以制其陽焰也蓯蓉咸能潤下濕不劫津坎中之陽所必需熟地苦能堅腎潤以滋燥腎中之陰尤有賴合之牛膝酸平達下復之歸芍辛酸化陰直走厥陰之藏血燥可以無憂木瓜酸泄少陽甘草甘瀉少陰烏梅止溏泄鹿角主瘡瘍薑棗和榮衛此少角木運歲藥之大概也可資考證故附錄之伏明之紀是謂勝長王冰曰藏氣勝長也謂癸酉癸未癸巳癸卯癸丑癸亥之歲也張志聰曰火運不及則水勝其長馬蒔曰長氣屬火藏氣屬水收氣屬金火氣不及水能勝之是謂勝長張介賓曰火不及也凡戊癸皆屬火運而癸以陰柔乃為不及故於六癸之歲長氣不宣藏氣勝之驥案戊癸化火此六癸年火運不及少徵之歲太過者齊化不及者兼化是謂我弱我弱則勝我者乘我之衰而來兼其化如此少徵火不及之運勝火之水來兼火化即經所謂乘其弱來同其化也故曰勝長曰藏氣反布兼化也兼謂化我也長氣不宣藏氣反布王冰曰火之長氣不能施行故水之藏氣反布於時收氣自政化令乃衡王冰曰金土之義與歲氣素無干犯故金自行其政土自平其氣也張志聰曰火氣伏明則金無所畏故收氣得自主其政火不及則所生之土氣不盛是以化令平衡其果慄桃王冰曰慄水桃金果也張介賓曰慄水果桃金果火不及故二果成其實絡濡王冰曰絡支脈也濡有汁也張介賓曰絡應火濡應水其谷豆稻王冰曰豆水稻金谷也張介賓曰豆水穀稻金谷二谷成也其味苦鹹王冰曰苦兼咸也張介賓曰苦衰咸勝其畜馬彘王冰曰火從水畜張介賓曰馬火畜當衰彘水畜當王驥案六癸年少徵火運不及陳無擇有黃耆茯神湯用黃耆茯神遠志紫河車米仁一方有棗仁㕮咀每服四錢水盞半姜三片棗一枚空心服繆問解此方曰六癸之水其藏為心心為生血之藏血足則榮養百體不足則病多旁見方用黃耆走表茯神入心以紫河車血肉有情補其心血遠志挈離入坎育其心神佐以薏米甘淡悅脾蓋嬰兒奼女必媒合於黃婆此治心腎者所以必兼治脾也要之氣交之病多屬藏氣侵陵非如六腑之可瀉即偶用以佐治亦不可以太過天干十方具本此義特為拈出已為世之操刀者頂門下一針矣卑監之紀是謂減化王冰曰謂化氣減少己巳己卯己丑己亥己酉己未之歲也張志聰曰土運不及則化氣乃減木反勝之馬蒔曰化氣屬土生氣屬木長氣屬火收氣屬金土氣不足木能勝之張介賓曰凡甲己皆屬土運而已以陰柔乃為不及故於六己之年化氣不令是謂減化驥案此六己年少宮土運不及之歲不及則我弱我弱則勝我者乘我之衰來兼我之化兼謂以彼化我也此少宮土運勝土之木來兼土化經所謂乘其弱來同其化也故曰減化化氣不令生政獨彰王冰曰土少而木專其用張志聰曰化氣不能施其令而生政獨彰也長氣整雨乃愆收氣平王冰曰不相干犯則平整化氣減故雨愆期張志聰曰木火相生故長氣整化氣不令故雨乃愆期土氣不及故收氣自平張介賓曰火土無犯故長氣整土德衰故雨愆期金無所生故收氣平其果李慄王冰曰李木慄水果也張介賓曰李木果慄水果土不及而二果成其實濡核王冰曰濡中有汁者核中堅者新校正云詳前後濡實主水此濡字當作肉王注亦非張介賓曰濡應水核應木其谷豆麻王冰曰豆水麻木谷也張介賓曰豆水穀麻木谷二谷成也其味酸甘王冰曰甘味之物熟兼酸也張介賓曰酸勝甘衰其畜牛犬王冰曰土從木畜張介賓曰牛為土畜當衰犬為木畜當盛驥案六己年少宮土運不及陳無擇有白朮厚朴湯方用白朮厚朴半夏桂心藿香青皮炮姜炙草㕮咀每服四錢姜三片棗一枚食前溫服繆問解此方曰歲土不及木必乘之補太陰不得不兼泄厥陰也夫脾為陰土所惡者濕所畏者肝其取資則本於胃胃不下降則脾氣不得上升胃不能遊溢精氣則脾無所取資故君白朮苦甘入脾以燥濕佐厚朴苦溫平胃理氣此補藏通腑之法也肝為將軍之官乘土不足陵犯中州是宜泄之桂心泄肝氣青皮泄肝血甘草緩肝急藿香橫入脾絡炮姜上行脾經半夏下宣脾氣總不外奠安中土自不畏風氣之流行矣從革之紀是謂折收王冰曰火折金收之氣也謂乙丑乙亥乙酉乙未乙己乙卯之歲也張志聰曰金運不及則收政乃折馬蒔曰收氣屬金生氣屬木長氣屬火化氣屬土金氣不及火能折之是謂折收張介賓曰凡乙庚皆屬金運而乙以陰柔乃為不及故於六乙之年收氣咸折驥案此六乙年金運少商不及之歲不及則為我弱我弱則勝我者乘我之衰而來兼其化此少商金運勝我之火來兼金化經所謂乘其弱來同其化也兼謂以彼化我故曰折收曰生氣乃揚收氣乃後生氣乃揚王冰曰後不及時也收氣不能以時而行則生氣布揚而用之也張志聰曰收氣在後則木無所畏而生氣乃揚張介賓曰金之收氣後時則木之生氣布揚而盛也長化合德火政乃宣庶類以蕃王冰曰火土之氣同生化也宜行也張志聰曰長化合德故庶物以蕃張介賓曰金衰則火乘之火王則土得所助故長化合德火政宣行而庶類蕃盛也其果李杏王冰曰李木杏火果也張介賓曰李木果杏火果金不及故二果成也其實殼絡王冰曰外有殼內有支絡之實也張介賓曰殼屬金絡屬火有盛衰也其谷麻麥王冰曰麻木麥火谷也麥色赤也張介賓曰麻木穀麥火谷二谷成也其味苦辛王冰曰苦味勝辛辛兼苦也張介賓曰苦勝辛衰也其畜雞羊王冰曰金從火土之兼化新校正云詳火畜馬土畜牛今言羊故王注云從火土之兼化為羊也或者當云注中之土字甚非張介賓曰雞為金畜當衰羊為火畜當盛金匱真言論火畜曰羊驥案六乙年少商金運不及陳無擇有紫菀湯方用紫菀茸桑皮人參黃耆地骨皮杏仁白芍甘草生薑大棗一方有白芷無白芍每空心服四錢繆問解此方曰金不足則肺氣自餒火乘其敝惟有清火止泄急救肺金紫菀苦溫下氣和血寒熱咸治桑皮甘寒補血益氣吐畜所需參耆固無形之氣即以攝走泄之陰地骨皮瀉肺中伏火而又泄之以杏仁斂之以白芍合之以甘草補土生金薑棗調和榮衛緩諸藥於至高之分而參耆得收指臂之功蓋補土可以生金而實土即以御水也涸流之紀是謂反陽王冰曰陰氣不及反為陽氣代之謂辛未辛巳辛卯辛酉辛亥辛丑之歲也張志聰曰水寒不及陽反勝之馬蒔曰藏氣屬水化氣屬土長氣屬火水氣不及是陰氣不及也而陽氣反來代之是反陽也凡丙辛皆屬水運而辛以陰柔乃為不及故於六辛陰水之年陽反用事驥案六辛年少羽水運不及之歲不及則為我弱我弱則勝我者乘我之衰而來兼其化兼謂以彼化我也此少羽水運勝水之土來兼土化即經所謂乘其弱來同其化也故藏氣不令化氣乃昌藏令不舉化氣乃昌王冰曰少水而土盛張介賓曰水衰故藏氣不令土勝故化氣乃昌長氣宣布蟄蟲不藏王冰曰太陽在泉經文背也厥陰陽明司天乃如經謂也張志聰曰水令不舉則火無所畏故長氣得以宣布陽熱反盛是以蟄蟲不藏按此不言收氣者金水無犯故不及之其果棗杏王冰曰棗土杏火果也張介賓曰棗土果杏火果水不及則二果當成其實濡肉王冰曰濡水肉土化也張介賓曰濡應水者衰肉應土者盛也其谷黍稷王冰曰黍火稷土谷也新校正云按本論上文麥為火之谷今言黍者疑麥字誤為黍也雖金匱真言論作黍然本論作麥當從本篇之文也張介賓曰黍火谷稷土谷二谷當成按金匱真言論火谷曰黍本論作麥似乎二字有誤其味甘鹹王冰曰甘入於鹹味甘美也張介賓曰甘勝咸衰其畜彘牛王冰曰水從土畜張介賓曰彘水畜當衰牛土畜當王驥案六辛年少羽水運不及陳無擇有五味子湯用五味附片熟地巴戟鹿茸杜仲山萸生薑鹽每食前服四錢繆問解此方曰辛年涸流之紀多腎虛受濕之證然逐濕則傷陰勝濕則耗氣皆犯虛虛之戒也君以五味之酸收收陰陽二氣於坎中臣以直入坎中之附子急助腎陽遍走經絡驅逐陰霾佐以熟地填補腎陰助以五味固護封蟄治腎之法無遺蘊矣巴戟入陰除痹鹿茸補血益髓肝欲辛補之以杜仲之辛肝喜酸與之以萸肉之酸二藥並行能除濕痹而利關節補肝即以益腎子能令母實之義也發生之紀是謂啟𢽬王冰曰物乘木氣以發生而啟陳其容質也是謂壬申壬午壬辰壬寅壬子壬戌之六歲化也𢽬古陳字張志聰曰歲木太過是謂發生啟開敷布也布散陽和發生萬物之象馬蒔曰四氣調神論春三月此謂發陳則此篇曰啟陳皆就其發生之氣象而形容之張介賓曰此下詳言太過之紀陽剛之木六壬是也布散陽和發生萬物之象驥案六壬年太角木運太過之歲太過則為我旺我旺則勝我者畏我之盛而反齊其化此大角木運勝木之金反齊木化經所謂畏其旺者反同其化是也土疏泄蒼氣達王冰曰生氣上發故土體疏泄木之專政故蒼氣上達達通也出也行也張志聰曰土得其制化故主疏泄蒼氣木氣也張介賓曰木氣動生氣達故土體疏泄而通也陽和布化陰氣乃隨王冰曰少陽先生髮於萬物之表厥陰次隨營運於萬象之中也張志聰曰厥陰之上風木治之是以陽和布化於上而陰氣乃隨於下也張介賓曰木火相生則陽和布化陽氣日進則陰氣日退乃隨猶言乃後也生氣淳化萬物以榮王冰曰歲木有餘金不來勝生令布化故物以舒榮張志聰曰生氣有餘故萬物感之而榮茂張介賓曰木氣有餘故能淳化以榮萬物其谷麻稻王冰曰木化其金張介賓曰麻木谷稻金谷齊其化也其畜雞犬王冰曰齊雞孕也張介賓曰雞金畜犬木畜犬齊雞也其果李桃王冰曰李齊桃實也張介賓曰李木果桃金果李齊桃也其味酸甘辛王冰曰酸入於甘辛齊化也張介賓曰三味亦木土金驥案六壬年太角木運太過之歲陳無擇有茯苓湯方用茯苓白朮甘草草果厚朴半夏炮姜青皮生薑大棗每服六錢空心服繆問解此方曰風淫所勝治以苦甘而治藏先通腑故君茯苓利脾濕臣以術草一苦一甘補脾之體佐以草果厚朴辛香導滯宣脾之用半夏助辛淡之用炮姜資焦苦之助治脾之法懶已盡於此而風淫所勝平之宜急加以青皮之酸合之甘草之甘所謂以酸瀉之以甘緩之也薑棗調營益衛為治中所必需信乎治病之必求其本也赫曦之紀是謂蕃茂王冰曰物遇太陽則蕃而茂是謂戊辰戊寅戊子戊戌戊申戊午之歲也新校正云按或者云注中太陽當作太徵詳木土金水之太過注俱不言角宮商羽等運而水太過注云陰氣大行此火太過是物遇太陽也安得謂之太徵乎張志聰曰歲火太過是謂赫曦長氣盛故草木蕃茂馬蒔曰蕃茂萬物蕃盛而茂蓋自其氣象而言四氣調神論夏三月此謂蕃秀與此義同張介賓曰六戊之歲皆陽剛之火也陽盛則萬物俱盛故曰蕃茂驥案六戊年太徵火運太過之歲太過則為我旺我旺則勝我者畏我之盛而反齊其化此太徵火運勝火之水反齊火化經所謂畏其旺反同其化是也陰氣內化陽氣外榮王冰曰陰陽之氣得其序也張志聰曰少陰之上君火主之故陰氣內化陽氣外榮張介賓曰陰降於下陽升於上炎暑施化物得以昌王冰曰長氣多故爾張志聰曰炎暑施化司夏令也物得以昌受長氣也張介賓曰陽氣發生之本也其穀麥豆王冰曰火齊水化也張介賓曰麥火谷豆水穀麥齊豆也其畜羊彘王冰曰齊孕育也新校正云按本論上文馬為火之畜今言羊者疑為馬字誤為羊金匱真言論及藏氣法時論俱作羊然本論作馬當從本論之文也張介賓曰羊火畜彘水畜其育齊也其果杏慄王冰曰等實也張介賓曰杏火果慄水實同也其味苦辛鹹王冰曰辛物兼苦與咸化齊成也張介賓曰亦火金水三味驥案六戊年火運太過之歲陳無擇有麥門冬湯方用麥門冬人參桑皮紫菀半夏白芷竹葉生薑大棗空心服四錢繆問解此方曰麥冬養肺之陰人參益肺之氣張潔古謂參味苦甘甘能瀉火麥冬味苦兼瀉心陽且救金且抑火一用而兩擅其長桑皮甘寒紫菀微辛開其膹郁半夏甘草以益脾土虛則補其母也白芷辛芬散肺家風濕竹葉性升引藥上達補肺之法無餘蘊矣敦阜之紀是謂廣化王冰曰土余故化氣廣被於物也是謂甲子甲戌甲申甲午甲辰甲寅之歲也張志聰曰土運太過是謂敦阜土氣盛而化氣布於四方故為廣化馬蒔曰廣布其化亦自氣象而言張介賓曰土之太過是謂敦阜六甲之歲皆陽剛之土也土之化氣廣被於物故曰廣化驥案此六甲年太宮土運太過之歲是為我旺我旺則勝我者畏我之盛而反齊其化此太宮土運勝土之木反齊土化經所謂畏其旺反同其化是也厚德清靜順長以盈王冰曰土性順用無與物爭故德厚而不躁順火之長育使萬物化氣盈滿也張志聰曰厚德清靜土之體也順長以盈火土合化也張介賓曰土德至厚土性至靜順火之長氣而化政以盈土生於火也至陰內實物化充成王冰曰至陰土精氣也夫萬物所以化成者皆以至陰之靈氣生化於中也張志聰曰太陰之上濕土主之故至陰內實物化充成蓋太陰為陰中之至陰陰氣內實而後化成萬物於外張介賓曰至厚至靜故曰至陰萬物之化無不賴土故物化充成煙埃朦郁見於厚土王冰曰厚土山也煙埃土氣也張志聰曰煙埃朦郁土之氣也厚土者見於山陵之間也張介賓曰土本厚土而尤厚者則在山川煙埃朦郁土之氣也故見於此大雨時行濕氣乃用燥政乃闢王冰曰濕氣用則燥政闢自然之理爾張志聰曰大雨時行濕氣上蒸終為淫雨闢避也夏秋之交濕土主令濕氣盛是以秋之燥氣乃避張介賓曰土之化濕濕氣行則燥氣闢其谷稷麻王冰曰土木齊化張介賓曰稷土谷麻木谷土齊木化也其畜牛犬王冰曰齊孕育也張介賓曰牛土畜犬木畜其育齊也其果棗李王冰曰土齊木化張介賓曰棗土果李木果驥案六甲年太宮土運太過之歲陳無擇有附子山萸湯方用附片山萸烏梅木瓜肉蔻半夏丁香木香生薑大棗每空心服四錢繆問解此方曰經謂濕淫於內治以苦熱附子以大熱純陽之品直達坎陽以消陰翳治腎而兼治脾也但附子辛竄必賴維持如真武湯之於白芍地黃飲之於五味此而不佐以茱萸之酸收安得入腎而無劫液之慮不偕以烏梅之鎮靜難必其歸土而無燥肺之憂藏宜補既有萸肉以培乙木腑宜瀉更有木瓜以泄甲木安甲乙即所以資戊己也肉果辛溫助土再復半夏之利濕丁木香之治胃木瓜烏梅之療痿薑棗之和中眼光四射矣堅成之紀是謂收引王冰曰引斂也陽氣收陰氣用故萬物收斂謂庚午庚辰庚寅庚子庚戌庚申之歲也張志聰曰歲金太過名曰堅成秋令主收是謂收引馬蒔曰收引者陽氣收斂而陰氣引申也自金之收令而言四氣調神論謂之容平亦自氣象而言張介賓曰金之太過是謂堅成六庚之歲陽金也金勝則收氣大行故曰收引引者陰盛陽衰萬物相引而退避也驥案此六庚年太商金運太過之歲是為我旺我旺則勝我者畏我之盛而反齊其化此太商金運勝金之火反齊金化經所謂畏其旺反同其化是也天氣潔地氣明王冰曰秋氣高潔金氣同張志聰曰天氣潔地氣明金氣清也陽氣隨陰治化王冰曰陽順陰而生化張志聰曰陽明之上燥氣主之是以陰金治化於上而陽明之氣在下隨之張介賓曰隨後也燥行其政物以司成王冰曰燥氣行化萬物專司其成熟無遺略也張志聰曰秋主收成故燥行其政物以司成張介賓曰燥行其政氣化乃堅故司萬物之成收氣繁布化洽不終王冰曰收殺氣早土之化不得終其用也新校正云詳繁字疑誤張志聰曰秋主收而長夏主化收氣早布是以化洽不終張介賓曰金之收氣盛而蚤布則洽之化氣不得終其令也洽和也澤也其谷稻黍王冰曰金火齊化也新校正云按本論上以麥為火之谷當言其谷稻麥張介賓曰稻金谷黍火谷金齊火化也其畜雞馬王冰曰齊孕育也張介賓曰金火二畜孕育齊也其果桃杏王冰曰金火齊實張介賓曰金齊火實也其味辛酸苦王冰曰辛入酸苦齊化張介賓曰亦金木火三味也驥案六庚年太商金運太過之歲陳無擇有牛膝木瓜湯方用牛膝木瓜白芍杜仲黃松節菟絲子枸杞子天麻甘草生薑大棗空心服四錢繆問解此方曰用藥之例補肝血者可以從酸補肝氣者不可以從辛何則酸可育肝之陰辛則劫肝之血也方用牛膝酸平達下為君木瓜酸溫舒筋為臣白芍和厥陰之陰制肺金之橫杜仲養風木之氣自無辛烈之偏重取肝陰最為有見松節利血中之濕菟絲入三陰之經復以枸杞甘平潤肺合之天麻辛溫息風金安而木亦平此則柔克之道也流衍之紀是謂封藏王冰曰陰氣大行則天地封藏之化也謂丙寅丙子丙戌丙申丙午丙辰之歲張志聰曰水運太過是為流衍冬主閉藏故謂封藏馬蒔曰封藏者陰氣已上陽氣已下天地之化至此而藏四氣調神論冬三月此謂閉藏張介賓曰水之太過是謂流衍陽水之歲六丙是也水盛則陰氣大行天地閉而萬物藏故曰封藏驥案此六丙年太羽水運太過之歲是為我旺我旺則勝我者畏我之盛而反齊其化此太羽水運勝水之土反齊水化經所謂畏其旺者反同其化是也寒司物化天地嚴凝王冰曰陰之氣也張志聰曰寒氣司化故天氣嚴凝馬蒔曰凡物氣之化寒氣司之天地間皆嚴凝之氣張介賓曰陰氣盛也藏政以布長令不揚王冰曰藏氣用則長化止故令不發揚張志聰曰水政以布故火令不揚張介賓曰水勝火也其谷豆稷王冰曰水齊土也張介賓曰豆水穀稷土谷水有餘則齊土化也其畜彘牛王冰曰齊孕育也張介賓曰彘水畜牛土畜彘齊牛育也其果慄棗王冰曰水土齊實張介賓曰慄齊棗實也其味酸苦甘王冰曰鹹入於苦甘化齊焉張介賓曰亦水火土味也驥案六丙年太羽水運太過之歲陳無擇有黃連茯苓湯方用黃連黃芩赤苓半夏通草車前子甘草遠志麥冬生薑大棗空心服四錢繆問解此方曰內經氣寒氣涼治以寒涼立方妙在不理心陽而專利水清熱以黃連之可升可降寒能勝熱者平其上下之熱更以黃芩之可左可右逐水濕清表熱者泄其內外之邪茯苓半夏通利陽明通草性輕專療浮腫車前色黑功達水源甘草為九土之精實隄御水使水不陵心而心自安也遠志之辛祛其譫妄遊刃有餘佐以麥冬養液保金合車前可祛濕痹又借半夏之辛以疏土實用藥之妙豈思議所能及哉至真要大論帝曰其主病何如王冰曰言採藥之歲也張志聰曰主病謂主治病之藥物司歲備物謂從六氣五運以備之如少陰少陽二火司歲則當收附子薑桂之熱物如陽明燥金司歲則當收桑皮蒼朮之燥物如厥陰風氣主歲則當收防風羌活之風物如太陽寒水司歲則當收芩連大黃之寒物如太陰土氣司歲則當收山藥黃精之類甘平甘溫之品及蒼丹黅素元之谷所謂藥食宜也馬蒔曰此言藥備歲物者為天地之專精而非司氣者其氣偏非歲物者其氣散也上文言候氣宜而無失病機則用藥以治病不可無所主也伯言每歲各有所司必因其司歲者以備藥物則病無遺主矣岐伯曰司歲備物則無遺主矣王冰曰謹候司天地所生化者則其味正當其歲也故彼藥工專司歲氣所收藥物則一歲二歲其所主用無遺略也今詳前字當作則張志聰曰先收歲物謂先備司歲之物即上章之所謂食歲谷以全其真蓋食天地之精以養吾身之真也馬蒔曰每歲各有所司必因其司歲者以備藥物則病無遺主矣張介賓曰如厥陰司歲則備酸物少陽少陰司歲則備苦物太陰司歲則備甘物陽明司歲則備辛物太陽司歲則備咸物所謂歲物也歲物備則五味之用全矣驥案五常政大論生化之別有五氣五味五色五類五宜又五類盛衰各隨其氣之所宜如厥陰司天羽蟲育在泉毛蟲育之類元和紀用經厥陰風火歲主所宜用車前子戎鹽之類陳無擇三因方厥陰司天用敷和湯之類他如經言歲谷間谷皆歲物所宜不勝列舉義詳各條又東垣用藥心法司歲備物天地之專精專精之歲藥物肥濃又於使用當其正氣味也五運主歲不足則物薄有餘則物精非專精則氣散氣散則物不純是以形質雖同力用則異帝曰先歲物何也岐伯曰天地之專精也王冰曰專精之氣藥物肥膿又於使用當其正氣味也新校正云詳先歲疑作司歲張志聰曰司氣謂五運之氣五運雖與主歲相同然又有太過不及之分太過之歲則物力厚不及之歲則物力淺薄馬蒔曰每歲之司天在泉物從其化而天地之專精儲焉故不可不先之張介賓曰歲物者得天地精專之化氣全力厚故備所當先此與六元正紀大論食歲物以全其真者同義驥案東垣用藥心法至元庚辰六月治許伯威心悸動吃噫不絕色變青黃精神減少目不欲開倦臥惡人語笑脈動而中止有時自還乃結脈也用炙甘草湯兩劑不效再候之脈證相對曰莫非藥有陳腐者乎再市藥之氣味厚者煎服減半再服而安凡藥之昆蟲草木產之有地根葉花實採之有時失其地則性味少異失其時則氣味葉不全又況新陳之不同精粗之不等倘不擇而用之其不效者醫之過也其藥貴專精如此帝曰司氣者何如王冰曰司運氣也張志聰曰若非氣運司歲之物則氣散而力薄岐伯曰司歲者主歲同然有餘不足也王冰曰五運主歲者有餘不足比之歲物恐有薄有餘之歲藥專精也張志聰曰形質雖同而氣味有厚薄之異馬蒔曰彼司氣者即司運也如甲己為土運乙庚為金運然太過則有餘不及則不足其氣偏耳張介賓曰主歲即上文司天在泉之主歲運之與氣所主皆同但五太之運為有餘五少之運為不及而物性之稟有厚薄矣驥案五常政大論五氣五類有所勝制同者盛之異者衰之又氣主有所制歲立有所生地氣制已勝天氣制勝己天制色地制形故各有制各有勝各有生各有成故曰不知其年之所加氣之同異不足以言生化此有餘不足即此勝制而推之斯無遺主矣帝曰非司歲物何謂也岐伯曰散也王冰曰非專精則散氣散氣則物不純也張志聰曰治保有多少者謂治病保真之藥食或宜多用而宜少用也按中古之世不能司歲備物用炮製以代天地之助如製附子曰炮製蒼朮桑皮曰炒蓋以火助火而以燥助燥也近有附子以水煮曰自制制桑皮以蜜拌曰潤燥是猶用鷹犬而去其爪牙則驅之摶蹇兔而不能又安望韓盧之技哉馬蒔曰若非歲物而用之則其氣又散張介賓曰非司歲物謂非主歲之物也散者謂六氣之序不司天地則司四間故物生之應亦當隨氣散見於四方而各有所稟也驥案五常政大論氣始而生化氣散而有形氣布而蕃育氣終而象變非司歲之物正值散氣有形之期氣衰味薄論語所謂不時不食也況入藥治病性味不全何可用也故質同而異等也王冰曰形質雖同力用則異故不尚之馬蒔曰一物之質同而精有完全偏散之異張介賓曰天地之氣變不常故物生之體質雖同而性用之厚薄則異氣味有薄厚性用有躁靜治保有多少力化有淺深此之謂也王冰曰物與歲不同者何以此爾馬蒔曰氣味有厚薄性用有躁靜治保有多少力化有淺深此歲物之不可以不備也張介賓曰此即質同異等之謂蓋司氣者與不司氣者其有不同如此帝曰歲主藏害何謂岐伯曰以所不勝命之則其要也王冰曰木不勝金金不勝火之類是也張志聰曰此論五運之歲受司天在泉之勝制歲主者謂六氣之主歲藏五藏也蓋言五藏內屬五行而外合五運五運之氣受勝制之所傷則病人五藏而為害如少商金運而值二火司天少宮土運而值厥陰在泉此皆運氣之所不勝而受勝氣之所勝制故以所不勝命之則歲主藏害之要可知矣命名也馬蒔曰此言歲之五藏害者以其有所不勝而治之有法也歲氣在天五藏在人而歲主五藏有害者正以木氣淫則脾不勝火氣淫則肺不勝土氣淫則腎不勝金氣淫則肝不勝水氣淫則心不勝以所不勝命之則知害藏之要帝曰治之奈何岐伯曰上淫於下所勝平之外淫於內所勝治之王冰曰淫謂行所不勝已者也上淫於下天之氣也外淫於內地之氣也隨所制勝而以平治之也制勝謂五味寒熱溫涼隨勝用之下文備矣新校正云詳天氣主歲雖有淫勝但當平調之故不曰治而曰平也張志聰曰上淫於下者謂司天之氣淫勝其在下之運氣當以所勝平之如少商金運而火熱上臨宜平以鹹寒佐以苦甘外淫於內者在泉之氣淫勝其在內之五運當以所勝治之如少宮土運而風木下淫宜治以辛涼佐以苦甘按司天在泉之氣根於外五運之化根於中故曰外淫於內下章平天氣曰平治在泉曰治又諸氣在泉曰淫於內馬蒔曰司天之氣淫於下而藏病生則以所勝者平之如木氣淫則以金制之者是也至於在泉之氣淫於內而藏病生則亦以所勝者治之即木氣淫而以金制之者是也所謂制勝者謂五味寒熱溫涼隨勝而用之耳但上淫於下者淫於三氣已前有勝無復也外淫於內者淫於四氣以後有勝無復也張介賓曰淫太過為害也上淫於下謂天以六氣而下病六經也外淫於內謂地以五味而內傷五官也淫邪為害當各以所勝者平治之驥案五常政大論五味所資生化有厚薄成熟有少多寒熱燥濕不同其化故少陽在泉其味辛其治苦酸陽明在泉其味酸其治辛苦甘太陽在泉其味苦其治淡咸厥陰在泉其味甘其治酸苦少陰在泉其味辛其治辛苦甘太陰在泉其味鹹其治甘鹹補上下者從之治上下者逆之以所在寒熱盛衰而調之帝曰善平氣何如王冰曰平謂診平和之氣張志聰曰平氣謂無上下之勝制運氣之和平也馬蒔曰歲之平而有所病者亦視其正反而善治之上文言上淫於下外淫於內而為病皆以歲氣不平也故問以平氣而民病者岐伯曰謹察陰陽所在而調之以平為期正者正治反者反治王冰曰知陰陽所在則知尺寸應與不應不知陰陽所在則以得為失以逆為從故謹察之也陰病陽不病陽病陰不病是為正病則正治之謂以寒治熱以熱治寒也陰位已見陽脈陽位又見陰脈是為反病則反治之謂以寒治寒以熱治熱也諸方之制咸悉不然故曰反者反治也張志聰曰甲丙戊庚壬為陽運乙丁己辛癸為陰運陰陽二運有太過不及之分故謹察陰陽所在而調之以平為期正者正治謂太過之歲當抑其勝氣扶其不勝反者反治謂不及之運為所不勝之氣反勝當反佐以取之馬蒔曰陰陽者尺寸之位曰陰陽陰脈陽脈陰經陽經皆曰陰陽當謹察而調之以平為期如陰經病而陽經不病陽經病而陰經不病是為正病正則以寒藥治熱以熱藥治寒從而正治之若陰位而見陽脈陽位而見陰脈是為反病反則以寒藥治寒以熱藥治熱從而反治之張介賓曰陰陽者脈有陰陽證有陰陽氣味有陰陽經絡藏象有陰陽不知陰陽所在則以反為正以逆為從故宜謹察而調之以平為期無令過也驥案五常政大論養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也可為平調之證
