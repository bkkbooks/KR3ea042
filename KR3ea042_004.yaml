body:
  text: 卷四六化上素問五常政大論帝曰氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也王冰曰始謂始發動散謂流散於物中布謂布化於結成之形所終極於收藏之用也故始動而生化流散而有形布化而成結終極而萬象皆變也即事驗之天地之間有形之類其生也柔弱其死也堅強凡如此類皆謂變易生死之時形質是謂氣之終極新校正云按天元紀大論物生謂之化物極謂之變六微旨大論物之生從於化物之極由乎變變化相薄成敗之所由也吳昆曰始萬物資始也散一氣散為萬象也張志聰曰此論五運之氣主生萬物而受在泉之氣以制之非天地之不生長也氣謂五運之化氣氣始而生化者得生氣也氣散而有形者得長氣也氣布而蕃育者得化氣也氣終而象變者感收藏之氣物極而變成也此五運之主生長化收藏自始至終其致一也馬蒔曰此言五味所資者有生化成熟不同正以地氣制之而詳推其用藥之法始終不外乎一氣而已驥案千金翼藥採取不依時節不以陰乾曝乾雖有藥名終無藥實採得時日陰乾曝乾則有氣力與氣始氣終之義互有發明然而五味所資生化有薄厚成熟有少多終始不同其故何也岐伯曰地氣制之也非天不生地不長也王冰曰天地雖無情於生化而生化之氣自有異同爾何者以地體之中有六入故也氣有同異故有生有化有不生有不化有少生有少化有廣生廣化矣故天地之無必生必化必不生必不化必少生必少化必廣生廣化矣各隨其氣分所好所惡所異所同也吳昆曰制六氣各有所制是以生化成熟之不同張志聰曰資助也天化生五味五味所資者以五運所化之味而反資助其地氣也蓋言五運之氣主生化而因地氣以制之以生化有厚薄成熟有多少也倪仲宣曰地氣制之謂在泉之六氣也天地之氣乃陰陽寒暑之氣故曰非天不生地不長張介賓曰此以下詳明在泉六化五味五穀之有異也始者肇其生機散者散於萬物布者布其茂盛終者收於成功萬物之始終散布本於氣及其生化成熟乃各有厚薄少多之異也氣者即在泉也制之者由其所戒也在泉六化各有盛衰物生於地氣必應之故氣薄則薄非天之不生氣少則少非地之不長驥案素問氣交變論本氣位也位天者天文也位地者地理也五運之政猶權衡高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也六微旨大論亢則害承乃制故有生有制有勝有復所謂天制色地制形天氣制勝己地氣制己勝各隨其氣之所宜各從其化也地制義詳下文在泉帝曰願聞其道岐伯曰寒熱燥濕不同其化也王冰曰舉寒熱燥濕四氣不同則溫清異化可知之矣吳昆曰惟氣不同故化亦異不言溫清省文也張志聰曰寒熱燥濕乃司天在泉之六氣與五運不同其化是知五運所主之生化蕃育因地氣以制之致有厚薄多少也故少陽在泉寒毒不生其氣辛其治苦酸其谷蒼丹王冰曰己亥歲氣化也夫毒者皆五行標盛暴烈之氣所為也今火在地中其氣正熱寒毒之物氣與地殊生死不同故生少也火制金氣故味辛者不化也少陽之氣上奉厥陰故其歲化苦與酸也六氣主歲唯此歲通和木火相承故無間氣也苦丹地氣所化酸蒼天氣所生余所生化悉有上下勝克故皆有間氣吳昆曰少陽相火在泉寒毒遇火則失其為寒故不生火制金而金從火故味辛少陽為火又為木故治苦酸而谷蒼丹張志聰曰毒獨也謂獨寒獨熱之物類則有偏勝之毒氣少陽相火在泉故寒毒之類不生寒熱不同其化矣如辛巳辛亥歲寒水化運值少陽在泉地氣制之以致寒毒不生乃地氣勝制其化運也夫五色五味五運之所主也如少陽司天則白起金用是色從天制所謂天制色也少陽在泉其味辛是味從地制所謂地制形也此化運之色味因司天在泉之勝制畏而從之故曰五味所資謂化運之五味反資助其地氣也治主治也少陽在泉則厥陰司天故所主苦酸其谷主蒼丹者成熟從天地之氣而不從運化也按審平之紀其色白其味辛如值少陽司天則白色反從天化少陽在泉則辛味反從地氣是天地之氣勝制其運氣也如厥陰司天介蟲不成厥陰在泉羽蟲不育是五運之氣勝制其司天在泉也故曰各有制各有勝各有生各有成謂五運六氣各有生成如逢勝制則不生成矣馬蒔曰毒者五行暴烈之氣所成也驥案少陽在泉其治苦酸當云酸苦以是年上木下火風熱交加酸屬木以治其上苦屬火以治其下不兼間味與少陽司天同也六元紀厥陰司天以辛調上以咸調下辛從金化以調上之風木咸從水化以調下之相火曰調曰治互相發也陽明在泉濕毒不生其味酸其氣濕新校正云詳在泉云唯陽明與太陰在泉之歲云其氣濕其氣熱蓋云燥濕未見寒溫之氣故再云其氣也其治辛苦甘其谷丹素王冰曰子午歲其氣化也燥在地中其氣涼清故濕溫毒藥少生化也金木相制故味酸者少化也陽明之氣上奉少陰故其歲化辛與苦也辛素地氣苦丹天氣甘間氣也所以間金火之勝克故兼治甘吳昆曰陽明燥金在泉故濕毒不生金制木而木從金故味酸金生水故其氣濕陽明為金上奉少陰君火其氣見濕金辛火苦濕甘故其治辛苦甘其谷丹素者少陰之色丹陽明之色素也張志聰曰敷和之紀其色蒼其味酸如值壬子壬午之歲陽明在泉地氣制之而木運之味反從地化其谷主丹素者成熟從司天在泉之氣化下篇所謂歲谷是也張介賓曰燥在地中故濕毒之物不生金剋木故味酸者應之燥勝濕故氣濕者應之驥案陽明在泉其治辛苦甘當云苦辛甘以是年上火下金燥熱交結苦屬火以治其上辛屬金以治其下必兼甘者火金之間味也甘屬土為火之子金之母故能調和於火金之間六元紀少陰司天咸以軟之而調其上甚則苦發之酸收之而安其下甚則苦以泄之以咸從水化故能調在上之君火金以酸補故能安在下之燥金甚則以苦發之者上熱甚非用苦之陽不能發越以苦泄之者下熱甚非用苦之陰不能湧泄也同一苦味而有從陽從陰苦寒苦熱之不同與此條可互相參也太陽在泉熱毒不生其味苦其治淡咸其谷黅秬王冰曰丑未歲氣化也寒在地中與熱味化故其歲物熱毒不生水勝火味故當苦也太陽之氣上奉太陰故其歲化生淡咸也太陰土氣上生於天氣遠而高故甘之化薄而為淡也所以淡亦屬甘甘之類也淡黅天化也咸秬地化也黅黃也新校正云詳注云味故當苦當作故味苦者不化傳寫誤也吳昆曰太陽寒水在泉熱毒遇寒則失其為熱故不生水制火而火從水故味苦記曰水無當於五味淡者其初也書曰潤下作鹹鹹者其終也故其治淡咸谷黅者從司天之化谷秬者從在泉之化張志聰曰火主化運火畏水制而火味反資從其地氣故其味苦淡附於甘故所主之味淡寒馬蒔曰其谷之所生者黅秬黅屬土而秬屬水淡黅為天氣所生咸秬為地氣所生張介賓曰秬黑黍也淡黅屬土天之所生咸秬屬水地之所化驥案太陽在泉其治淡咸是年上土下水寒濕內蘊淡屬土即土之薄味以治其上咸屬水為水之正味以治其下水土既平不兼間味六元紀太陰司天以苦燥之溫之甚則發之泄之蓋言濕宜燥寒宜溫用苦者苦從火化用苦之陽也若寒濕既化為熱又必有以發泄之兩兩參觀其義可以互發厥陰在泉清毒不生其味甘其治酸苦其谷蒼赤王冰曰寅申歲氣化也溫在地中與清殊性故其歲物清毒不生木勝其土故味甘少化也厥陰之氣上合少陽所合之氣既無乖忤故其治化酸與苦也酸蒼地化也苦赤天化也氣無勝克故不間氣以甘化也吳昆曰厥陰風木在泉其氣溫清毒遇溫則失其為清故不生木製土而土從木故味甘木治酸以相火司天故酸苦谷之蒼赤其義同也馬蒔曰風氣與火氣相合則溫在地中木勝其土故味甘者少化也氣無乖忤故其歲化所治者酸苦酸屬木而苦屬火其谷之所生者蒼赤蒼屬木而赤屬火酸蒼為地氣所生苦赤為天氣所生驥案厥陰在泉其治酸苦以是年上火下木風熱為炎苦屬火以治其上酸屬木以治其下木火同德不兼間味六元紀少陽司天宜咸宜辛宜酸滲之泄之漬之發之咸從水化能勝火也辛從金化能平木也酸從木化能順木火之性風火之相煽尤賴酸之收之滲之以利小便泄之以通大便漬之以解肌發之以出汗各有深義其氣專其味正王冰曰厥陰少陽在泉之歲皆氣化專一其味純正然餘歲悉上下有勝克之氣故皆有間氣間味矣吳昆曰厥陰在下則少陽在上木火相生氣化專一而味純正其他歲氣上下勝制不能專一化純而兼夫間味也正中也謂厥陰不從標本從中見少陽之火化而在泉之氣味又從中見所主之苦熱其氣專其味正玉師曰陽明所至為清徑厥陰從中見之火化是以清毒不生故下文曰氣專則辛化而俱治馬蒔曰氣無勝克故不間氣以甘化耳惟此厥陰在泉之歲氣化專一味亦純正少陰在泉寒毒不生其味辛其治辛苦甘其谷丹白王冰曰卯酉歲氣化也熱在地中與寒殊化故其歲藥寒毒甚微火氣爍金故味辛少化也故少陰陽明主天主地故其所治苦與辛甘苦丹為地氣所育辛白為天氣所生甘間氣也所以間止克伐也張志聰曰少陰君火在泉是以寒毒不生金畏火制故其味辛少陰在下則陽明在上陽明之上燥氣治之中見太陰陽明從中見濕土之化故所主之味辛苦甘兼從中見之土味也其谷主白丹者成熟馬蒔曰少陰之火上奉陽明故其歲化所治者辛苦甘辛屬金苦屬火而甘則間氣所生也其谷之所生者白丹白屬金而丹屬水苦丹為地氣所育辛白為天氣所生辛白屬金天之所化苦丹屬火地之所生驥案少陰在泉其治辛苦甘以是年上火下金燥熱交侵辛屬金以治其上苦屬火以治其下甘為間氣之味六元紀陽明司天以咸以苦以辛汗之清之散之咸從水化治下之君火苦從火化治上之燥金辛從金化治本氣之不及而火來乘之者以求其上下之平也歲半以下氣過熱故宜清歲半以上氣過斂故宜散兩條互觀頗開用五味之法門也太陰在泉燥毒不生其味鹹其氣熱其治甘鹹其谷黅秬王冰曰辰戌歲氣化也地中有濕與燥不同故干毒之物不生化也土製於水故味鹹少化也太陰之氣上承太陽故其歲化甘與咸也甘黅地化也咸秬天化也寒濕不為大忤故間氣同而氣熱者應之吳昆曰太陰濕土在泉濕勝則失其為燥故不生土製水而水從土故味鹹濕為陰其氣為熱升者為陽也土味甘以太陽寒水司天故甘鹹谷之黅秬亦上下之異也張志聰曰水畏土製其味鹹太陰在下則太陽在上故其氣熱謂太陽之從本從標味從地化氣從天化其所主之味甘鹹其谷主黅秬者成熟張介賓曰土剋水故味鹹者應之濕不遠寒故氣熱之物不成驥案太陰在泉其治甘鹹當云鹹甘上水下土寒濕相合咸屬水以治其上甘屬土以治其下六元紀太陽司天苦以燥之濕以溫之言土濕水寒之歲濕宜燥之寒宜溫之必用苦者苦從火化治咸以熱用苦之陽也各有意義化淳則咸守氣專則辛化而俱治王冰曰淳和也化淳謂少陽在泉之歲也火來居水而反能化育是水咸自守不與火爭化也氣專謂厥陰在泉之歲也木居於水而復下化金不受害故辛復生化與咸俱王也唯此兩歲上下之氣無克伐之嫌故辛得與咸同應王而生化也餘歲皆上下有勝克之變故其中間甘味兼化以緩其制抑余苦鹹酸三味不同其生化也故天地之間藥物辛甘者多也吳昆曰五行之用土主化水味鹹水治於土者也故土化淳和則咸者守位無有過越氣專者運與在泉同是太陰濕土己丑己未歲是也土盛則生金故與辛化而俱治張志聰曰此復申明五味所資其化氣者因勝制而從之也化淳者謂陽明從中見濕土之化燥濕相合故其化淳一金從土化故味之咸者守而勿敢泛溢畏太陰之制也氣專者厥陰從中見少陽之主氣故味辛者與甘酸苦味俱主之蓋辛受火制制則從火化也夫寒熱燥濕在泉之六氣也酸苦甘辛鹹五運之五味也以燥濕之化淳則咸守相火之氣專則辛化蓋因地氣制之而味歸氣化也玉師曰味歸氣化則從在泉之寒熱燥濕而生長化收藏之氣不能始終一致是以生化有厚薄成熟有多少馬蒔曰凡此諸氣在泉惟少陽在泉之歲火來居泉而反能化育是水咸自守不與火爭化乃化之至淳者也厥陰在泉之歲木居於水而復下化金不受害故辛復生化與咸俱王是氣之至專者也上文厥陰在泉而曰其氣專其味正正謂此耳張介賓曰六氣惟太陰屬土太陰司地土得位也故其化淳淳原也五味惟咸屬水其性善泄淳土製之庶得其守也土氣土位故曰氣專土盛生金故與辛化而俱治俱治者謂辛與甘鹹兼用為治也蓋辛屬金為土之子為水之母能調和於水土之間此即太陰在泉其治甘鹹之間味也然太陰太陽相為上下皆當用之但太陰在泉辛化厚太陽在泉辛化薄耳驥案化淳氣專二句當緊接上文太陰在泉張介賓之説為長又太陰在天為濕在地為土在本氣為戊己戊為陽土屬胃己為陰土屬脾己土主升己土升則癸水乙木皆升戊土主降戊土降則金火皆降故交濟水火升降金木其權總在於土土者水火金木之中氣左旋則化木火右轉則化金水實四象之父母也四象之中各含土氣故其氣專其化淳咸者在泉水味辛者陽明戊土之味太陰之中見陽明金亦水流濕火就燥同氣相求之義也故曰補上下者從之治上下者逆之以所在寒熱盛衰而調之王冰曰上謂司天下謂在泉司天地氣太過則逆其味以治之司天地氣不及則順其味以和之從順也吳昆曰補者補其不及治者治其太過上謂司天下謂在泉從之謂同其氣逆之謂反其氣也以其所見寒熱虛實而調之以其所宜也張志聰曰上下謂司天在泉之氣補助從順也少陽在泉則厥陰司天當用苦酸之味以補之蓋助其上下之氣也治平治也逆反也如司天之氣風淫所勝平以辛涼熱淫所勝平以鹹寒如諸氣在泉寒淫於內治以甘熱火淫於內治以鹹冷謂淫勝之氣又當反逆以平之故以所在之寒熱盛衰而調之謂盛則治之衰則補之則上下之氣和調矣張介賓曰此下皆言治法也補者補其不足治者治其有餘上謂司天下謂在泉從之謂同其氣如以辛補肺以甘補脾之類是逆之謂反其氣如以苦治肺以酸治脾之類是當各以病之所在隨其寒熱盛衰之宜而調之也驥案司天主天令位在上司地主地化位在下以司天論君火相火寒水常為陽年司天風木濕土燥金常為陰年司天陽年太過陰年不及不及則補之有餘則治之少陰司天君火太過平以鹹寒少陽司天相火太過平以酸冷太陽司天寒水太過平以辛熱所謂逆也厥陰司天清勝治以酸溫太陰司天濕勝佐以甘辛陽明司天燥勝治以辛寒所謂從也六元正紀大論太陽司天之政氣化運行先天王冰曰六步之氣生長化成收藏皆先天時而應至也餘歲先天同之也張志聰曰此統論六氣之主歲而主時也主歲者司天在泉主時者主氣客氣六氣雖各分部而司天之氣又為一歲之主故曰凡此太陽司天之政氣化運行先天子午寅申辰戌為六陽年氣主太過丑未卯酉己亥為六陰年氣主不及故曰運太過則其至先運不及則其至後張介賓曰氣交變大論太過者先天不及者後天天氣肅地氣靜寒臨太虛陽氣不令水土合德其谷玄黅故歲宜苦以燥之溫之新校正云詳故歲宜苦以燥之溫之九字當在避虛邪以安其正下錯簡在此吳昆曰寒水司天故肅濕土在泉故靜玄應司天水色黃應在泉土色濕宜燥之寒宜溫之而必用苦者類有寒熱濕熱惟苦能勝熱而又燥之以勝濕溫之以勝寒所謂調之正味而使上下合德也馬蒔曰六步之氣生長化收藏皆先時而至故辰戌之歲宜用苦味以燥其濕土溫其寒水驥案辰戌十年寒濕之歲見於氣交而為民病陳無擇有靜順湯用炮附片炮薑茯苓牛膝甘草防風訶子木瓜繆問解此方曰君附子以溫太陽之經臣炮薑以煦太陰之陽茯苓牛膝導附子專達下焦甘草防風引炮薑上行脾土訶子酸能醒胃木瓜酸可入脾且斂攝肺金恐辛熱無制也防風附片通行十二經合用而表裡寒濕俱除矣此溫燥之大法也必折其鬱氣先資其化源王冰曰化源謂九月迎而取之以補心火新校正云詳水將勝也先於九月迎取其化源先瀉腎之源也蓋以水王十月故先於九月迎而取之瀉水所以補火也吳昆曰鬱氣者如以上太陽寒水司天則火不得升明而自郁太陰濕土在泉則水不得流衍而自鬱郁則病生折去也資其化源者資養其生化之源也如火失其養則資其木水失其養則資其金皆自其母氣而資養之張志聰曰化源者謂五運為六氣之生源折其鬱氣者折其致郁之氣也如太徵之歲太陽司天則火運受郁太羽之歲太陰在泉則水運受郁故當燥之以折太陰之土氣溫之以折太陽之寒邪六氣同義馬蒔曰折其鬱氣者折其來勝之氣以散其被勝之郁也本病篇辰戌之歲木氣升之主降天柱勝而不前又遇庚辰庚戌金運先天中運勝之忽然不前又云辰戍之歲少陽降地主窒天玄勝之不入又遇丙辰丙戌水運太過先天降而不下故刺法論於木氣不能升者刺足厥陰肝經之井穴大敦火欲降而不能入地者刺足少陰腎經之井穴湧泉足太陽膀胱經之合穴委中皆以折其鬱氣也資其化源者取其化源而瀉之也太過年則瀉不及年則補又按刺法論當取其化源是故太過取之不及資之太過取之次抑其鬱取其運之化源令折鬱氣不及扶資以扶運氣以避虛邪也資取之法出玄珠密語由是觀之則太過之年當名曰取不及之年當名曰資今按本篇辰戌之紀當曰取而乃曰資丑未之紀當曰資而乃曰取此皆互言而不拘耳若陽明厥陰之紀皆名曰資少陽少陰之紀皆名曰取則正合於刺法篇之義矣張介賓曰折其鬱氣瀉有餘也資其化源補不足也抑其運氣扶其不勝王冰曰太角歲脾不勝太徵歲肺不勝太宮歲腎不勝太商歲肝不勝太羽歲心不勝歲之宜也如此然太陽司天五歲之氣通宜先助心後扶腎氣吳昆曰抑其運氣扶其不勝者如太角是木木太過則土不勝宜抑木而培土張志聰曰如太角之歲風木淫勝則土受其制是當抑風木之勝扶其土之不勝如太徵之歲火運太過則金氣受其制是當抑其火之太過扶其金之不勝所謂和其運調其化無致暴過而生民疾也後少陽少陰歲同無使暴過而生其疾食歲谷以全其真避虛邪以安其正王冰曰木過則脾病生火過則肺病生土過則腎病生金過則肝病生水過則心病生天地之氣過亦然也歲谷謂黃色黑色虛邪謂從沖後來之風也吳昆曰歲谷即土文玄黅谷也其得歲氣最厚故能全真虛邪者天之八風應時而至其後時至者謂之虛邪以其從虛方來故也張志聰曰歲谷者元黅之谷感司天在泉之氣而成熟食之以全天地之元真虛邪者謂反勝其間氣之邪如太陽司天之歲初之氣乃少陽相火而寒反勝之是寒邪淫勝其初氣矣二之氣乃陽明燥金而熱反勝之是熱邪淫制其二氣矣四之氣乃厥陰風木而清反勝之是燥邪制勝其四氣矣五之氣乃少陰君火而寒反勝之是熱邪制勝其五氣矣是謂四畏必謹察之馬蒔曰其谷玄黃者歲谷也虛邪者八風之虛邪賊風從後來衝入者也適氣同異多少制之同寒濕者燥熱化異寒濕者燥濕化王冰曰太宮太商太羽歲同寒濕宜治以燥熱化太角太徵歲異寒濕宜治以燥濕化也吳昆曰適遇也氣謂司天在泉二氣也同異太運與之同異也同則為天符為歲會為同天符同歲會為太乙天符異則為平多少制之者因氣之多少製為藥物亦因之而降殺也張志聰曰此論五運之氣與司天在泉各有同異而氣味之多少亦各有所制也適酌也酌其氣之同異而制之也同寒濕者謂太羽太宮主運是與司天在泉之寒濕相同故當多用燥熱之氣味以制化蓋用燥以制濕用熱以化寒也如太徵太角太商主運是與寒濕之氣各異又當少用燥濕之氣以化之蓋用濕以滋燥熱之氣用燥以制風木之邪故同者多之異者少之王冰曰多謂燥熱少謂燥濕氣用少多隨其歲也張志聰曰同者氣盛故宜多異者氣孤故少制之也用寒遠寒用涼遠涼用溫遠溫用熱遠熱食宜同法有假者反常反是者病所謂時也王冰曰時謂春夏秋冬及間氣所在同則遠之即雖其時若六氣臨御假寒熱溫涼以除疾病者則勿遠之如太陽司天寒為病者假熱以療則熱用不遠夏餘歲例同故曰有假反常也食同藥法爾若無假反法則為病之媒非方制養生之道吳昆曰言用藥物之寒者須遠歲氣之寒用藥物之涼者須遠歲氣之涼溫熱亦然食宜同法者食謂飲食宜則兼居處衣服而言夫歲氣也有假其性為反佐則反常法反是適以為病所謂時不可違也張志聰曰此論司天在泉及間氣加臨之六氣各有寒熱溫涼之宜而又當無犯者也如太陽司天是當用熱以溫之而初之氣乃少陽相火用事又當遠此少陽之熱而後可用熱也如少陰在泉是當用寒以清之而四之氣值太陽寒水用事又當遠此太陽之寒而後可用寒也溫涼同義藥食同法所謂時與六位是也有假者反常是謂邪氣反勝又不必遠寒而遠熱矣如太陽寒水司天初之氣乃少陽相火而天氣反寒是當用熱而不必遠寒矣如少陰君火在泉四之氣乃太陽寒水而天氣反熱是當用寒而不必遠寒矣所謂天氣反時則可依時是也反是者皆為民病所謂加臨之時氣也此篇論調其正味以和氣運之不和如以苦燥之溫之所以治司天在泉之太過也折其鬱氣者折司天在泉之勝氣也抑其運氣者抑運氣之太過也食歲谷以全其真者全天地之真氣也避虛邪以安其正者安紀步之正氣也適氣同異者酌五運六氣之異同也用寒遠寒用熱遠熱者謂上下左右之六氣也假者反之逆治四時不正之氣也蓋天地陰陽之氣有德化之祥有政令之章有勝復之作有變易之災人居天地氣交之中能和其運調其化使上下合德無相奪倫五運宜行勿乖其政安其屈伏以平為期庶暴過不生苛疾不起此聖人隨時養生之大道也馬蒔曰假借而用之者特以邪勝其主則可反常以少犯之如夏寒甚則可以熱犯熱若寒不甚則不可犯也言用寒熱溫涼而無犯司氣之寒熱溫涼者此治病之正法也內有假借反常之法者正以主氣不足而客氣勝之則借其寒熱溫涼之氣以扶正氣而應客氣故雖犯之而無所禁耳張介賓曰假者反常謂氣有假借而反乎常也如夏當熱而反寒冬當寒而反熱春秋亦然反者病以其違於時也驥案元珠密語補瀉迎隨紀水將勝也其用藥即用甘以平之罰腎氣之勝也用苦全之補心氣之衰也母令食鹹物佐腎氣之衰也太陽為寒水之司氣在人主表為心肺之陽統人身之營衛衛行脈外風能中之營行脈中寒能傷之仲景中風用桂枝湯傷寒用麻黃湯三因之治病在太陽之歲仲景之治病在太陽之經一標一本皆以溫燥為主會而通之一而已矣陽明司天之政氣化運行後天王冰曰六步之氣生長化成庶務動靜皆後天時而應余少歲同馬蒔曰此言陽明司天之政有主氣又加以客氣而天時民病治法因之也凡此陽明司天之政則卯酉之紀曰乙卯丁卯辛卯癸卯乙酉丁酉己酉辛酉癸酉皆主不及之歲天氣急地氣明陽專其令炎暑大行動燥以堅淳風乃治風燥橫運流於氣交多陽少陰雲趨雨府濕化乃敷王冰曰雨府太陰之所在也吳昆曰燥金司天故急君火在泉故明雨府北極也張志聰曰金令在上故天氣徑急君火在下故地氣光明陽明在上君火在下故陽熱盛而物燥堅主時之初氣乃厥陰風木凡太過之歲客氣勝而多從客氣不及之歲客氣弱而兼從主氣是以淳風乃治張介賓曰陽專其令炎暑太行木亦無畏故淳風乃治金木之氣並行則風燥橫於歲運流於氣交之際也多陽少陰火氣勝也燥極而澤王冰曰燥氣欲終則化為雨澤是謂三氣之分也吳昆曰金生水之象也張志聰曰司天之燥金終三之氣而交於四氣之寒水濕土是以燥極而澤馬蒔曰燥極雨澤是為三氣之分也張介賓曰燥氣盛極化為雨澤皆火土合氣於氣交也雨府謂土厚濕聚之處其谷白丹王冰曰天地正氣所化生也吳昆曰白應司天金色丹應在泉火色張志聰曰感司天在泉之氣而成熟者所謂歲谷是也間谷命太者王冰曰命太者謂前文太角太商等氣之化者間氣化生故云間谷也新校正云按玄珠歲谷與間谷者何即在泉為歲谷及在泉之左右間者皆為歲谷其司天及運間而化者名間谷又別有一名間谷者是也化不及即反有所勝而生者故名間谷即邪氣之化又名並化之谷也亦名間谷與王注頗異吳昆曰間谷間氣谷也其歲谷則稱白丹若玄若黅若蒼皆間谷也以其稟左間右間之氣故稱間谷命言也稱也大者得氣之厚故稱之小者得氣之薄不足言也張志聰曰陽明在上則左太陽右少陽陽明主少而太陽少陽主太故曰間谷命太者蓋言在左右之太者為間谷也太陽之下是為厥陰少陽之下是為太陰感此四氣而成者是謂間谷止言在上之太而不言在下之二氣者蓋數之始起於上而終於下故舉此在上之大而在下之二氣可知矣玉師曰不及之歲而曰間谷命太者則太過之歲又當云間谷命少者張介賓曰太氣之有餘也除正化歲谷之外則左右四間之化皆為間谷但太者得間氣之厚故其所化獨盛是為間谷少者得氣之薄則無所成矣按太少間谷之義其説有二凡司天屬太者在泉必為少司天屬少者在泉必為太如卯酉年陽明司天少在上也少陰在泉太在下也命其太者則當以在泉之間氣命其谷也左為太陰其色黃右為厥陰其色蒼是蒼黃二色者為本年之間谷此以上下言也本篇凡不及之歲則言間谷而太過之歲則無似又以勝制之氣為間谷也如卯酉年金氣不及則火勝木強其谷丹蒼也乙亥年木氣不及則金勝土強其谷白黃也丑未年土氣不及則木勝水強其谷蒼黑也亦皆命太之義故凡君火相火寒水司天之年正化有餘則別無命太之間谷矣此以歲氣言也總之歲候不齊凡在氣之有餘者便是太則所受必盛而五穀之成所以有厚薄之分也惟不以本年正化所出故皆可謂之間谷但當因氣求之則善矣驥案卯酉十年陽明司天清熱之氣見於氣交而為民病陳無擇有審平湯方用天冬山萸白芍遠志檀香白朮生薑甘草繆問解此方曰金燥火烈治宜咸與苦辛鹹以抑火辛苦以助金故君天冬苦平濡潤化燥抑陽古人稱其治血妄行能利小便為肺家專藥有通上徹下之功金不務德則肝必受戕萸肉補肝陽也白芍益肝陰也火位乎下勢必炎上妙在遠志辛以益腎能導君火下行紫檀寒以養營且制陽光上僣又佐白朮以致津生薑以散火甘草潤肝瀉心氣味配合之妙有如此者故食歲谷以安其氣食間谷以去其邪歲宜以寒以苦以辛汗之清之散之安其運化無使受邪折其鬱氣資其化源王冰曰化源謂六月迎而取之也新校正云按金王七月故逆於六月瀉金氣吳昆曰司天以白勝在泉以丹勝間谷之色有玄有黅有蒼以色相間可濟其偏倚是去邪也以上十歲陽明燥金司天少陰君火在泉咸能潤燥苦能勝熱辛能清燥熱在表則汗之在裡則清之抑鬱則散之此調治法也安者順其運而安之所謂升降浮沉則順之是也陽明燥金司天則木鬱而不得發生少陰君火在泉則金鬱而不得審平須令其木氣條達金氣審平是折去其鬱氣也木病者養其水金病者養其土調其母氣是資其生化之源也張志聰曰宜寒以清君火之熱宜辛以潤陽明之燥宜苦以泄內郁之火汗之以解在外之寒清之以消內入之邪散之以解冬溫之氣運氣不及故宜安之無使邪勝折其司天在泉之氣次資五運之化源馬蒔曰本病篇卯酉之年太陽升天主窒天芮勝之不前蓋太陽在地三年此年升天作陽明左間遇天芮土司窒之不能升天又遇己酉己卯水欲升天土運抑之升之不前則陽明未遷正者及太陽未升天也故刺法論於水欲升而天芮窒抑之者刺足少陰之合穴湧泉又本病篇卯酉之歲太陰降地主窒地蒼勝之不入又少陽未退位即太陰未得降也又遇丁酉丁卯木運承之降而不下故刺法篇土欲降而地蒼窒抑之當刺足厥陰之井穴大敦足少陽之合穴陽陵泉資其化源蓋金王七月故於六月迎而取之以瀉金氣張介賓曰去邪者有補偏救敝之義謂實者可用以瀉虛者可用以補咸從水化治在泉之君火苦從火化治司天之燥金以辛者辛從金化本年火盛金衰同司天之氣以求其平也然燥金司天則歲半之前氣過於斂故宜汗之散之君火在泉則歲半之後氣過於熱故宜清之安者順其運氣而安之也以寒熱輕重少多其制同熱者多天化同清者多地化王冰曰少角少徵歲同熱用方多以天清之化治之少宮少商少羽歲同清用方多以地熱之化治之火在地故同清者多地化金在天故同熱者則多天化吳昆曰寒多者多其辛以汗之散之熱多者多其鹹苦以清之大運有與在泉少陰同熱者則多用司天陽明清肅之化以治之大運有與司天陽明同清者則多用在泉少陰溫熱之化以治之張志聰曰如少徵少角之運同少陰之熱者多以天化之清涼以制之如少商少宮少羽之運同陽明之清者多以地化之火熱以制之天化者燥金之清涼地化者在泉之火熱按至真要大論風淫所勝平以清涼是風同熱化當以清涼平之驥案玄珠密語金將勝也藥即用苦平之罰金之勝酸全之補肝之衰勿食辛物佐金之勝陽明燥金化氣在人主裡外候肌肉內以候胃有在經在腑之不同在經仲景有桂枝湯葛根湯之例辛以汗之也有大青龍白虎之例清之散之也熱入於府又有三承氣之例苦寒下之也即此以寒以苦以辛汗之清之散之之義天有六氣人有六經標本雖異其理同也與三因審平湯互發用涼遠涼用熱遠熱用寒遠寒用溫遠溫食宜同法有假者反之此其道也反是者亂天地之經擾陰陽之紀也吳昆曰上六句皆古語故結之曰此之謂也反之反古語六句治法也馬蒔曰司氣有寒熱溫涼而人之藥食亦有寒熱溫涼故用寒熱溫涼者宜遠司氣之寒熱溫涼而無犯之彼有假借而用之者正以主氣不足客氣勝之而行之耳若非假借之法則亂天地之經擾陰陽之紀者也張介賓曰假者反之謂當反而治之也反之者謂不知以上治法而反其用故足以亂天地之經紀少陽司天之政氣化運行先天天氣正地氣擾新校正云詳少陽司天太陰司地正得天地之正厥陰少陽司地各云得其正者以地主生榮為言也本或作天氣正者少陽火之性用動躁云止義不通也吳昆曰司天少陽相火之政行於上陽得其位故曰天氣正在泉厥陰風木之政行於下風動於地是地氣擾張志聰曰寅申歲主太過六氣皆先天時而至此申明天地陰陽之氣交相感召所謂上下交互氣交主之歲紀畢矣夫蒼黅丹素元之氣化生地之五行地之五行上呈天之六氣故曰寒暑燥濕風火天之陰陽也三陰三陽上奉之是三陰三陽在下而六氣之在上也是以少陽之上火氣治之中見厥陰厥陰之上風氣治之中見少陰正中也厥陰司天而曰地氣正者謂少陽在泉之氣而亦行於中蓋少陽為厥陰之中見也再按厥陰不從標本從中見少陽之化故凡此厥陰之政諸同正歲氣化運行同天謂厥陰同少陽天氣正地氣正之諸歲而厥陰之氣運行同少陽天氣之正中蓋以少陽司天則厥陰在中少陽在泉則地氣在中少陽為厥陰之中見厥陰在泉則地氣在中厥陰司天則天氣亦在中謂厥陰從中見少陽之化也能明於司天在泉及左右間氣再於上下氣交中求之斯得運化之微妙厥陰在泉故地氣擾蓋厥陰所至為撓動為迎隨行令之常也風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德王冰曰見明而大新校正云詳六氣惟少陽厥陰司天司地為上下通利無相勝克故言火木同德餘歲皆有勝克故言合德張志聰曰風火之氣也謂厥陰之氣上行而從少陽之化故雨乃時應蓋少陽所至為火生終為蒸溽此德化之常也張介賓曰此風木在泉相火司天之化太陰濕土主二之氣與少陽並行於歲半之前故陰行陽化雨乃時應其谷丹蒼其政嚴其令擾故風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起抑其運氣贊所不勝必折其鬱氣先取化源王冰曰化源年之前十二月迎而取之新校正云詳王注資取化源俱注云取其意有四等太陽司天取九月陽明司天取六月是二者先取在天之氣也少陽司天取年前十二月太陽司天取九月是二者乃先時取在地之氣也少陰司天取年前十二月厥陰司天取四月義不可解按玄珠之説則不然太陽陽明之月與王注合少陰少陽俱取三月太陰取五月厥陰取年前十二月玄珠之義可解王注之月疑有誤也吳昆曰丹應少陽火色蒼應厥陰木色運氣太過則抑之無使其亢所不勝者則贊翼之無使受害鬱氣發邪必折去之然必先取其生邪之源迎而奪之是也張志聰曰感司天在泉之氣而成熟者嚴者火之正擾者氣之令風熱參布者少陽厥陰之氣交相參合而布於氣交之中雲物沸騰者地氣上升也太陰橫流涼雨並起者蒸溽而為雨也馬蒔曰抑其運氣之太過贊其所直之不勝折其鬱氣者本病篇寅申之年陽明升天主窒天英勝之不前蓋陽明在地三年至此年升天作少陽左間遇天英火司窒之故不能升又遇戊寅戊申火運先天而至則金欲升天火運抑之故刺法論金欲升而天英窒抑之當刺手太陰之經穴經渠本病篇寅申之歲少陰降地主窒地玄勝之不入又或遇丙申丙寅水運太過先天而至君火欲降水運承之降而不下故刺法論火欲降而地玄窒抑之降而不入當刺足少陰之井穴湧泉足太陽之合穴委中先取化源王注以為年前之十二月迎而取之王注與新校正皆名曰取蓋未考刺法論中太過取之不及資之之義耳張介賓曰丹應司天蒼應在泉暴過不生苛疾不起王冰曰苛重也新校正云詳此不言食歲谷間谷者蓋此歲天地氣正上下通和故不言也吳昆曰如能行上法治則氣無太過不及何暴過苛疾之有張志聰曰暴運不生苛疾不起暴者謂太宮太商之運氣主太過而反受其鬱故其過暴者為病甚故曰苛故歲宜鹹辛宜酸滲之泄之漬之發之觀氣寒溫以調其過同風熱者多寒化異風熱者少寒化王冰曰太角太徵歲同風熱以寒化多之太宮太商太羽歲異風熱以涼調其過也吳昆曰少陽相火司天厥陰風木在泉咸從水化能勝火辛從金化能平木風火相扇是宜酸以收之利小便謂之滲利大便謂之泄行水謂之漬出汗謂之發寒者溫之溫者清之張志聰曰宜咸以制少陽之火宜辛以勝風木之邪厥陰從少陽之火化是子泄其母氣矣故又宜用酸以補之漬者上古用湯液浸漬以取汗滲之泄之者以清火熱之在中漬之發之者以散風邪之外襲馬蒔曰觀其氣有寒溫者而調其病司天為熱在泉為風即如壬寅壬申為太角戊寅戊申為太徵乃同風熱者宜多用寒化甲寅甲申為太宮庚寅庚申為太商丙寅丙申為太羽乃異風熱者宜少用寒化張介賓曰觀寒溫之盛衰以調其有過驥案寅申十年相火司天風熱之氣見於氣交而為民病陳無擇有升明湯方用棗仁生熟各半車前仁紫檀香薔薇青皮半夏生薑甘草繆問解此方曰風淫火勝之會用棗仁治心腹寒熱邪氣熟補肝陰生清膽熱君之以泄少陽之火佐車前以瀉肝家之熱在天在泉一火一風全賴乎此紫檀寒能勝火咸足柔肝又上下維持之聖品也薔薇陽明專藥味苦性冷能清五藏客熱合之青皮車前半夏生薑平肝和胃散逆止嘔甘草緩肝之急能瀉諸火平平數藥無微不入理法兼備之方也用熱遠熱用溫遠溫用寒遠寒用涼遠涼食宜同法此其道也有假者反之反是者病之階也張玉師曰按太陽司天太陰在泉則先云用寒遠寒用涼遠涼少陽司天厥陰在泉則先云用熱遠熱用溫遠溫蓋言歲運寒熱之藥食當遠此司天在泉遠者勿犯也馬蒔曰天時有寒熱溫涼而人用藥食亦有寒熱溫涼凡用寒熱溫涼者宜用遠天時之寒熱溫涼而不可輕犯之也有假借而用之以主氣不足臨氣勝之特假寒熱溫涼以資四正之氣則可以偶犯之耳若非反假之法則與時相違病必生矣驥案元珠密語補瀉迎隨紀火將勝也其藥用鹹平之鬱火之勝用辛全之補金之衰勿食其苦物佐火之勝也相火司天之氣而少陽則其經也氣為本經為標少陽在經主半表半裡之分汗之傷表下之傷中故傷寒於少陽一經汗下俱禁仲景主和解之法以利其樞以少陽主樞故也柴胡泄半表之熱黃芩泄半里之熱薑夏之辛兼發參甘棗能平虛熱亦與司氣同也太陰司天之政氣化運行後天王冰曰萬物生長化成皆後天時而生成也陰專其政陽氣退闢大風時起新校正云詳此太陰之政但以言大風時起蓋厥陰為初氣居木位春氣正風乃來故言大風起吳昆曰以太陰濕土司天故風木時來承製張介賓曰太陰司天以濕太陽在泉以寒故陰專其政陽氣退闢土不及則風勝之故大風時起天氣降下地氣上騰原野昏霧白埃四起云奔南極寒雨數至物成於差夏王冰曰南極雨府也差夏謂立秋之後一十日也吳昆曰差夏夏後秋初也以太陽寒水在泉故藏氣勝而物成於差夏張志聰曰天地之寒濕氣交是以原野昏霧寒雨數至也差夏長夏之時秋之交也張介賓曰濕氣下降寒氣上騰故原野昏霧白埃四起司天主南面太陰居之故云奔南極雨濕多見於南方差參也夏盡入秋謂之差夏蓋主氣當濕土之時客氣值少陽之令土氣稍溫故物成也民病寒濕腹滿身䐜膹胕腫痞逆寒厥拘急濕寒合德黃黑埃昏流行氣交王冰曰見而大明吳昆曰皆寒濕為病張志聰曰民病腹滿諸經皆感寒濕之氣而成寒濕合德是以黃黑埃昏流行氣交馬蒔曰民病為寒濕為腹滿為身䐜憤為胕腫為痞逆為寒厥為拘急也惟寒濕合德故黃黑埃昏流行氣交之際張介賓曰皆寒濕所化之病䐜憤脹滿也寒濕黃黑皆土水之化其政肅其令寂其谷黅玄王冰曰正氣所生成吳昆曰黅應太陰土色玄應太太陽水色張志聰曰肅者土之政寂者水之令張介賓曰黅應司天玄應在泉張志聰曰太陰之濕氣凝於上太陽之寒氣積於下寒水勝火則為冰雹即所謂火鬱之發山川冰雪是也陽氣在上為陰凝所勝則肅殺之氣乃行此言上下陰陽之氣也故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行王冰曰黃黑昏埃是謂殺氣自北及西流行於東及南也吳昆曰殺氣黑氣也張介賓曰上濕下寒故如此殺氣陰氣也故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間谷命其太也王冰曰以間氣之大者言其谷也吳昆曰以寒氣太過有餘宜高宜晚能任其寒也不及宜下宜早不能任寒也高下所宜氣化由之從順也張志聰曰此言五方之地土各有高下厚薄之不同故歲氣有餘地土宜高厚歲氣不及地土宜卑下蓋太過之氣宜緩不及之氣宜先地土高厚氣緩於出地之下者氣易於升也氣有餘宜至之遲氣不及宜至之早此地利之有高下氣至之有早晏而民氣亦從之愚按此論上下陰陽之氣者謂天包乎地之外地土之有高下者地居乎天之中也氣至之有早晏者氣貫乎地之內也人氣從之者人由乎氣交之中也此當與五常政大論合看馬蒔曰凡種穀者有餘之歲其土宜高不及之歲其土宜下高者宜晚下者宜早雖土之利實氣之化也民氣高下亦從之至於間谷則以在泉為太者之間氣命之蓋太陰為少寒水為太左間厥陰之色蒼右間陽明之色白也張介賓曰凡歲谷色味堅脆各有氣衰氣盛之別民之強弱其氣亦然必折其鬱氣而取化源王冰曰九月化源迎而取之以補益也吳昆曰取其化邪之過而奪之張志聰曰歲運不及故當益之邪氣者即己所不勝之氣也馬蒔曰必折其鬱氣者本病篇丑未之少陽升天主竅天蓬勝之不前又或遇太陰未遷正者即少陰升天辛丑辛未水運抑之故刺法論火欲升而天蓬窒抑之凡君火相火同刺包絡之榮穴勞宮本病篇丑未之歲厥陰未降下遇乙丑乙未金運抑之降之未下故刺法論木欲降而地晶抑之降而不入當刺手太陰之井穴少商手陽明之合穴曲池取其化源者即於九月補之抑其歲氣無使邪勝食歲谷以全其真食間谷以保其精故歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮折而水血交流必贊其陽火令御甚寒王冰曰冬之分其用五步量氣用之也吳昆曰燥能勝濕溫能勝寒宜以苦燥者平濕熱也發泄發散滲泄也張志聰曰真精乃天一所生之真元即精與氣耳故曰真曰精馬蒔曰抑其歲氣無使邪勝食歲谷間谷以全真保精宜以苦者燥之溫之甚者發之泄之若不發不泄則濕氣外溢肉潰皮折而水血交流也又必贊其陽火以令御其盛寒之氣張介賓曰歲谷即上文黅玄谷也陽明之政以苦燥之溫之苦從火化燥以治濕溫以治寒也發之泄之發散可以逐寒滲泄可以去濕也歲氣陰寒故當扶陽驥案丑未十年太陰司天之歲寒濕之氣見於氣交而為民病陳無擇有備化湯方用附片生地茯苓覆盆子牛膝木瓜生薑甘草繆問解此方曰此寒濕合邪寒則太陽之氣不行濕則太陰之氣不運故君附子大熱之品逐濕祛寒佐生地以制辛烈之性茯苓覆盆一滲一斂牛膝木瓜利關節加辛溫之生薑以疏地黃之膩膈甘溫之甘草以緩附子之妨陰謂非有制之師耶而於溫燥發泄之治尤有合矣從氣異同少多其判也王冰曰通言歲運之同異也吳昆曰是謂之無伐天和張志聰曰判者分也馬蒔曰從其氣之異同以少多而判治之也同寒者以熱化同濕者以燥化王冰曰少宮少商少羽歲同寒少宮歲又同濕濕過故宜燥寒過故宜熱少角少徵歲平和處之也吳昆曰言火運與在泉太陽同寒者以熱化之品治之與司天同濕者以燥化之品治之也張介賓曰以上十年運之與氣有與在泉同寒者當多用熱化之品以治之如少商少羽歲是也有與司天同濕者當多用燥化之品以治之如少宮歲是也少角少徵歲當稍從和平以處之也異者少之同者多之用涼遠涼用寒遠寒用溫遠溫用熱遠熱食宜同法假者反之此其道也反是者病也馬蒔曰異者則少用同者則多用天有寒熱溫涼而人之藥食亦有寒熱溫涼用寒熱溫涼者宜遠寒熱溫涼而無犯之或有假借而用之者特以主氣不足臨氣勝之假其寒熱溫涼以資四正之氣則可以偶犯之耳若非假反之法則與時相違病必生矣張介賓曰雖以熱以燥各有分治然或少或多當因運氣異同隨其宜而酌之驥案元珠密語補瀉迎隨紀土將勝也其藥用酸平之罰土之勝用鹹全之補腎之衰勿食甘物佐土之勝也太陰為陰中之至陰乃濕土之司化其證多見虛寒仲景用理中溫補而桂枝一法亦太陰表藥雖未成厥逆而手足尚溫亦有取乎四逆之治合之歲宜溫燥發泄之令無不合也少陰司天之政氣化運行先天地氣肅天氣明寒交暑熱加燥新校正云詳此云寒交暑者謂前歲終之氣少陽今歲初之氣太陽太陽寒交前歲少陽之暑也熱加燥者少陰在上而陽明在下也吳昆曰陽明燥金在泉故地氣肅少陰君火司天故天氣明金寒而燥火暑而熱交加上下交加也張志聰曰太過之歲氣運皆先時而至馬蒔曰此言少陰司天之政有主氣又加以客氣而天時民病治法因之也張介賓曰金寒而燥火暑而熱以下臨上曰交以上臨下曰加云馳雨府濕化乃行時雨乃降金火合德王冰曰見而大明吳昆曰此所謂燥極乃澤也張志聰曰云馳雨府濕化乃行時雨乃降即少陽臨土雨乃涯之義張介賓曰此即陽明司天燥極而澤之義上火下金二氣合德其政明其令切其谷丹白水火寒熱持於氣交而為病始也必抑其運氣資其歲勝折其鬱發先取化源王冰曰先於年前十二月迎而取之吳昆曰火明金切丹應司天火色白應在泉金色火太過則水來復運氣太過必抑之使歸於平歲氣所勝必養之無伐其生折去其鬱氣發病者先取其化邪之源張志聰曰明者火之政切者金之令運氣太過故當抑之而資其歲之所不勝郁發者謂五運之氣鬱極乃發也馬蒔曰抑其運氣之有餘資其歲氣之所不勝折其鬱發者本病篇子午之歲太陰升天主窒天衝勝之不前蓋言太陰在地三年此年升天作少陰左間遇天衝窒之不前又或遇壬子水運先天而至升天不前故刺法論土欲升而天衝窒抑之當刺足太陰之俞穴太白又本病篇太陽降地主窒地阜勝之不入又或甲子甲午土運太過先天而至土運承之降而不入故刺法論水欲降而地阜窒抑之當刺足太陰之井穴隱白足陽明之合穴三里又先於前之十二月以迎取其化源無使暴過而生其病也無使暴過而生其病也故食歲谷以全真氣食間谷以闢虛邪歲宜咸以軟而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之適氣同異而多少之同天氣者以寒清化同地氣者以溫熱化王冰曰太角太徵歲同天氣宜以寒清治之太宮太商太羽歲同地氣宜以溫熱治之化治也吳昆曰勿令邪氣作實成病也歲氣作實邪則間氣為虛邪食間谷以闢虛邪所謂必同其氣乃可平也上謂司天少陰君火也咸從水化故能調之甚君火甚也下在泉燥金也平其君火則金安也火熱太甚非下之不去同異謂大運之氣與司天在泉或同或異也因其同異而為制之多少大運與司天君火同氣者以寒清之品治之大運與在泉燥金同氣者以溫熱之品治之張志聰曰虛邪不正之邪也保其精則邪自闢矣馬蒔曰食歲谷以全其真間谷以避虛邪宜咸以軟之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之又必適其氣之同異而多少其制如壬子壬午之為太角戊子戊午之為太徵歲同天氣之熱當以寒清之化治之甲子甲午之為太宮庚子庚午之為太商丙子丙午之為太羽歲同地氣之寒當以溫熱之化治之張介賓曰五味之屬如陰陽應象大論火生苦金匱真言論其味苦其類火是分五行之味苦從火化也故在本篇如太陽太陰陽明等症云以苦燥之溫之及以苦發之者皆用苦之陽也又陰陽應象大論及至真要大論酸苦湧泄為陰是言氣味之效苦從陰用也故本節云以苦泄之至真要大論濕司於地熱反勝之治以苦冷濕化於天熱反勝之治以苦寒者皆用苦之陰也再如宣明五氣篇及五味論俱云苦走骨夫北方生寒在體為骨是骨本屬陰而苦則走之豈非陰乎可見苦味一也而有從陰從陽苦熱苦寒之不同何可不辨今有謂苦屬火而諱其寒者有但知苦寒而忘其熱者不明氣味變通之理舉此一篇則五味之性可類見矣又如藏氣法時論粳米牛肉棗葵皆甘麥羊肉杏薤皆苦之類是於飲食常味之中又各有辨味變之理如此不得其精不足以言氣味也言以上十年運之與氣有與司天同熱者當以寒清所化之品治之如太角太徵歲是也有與在泉同寒者當以溫熱所化之品治之太羽太宮太商歲是也當各因其異同而製為之多少耳驥案子午十年少陰君火司天水火寒熱之氣見於氣交而為民病陳無擇有正陽湯方用當歸川芎元參旋覆花白薇白芍桑皮甘草生薑繆問解此方曰熱為火性寒屬金體藥當辛溫以祛其寒酸苦以泄其熱不致偏寒而偏熱斯為得耳君當歸味苦氣溫可升可降以補少陰之陰川芎味辛氣溫主一切血治風痰飲發有神功元參色走腎而味入心偕旋覆之咸以軟堅白薇之咸以泄熱此咸以調下之義白芍酸苦微寒主邪氣而除血痹偕桑皮以瀉肺火而散瘀血此酸以安下之義加生薑甘草一和一散而上熱下清之病胥除矣用熱遠熱用涼遠涼用溫遠溫用寒遠寒食宜同法有假則反此其道也反是者病矣馬蒔曰天有寒熱溫涼而人之藥食亦有寒熱溫涼故凡用寒熱溫涼者當遠天之寒熱溫涼而無犯之或有假借而用之者特以主氣不足臨氣勝之借其寒熱溫涼以資四正之氣則可以偶犯之耳若非假借之法則與時相違病由是而作矣驥案元珠密語補瀉迎隨紀火將勝也其藥用鹹平之鬱火之勝用辛全之補金之衰勿食其苦物佐火之勝也驥案君火其氣少陰其經氣為本經為標少陰為君火之化然有水火二藏邪從水化為陰其標也從火化為陽其本也從標治在回陽從本治在救陰仲景豬苓湯黃連阿膠湯病皆火化為陽故從本以撤熱真武附子白通通脈茱萸等湯皆水化為陰故從標以驅寒從本則酸鹹法從標則苦發法苦從火化亦能化燥厥陰司天之政氣化運行後天諸同正歲氣化運行同天王冰曰太過歲運化氣行先天時不及歲化生成後天時同正氣歲化生成與天二十四遲速同無先後新校正云詳此注云同正歲與二十四氣氣同疑非恐是與大寒日交同氣候同吳昆曰此句總釋同正之義同天者其生長化收藏同於天時不先不後是也張志聰曰此言厥陰少陽標本之相合也少陽司天則天氣正少陽在泉則地氣正馬蒔曰此言厥陰司天之政有主氣又加以客氣而天時民病治法用之張介賓曰諸天正歲者其氣正其生長化收藏皆與天氣相合故曰運行同天天氣擾地氣正風生高遠炎熱從之云趨雨府濕化乃行風火同德其政撓其令速其谷蒼丹間谷言太者必折其鬱氣資其化源王冰曰化源四月也迎而取之吳昆曰風性動擾火性嚴正火生土也風政擾撓火令急速蒼應司天厥陰木色丹應在泉少陽火色玄黅白三者間谷也大者氣完故稱之張志聰曰風氣在天故風生高遠少陽之氣上與厥陰相合故炎熱從之云趨雨府濕化乃行者從風火之勝制也風火同歸於正故曰同德撓者風之政速者火之令也蒼丹之谷感司天在泉之氣而成熟者間谷者言左之少陰而下右之太陽而下感左右之間氣而成馬蒔曰厥陰司天故天氣擾相火在泉故地氣正惟天氣擾故風生高遠惟地氣正故炎熱從之至於云趨雨府濕化乃行其谷蒼丹蒼為木而丹為火木司天而火司地乃天地正氣所化也若間谷則以在泉為太者之間色命之蓋厥陰為少寅申為太左間陽明之色白右間太陰之色黃也必折其鬱氣者本病篇己亥之歲升天作左間遇天蓬司水窒之不能上升又厥陰未遷正即少陰未得升天又辛巳辛亥水運抑之升之不前故刺法論水欲升而天蓬窒抑之刺包絡之榮穴勞宮又本病篇己亥之歲陽明降地主窒地彤勝而不入蓋言陽明在天三年至此年下降入地作少陽左間又遇地彤司火勝之不能入地又或遇太陰未退位即少陽未得降又癸巳癸亥火運抑之不下故刺法論金欲降而地彤窒抑之當刺心包絡之井穴中衝手少陽之合穴天井於四月即迎而取之以資其化源張介賓曰風木司天故天氣擾相火在泉土得溫養故地氣正木在上故風生高遠火在下故炎熱從上氣得溫故云雨作濕化行風政撓火令速成蒼應司天丹應在泉本年厥陰司天則土鬱少陽在泉則金鬱鬱氣化源義見前又如本病篇己亥之歲君火升天主窒天蓬勝之不前陽明降地主窒地彤勝而不入故刺法論於火欲升而天蓬窒抑之當刺包絡之榮金降而地彤窒抑之當刺心包絡之所出手少陽之所入贊其運氣無使邪勝歲宜以辛調上以咸調下畏火之氣無妄犯之新校正云詳此運何以不言適氣同異少多之制者蓋厥陰之政與少陽之政同六氣分政為厥陰與少陽之政上下無克罰之異治化惟一故不再言同風熱者多寒化異風熱者少寒化也吳昆曰有餘者折之不及者贊之辛從金化能平厥陰風木咸從水化能平少陽相火謂宜避少陽之熱勿得更以熱化犯之馬蒔曰厥陰為不及宜贊其運氣無使邪勝司天為木以辛調之在泉為火以咸調之蓋畏火之氣無妄犯之也張介賓曰補其不足以抑有餘也驥案己亥十年風燥火熱之氣見於氣交而為民病陳無擇有敷和湯用半夏茯苓生棗仁甘草五味乾薑枳實青皮訶子大棗繆問解此方曰經言辛以調上咸以調下蓋辛從金化能制厥陰咸從水化能平相火風火合邪病非一端用藥非具卓識何從而措手哉此方之氣寒熱兼施其味則辛酸鹹合用補虛瀉實不過瀉火平木而已半夏辛能潤下合茯苓之淡滲祛濕除黃生棗仁能瀉相火炙甘草能緩厥陰五味有除熱之功加炮薑溫上年未盡之寒枳實瀉本年在中之濕青皮訶子合大棗醒胃悅脾則無邪不治矣用溫遠溫用熱遠熱用涼遠涼用寒遠寒食宜同法有假反常此其道也反是者病張志聰曰厥陰司氣以溫用溫無犯少陽司氣以熱用熱無犯食宜同法者藥食並宜也馬蒔曰天有寒熱溫涼而人藥食亦有寒熱溫涼故用寒熱溫涼者必遠於天之寒熱溫涼而無犯之有假其法而用之者特以主氣不足臨氣勝之借其寒熱溫涼以資四正之氣故可偶犯之耳若非假借之法則病從茲生矣驥案元珠密語補瀉迎隨紀木將勝也其藥即用辛平之郁木之勝用甘全之佐土之衰毋令食酸物佐木之勝也厥陰為陰之初盡即為陽之初生與少陽同為相火遊行之部即為風木主化之經經屬陰而藏不寒故多寒熱雜錯陰陽互見之證仲景熱厥則清以白虎寒厥則溫以四逆茱萸熱利則有白頭翁寒利則有白通四逆厥陰之病厥利二者而已至若寒熱並用兼治久利蛔厥又有烏梅丸之例合之歲氣辛調上咸調下之法無不相合也帝曰夫子言用寒遠寒用熱遠熱余未知其然也願聞何謂遠岐伯曰熱無犯熱寒無犯寒從者和逆者病不可不敬畏而遠之所謂時興六位也王冰曰四時氣王之月藥及食衣寒熱溫涼同者皆宜避之差四時同犯則以水濟水以火助火病必生矣張志聰曰興起也此總言一歲之中有應時而起之六位各主六十日零八十七刻半各有寒熱溫涼之四氣皆宜遠而無犯之如一之氣天氣尚寒是宜用熱時值少陽相火司令又當遠此一位而無犯也如二之氣天氣尚溫是宜用涼時值太陽寒水司令又當遠此一位而無犯也每歲之六氣皆然從則和逆則病不可不敬畏而遠之吳昆曰犯謂不應用而反用之也時謂四時六位謂六氣張介賓曰遠避忌之謂即無犯也用熱者無犯司氣之熱用寒者無犯司氣之寒是謂熱無犯熱寒無犯寒時謂四時即主氣也位謂六步即客氣也主客之氣皆當敬畏不犯為從犯則為逆矣驥案犯寒熱溫涼舍時從證之義已見前帝曰溫涼何如王冰曰溫涼減於寒熱可輕犯之乎馬蒔曰司氣司天司地之氣也司氣之寒熱溫涼如辰戍太陽寒水司天太陰溫土在泉之類則不可輕犯之間氣者天地左右二間之氣也至真要大論謂司天地者主歲主歲者紀歲司左右者為間氣間氣者紀步故天地左右二間之氣客氣與主氣同則無犯之若客氣與主氣異則小犯之此四畏所在不可不察張介賓曰謂溫涼稍次於寒熱亦可犯否岐伯曰司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯間氣同其主無犯異其主則小犯之是謂四畏必謹察之帝曰善其犯者何如王冰曰須犯者吳昆曰司氣謂六部主氣用而無犯謂應用而無過用間氣左間右間之客氣小犯之不宜甚犯也馬蒔曰小犯者正以天氣雖反僅可依時及客勝其主如夏寒甚則可以熱犯熱若寒不甚則不可犯之但以平為期過則病生故不可過也何也邪客勝主不可不御故耳張介賓曰司氣者司天司地之氣也用熱無犯等四句謂寒熱溫涼俱當避即有應用者亦無過用恐犯歲氣也間氣左右四間之客氣主主氣也同者同熱同寒其氣甚故不可犯異者主寒客熱主熱客寒其氣分其邪不一故可因其勢而小犯之上節言司氣此節言間氣如至真要大論主歲者紀歲間氣者紀步也四畏寒熱溫涼也岐伯曰天氣反時則可依時王冰曰反甚為病則可依時吳昆曰時謂主氣主氣合四時張志聰曰天氣反時者如司氣以熱而天氣反涼是當依時而用溫矣及勝其王則可犯王冰曰夏寒甚則可以熱犯熱寒氣不甚則不可犯之張志聰曰如司氣以熱而寒反勝之又可用熱而犯主氣之熱矣張介賓曰勝其主者客氣太過也如夏而寒甚客水勝也冬而熱勝客火勝也春涼秋溫其氣亦然故可以熱犯熱以寒犯寒以溫犯溫以涼犯涼而從其變乃所謂從治也以平為期而不可過王冰曰氣平則止過則病生過而病生與犯同也吳昆曰過則反傷正氣而為病也張志聰曰以氣平為期不過用以傷司氣之元真張介賓曰過則傷正氣而增病是謂邪氣反勝者王冰曰氣動有勝是謂邪客勝於主不可不御也六步之氣於六位中應寒反熱應熱反寒應溫反涼應涼反溫是謂六步之邪勝也差冬反溫差夏反冷差秋反熱差春反涼是謂四時之邪勝也勝則反其氣以平之張志聰曰是謂邪氣反勝者則可犯張介賓曰邪氣反勝則非時而至如應熱反寒應寒反熱應溫反涼應涼反溫皆邪氣反勝反勝者故當反其氣以平之故曰無失天信無逆氣宜無翼其勝無贊其復是謂至治王冰曰天信謂至時必定翼贊皆佐之謹守天信是謂至真妙理也張志聰曰天信謂氣之應時而至者無差失而妄犯之六氣各有所宜而不可逆有勝氣又宜折之而無翼其勝有復氣又當抑之而無贊其復調之正味使上下合德無相奪倫五運和平勿乖其政是謂至治張介賓曰客主氣運至必應時天之信也不知時氣失天信矣寒熱溫涼用之必當氣之宜也不知逆從逆氣宜矣翼其勝贊其復皆助邪也知而弗犯是謂至妙之治
